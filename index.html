<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات خاص - نسخة متطورة كاملة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-main: #05060a;
            --bg-grad-1: #151624;
            --bg-grad-2: #020307;
            --text-main: #ffffff;
            --text-muted: #a7aec4;
            --accent: #ffd54a;
            --accent-soft: #ffe788;
            --accent-dark: #d97706;
            --danger: #e53935;
            --success: #10b981;
            --warning: #f59e0b;
            --ctrl-bg: rgba(0, 0, 0, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(17, 24, 39, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #0a0e17 100%);
            color: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            backdrop-filter: blur(16px);
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.7) 45%, rgba(0, 0, 0, 0.9) 100%);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* ============ رسائل الشات ============ */
        .msg-wrapper {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            animation: messageSlideIn 0.3s ease;
            transition: background 0.3s ease;
        }

        .msg-wrapper:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .msg-user {
            font-weight: bold;
            color: var(--accent);
            font-size: 13px;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .msg-text {
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            direction: rtl;
            text-align: right;
        }

        /* ============ رسائل النظام ============ */
        .sys-msg {
            text-align: center;
            color: var(--accent-soft);
            font-size: 12px;
            margin: 8px auto;
            background: rgba(255, 213, 74, 0.08);
            border: 1px solid rgba(255, 213, 74, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
            max-width: fit-content;
            animation: fadeInOut 5s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* ============ منطقة الإدخال ============ */
        #inputArea {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        #messageInput {
            flex: 1;
            font-size: 16px;
            height: 46px;
            padding: 0 16px;
            border-radius: 23px;
            background: rgba(10, 11, 20, 0.95);
            border: 2px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 213, 74, 0.15);
        }

        #sendBtn {
            height: 46px;
            padding: 0 24px;
            border-radius: 23px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 213, 74, 0.4);
        }

        #sendBtn:active {
            transform: scale(0.98);
        }

        /* ============ الأزرار العلوية ============ */
        #topButtons {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            right: calc(10px + env(safe-area-inset-right));
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            background: rgba(10, 11, 20, 0.95);
            border-radius: 14px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            color: #fff;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .icon-btn:hover {
            transform: scale(1.08);
            background: rgba(20, 21, 30, 0.95);
            border-color: var(--accent);
        }

        .online-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--accent);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }

        /* ============ النوافذ المنبثقة ============ */
        #usersBox,
        #setVideoModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at top, #1a1d2e 0%, #0a0d16 55%);
            padding: 24px;
            border-radius: 20px;
            z-index: 1003;
            display: none;
            max-height: 80vh;
            width: 90%;
            max-width: 420px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            animation: modalPopIn 0.3s ease;
        }

        @keyframes modalPopIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #usersBox h4,
        #setVideoModal h4 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
            color: var(--accent-soft);
        }

        #usersList .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background 0.3s ease;
            cursor: pointer;
        }

        #usersList .user-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-green {
            background-color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }

        .status-yellow {
            background-color: #f1c40f;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.6);
        }

        .status-gray {
            background-color: #7f8c8d;
        }

        #videoUrlInput {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(5, 6, 12, 0.95);
            color: white;
            font-size: 15px;
            margin-bottom: 12px;
            box-sizing: border-box;
            border: 2px solid rgba(255, 255, 255, 0.1);
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        #videoUrlInput:focus {
            border-color: var(--accent);
        }

        #submitVideoUrlBtn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            font-weight: 700;
            border: none;
            cursor: pointer;
            color: #000;
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        #submitVideoUrlBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 213, 74, 0.3);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1001;
            display: none;
            backdrop-filter: blur(6px);
        }

        /* ============ شاشة تسجيل الدخول ============ */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #181a28 0%, rgba(5, 6, 10, 0.98) 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #loginBox {
            background: rgba(5, 6, 12, 0.98);
            padding: 32px;
            border-radius: 24px;
            text-align: center;
            min-width: 300px;
            max-width: 90%;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: modalPopIn 0.5s ease;
        }

        #loginBox h2 {
            margin-bottom: 20px;
            font-size: 24px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #usernameInput {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 14px;
            font-size: 16px;
            background: rgba(3, 4, 10, 0.96);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        #usernameInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 213, 74, 0.1);
        }

        #loginBtn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            padding: 14px 26px;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            color: #000;
            font-family: 'Tajawal', sans-serif;
            font-size: 17px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 213, 74, 0.3);
        }

        /* ============ مشغل الفيديو ============ */
        #pinnedVideoPlayer {
            position: fixed;
            top: calc(60px + env(safe-area-inset-top));
            left: 10px;
            width: 400px;
            max-width: calc(100% - 20px);
            min-width: 300px;
            min-height: 200px;
            background: #000;
            border-radius: 16px;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.95);
            z-index: 998;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: slideInLeft 0.3s ease;
            resize: both;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .video-header {
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 14px;
            cursor: move;
            touch-action: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-size: 13px;
            color: #ddd;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 5;
        }

        .close-pinned-video {
            background: var(--danger);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border: none;
            color: white;
            z-index: 10;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .close-pinned-video:hover {
            background: #dc2626;
            transform: scale(1.15);
        }

        .resize-handle {
            position: absolute;
            width: 16px;
            height: 16px;
            bottom: 4px;
            right: 4px;
            cursor: nwse-resize;
            z-index: 20;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .video-body {
            position: relative;
            flex: 1;
            background: #000;
        }

        .video-selector-bar {
            display: flex;
            gap: 4px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.9);
            flex-wrap: wrap;
        }

        .video-selector-btn {
            padding: 5px 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
        }

        .video-selector-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border-color: var(--accent);
        }

        .video-selector-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ============ مشغل Netflix الداخلي ============ */
        .nplayer {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .nplayer-video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
        }

        .nplayer-video-wrap video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: contain;
        }

        .nplayer-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            z-index: 2;
        }

        .nplayer-loading::after {
            content: '';
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-top: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .nplayer-error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 14px;
            z-index: 3;
            text-align: center;
            padding: 20px;
        }

        .nplayer-error button {
            margin-top: 12px;
            padding: 10px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        .nplayer-error button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 213, 74, 0.4);
        }

        /* شريط التحكم */
        .nplayer-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0) 100%);
            padding: 30px 10px 8px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 4;
        }

        .nplayer-controls.show {
            opacity: 1;
            pointer-events: auto;
        }

        .nprogress {
            position: relative;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .nprogress-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 3px;
            width: 0%;
        }

        .nprogress-played {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            z-index: 2;
            transition: width 0.15s linear;
        }

        .nprogress-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
            margin: 0;
        }

        .ncontrols-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .ncontrols-row button {
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            opacity: 0.85;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
            height: 30px;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
        }

        .ncontrols-row button:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        .ntime {
            font-size: 12px;
            color: #ccc;
            min-width: 85px;
            direction: ltr;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
        }

        .nvolume-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nvolume-slider {
            width: 50px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .nvolume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .nspeed-menu,
        .nquality-menu {
            position: relative;
        }

        .nspeed-dropdown,
        .nquality-dropdown {
            position: absolute;
            bottom: 35px;
            right: 0;
            background: rgba(20, 20, 35, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 10px;
            padding: 4px 0;
            min-width: 85px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            z-index: 20;
        }

        .nspeed-dropdown button,
        .nquality-dropdown button {
            display: block;
            background: none;
            border: none;
            color: #ddd;
            padding: 6px 14px;
            width: 100%;
            text-align: right;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s;
        }

        .nspeed-dropdown button:hover,
        .nquality-dropdown button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .nspeed-dropdown button.active,
        .nquality-dropdown button.active {
            color: var(--accent);
            font-weight: 700;
        }

        .nfullscreen {
            margin-right: auto;
        }

        /* ============ مؤشر الكتابة ============ */
        #typingWrapper {
            display: none;
            padding: 4px 15px;
            color: var(--text-muted);
            font-size: 12px;
        }

        #typingIndicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .typing-dots {
            display: inline-flex;
            gap: 3px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-6px); }
        }

        /* ============ نظام الإشعارات (Toast) ============ */
        .toast-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 20px;

    <script>

            // ==================== نظام الإشعارات (Toast) ====================
            function showToast(message, type = 'info') {

            // ==================== نظام Rate Limiting ====================
            class RateLimiter {
                constructor(maxMessages = 4, timeWindow = 8000) {
                    this.messages = [];
                    this.maxMessages = maxMessages;
                    this.timeWindow = timeWindow;
                }

                canSend() {
                    const now = Date.now();
                    this.messages = this.messages.filter(t => now - t < this.timeWindow);
                    if (this.messages.length >= this.maxMessages) {
                        showToast('⚠️ يرجى الانتظار قليلاً قبل إرسال رسالة أخرى', 'warning');
                        return false;
                    }
                    this.messages.push(now);
                    return true;
                }
            }

            const rateLimiter = new RateLimiter(4, 8000);

            // ==================== دوال مساعدة ====================
            function escapeHtml(str) {
                if (!str) return "";
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function sanitizeInput(input) {
                input = input.replace(/<[^>]*>/g, '');
                input = input.replace(/javascript:/gi, '');
                input = input.replace(/on\w+=/gi, '');
                return input.substring(0, 500);
            }

            function getAvatarColor(name) {
                const colors = ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4',
                    '#f97316', '#14b8a6', '#6366f1'
                ];
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                }
                return colors[Math.abs(hash) % colors.length];
            }

            function getInitials(name) {
                return name.substring(0, 2).toUpperCase();
            }

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                });
            }

            function getYoutubeVideoId(url) {
                if (!url) return null;
                const regex = /(?:youtube\.com\/(?:shorts\/|watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                const match = url.match(regex);
                return match ? match[1] : null;
            }

            function getTweetId(url) {
                if (!url) return null;
                const match = url.match(/(?:twitter|x)\.com\/\w+\/status\/(\d+)/);
                return match ? match[1] : null;
            }

            function isDirectVideo(url) {
                return /\.(mp4|webm|mov|m4v|mkv|avi)(\?.*)?$/i.test(url) || (url.includes('video') && !url.includes(
                    'youtube') &&
                    !url.includes('twitter') && !url.includes('tiktok'));
            }

            function detectMediaType(url) {
                const patterns = {
                    youtube: /(?:youtube\.com\/(?:shorts\/|watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/i,
                    twitter: /(?:twitter|x)\.com\/\w+\/status\/(\d+)/i,
                    directVideo: /\.(mp4|webm|mov|mkv|avi)(\?.*)?$/i,
                    hls: /\.(m3u8|m3u)(\?.*)?$/i
                };

                for (let [type, pattern] of Object.entries(patterns)) {
                    const match = url.match(pattern);
                    if (match) return { type, id: match[1] || url };
                }
                return { type: 'unknown', id: url };
            }

            function extractCleanUrl(text) {
                const matches = text.match(/(https?:\/\/[^\s]+)/g);
                if (!matches) return null;
                let raw = matches[0];
                raw = raw.replace(/[،،؛\u0600-\u06FF]+$/, '').trim();
                return raw;
            }

            async function expandShortUrl(url) {
                if (url.includes('t.co') || url.includes('bit.ly') || url.includes('tinyurl.com')) {
                    try {
                        const response = await fetch(url, { method: 'HEAD', redirect: 'follow' });
                        return response.url;
                    } catch (e) {
                        console.warn('Failed to expand URL:', e);
                        return url;
                    }
                }
                return url;
            }

            function formatTimeDisplay(timestamp) {
                if (!timestamp) return '';
                const now = Date.now() + serverTimeOffset;
                const diffSec = Math.floor((now - timestamp) / 1000);
                if (diffSec < 5) return "الآن";
                if (diffSec < 60) return "ثواني";
                if (diffSec < 120) return "د1";
                if (diffSec < 3600) return `د${Math.floor(diffSec / 60)}`;
                if (diffSec < 86400) return `س${Math.floor(diffSec / 3600)}`;
                if (diffSec < 604800) return `ي${Math.floor(diffSec / 86400)}`;
                if (diffSec < 2592000) return `أ${Math.floor(diffSec / 604800)}`;
                if (diffSec < 31536000) return `ش${Math.floor(diffSec / 2592000)}`;
                return `ع${Math.floor(diffSec / 31536000)}`;
            }

            function addNotification(text) {
                const div = document.createElement("div");
                div.className = "sys-msg";
                div.textContent = text;
                messagesDiv.appendChild(div);
                scrollToBottom();
                setTimeout(() => { if (div.parentNode) div.remove(); }, 5000);
            }

            function addMessageToUI(key, { user, text, timestamp }) {
                const wrapper = document.createElement("div");
                wrapper.className = "msg-wrapper";
                wrapper.id = `msg-${key}`;

                const avatarColor = getAvatarColor(user);
                const initials = getInitials(user);
                const timeStr = formatTimeDisplay(timestamp);

                wrapper.innerHTML = `
                    <div class="msg-avatar" style="background: ${avatarColor};">${initials}</div>
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-user">${escapeHtml(user)}</span>
                            <span class="msg-time" data-key="${key}">${timeStr}</span>
                        </div>
                        <div class="msg-text">${escapeHtml(text)}</div>
                    </div>
                `;

                messagesDiv.appendChild(wrapper);
                messageTimestamps.set(key, { timestamp, element: wrapper.querySelector('.msg-time') });
                scrollToBottom();

                // تنظيف الرسائل القديمة
                if (messagesDiv.children.length > MESSAGE_LIMIT + 30) {
                    const oldestMsg = messagesDiv.firstElementChild;
                    if (oldestMsg && !oldestMsg.classList.contains('sys-msg')) {
                        oldestMsg.remove();
                    }
                }
            }

            // تحديث الوقت كل 30 ثانية
            setInterval(() => {
                messageTimestamps.forEach(({ timestamp, element }, key) => {
                    if (element) {
                        element.textContent = formatTimeDisplay(timestamp);
                    }
                });
            }, 30000);

            // ==================== نظام الكتابة (Typing Indicator) ====================
            function initTypingIndicator() {
                typingRef = db.ref("typing");
                let isTyping = false;
                const typingUsers = new Map();

                messageInput.addEventListener("input", () => {
                    const text = messageInput.value;
                    if (text.length > 0 && !isTyping) {
                        isTyping = true;
                        typingRef.child(username).set({ time: firebase.database.ServerValue.TIMESTAMP });
                        clearTimeout(typingTimeout);
                    } else if (text.length === 0 && isTyping) {
                        stopTyping();
                    }
                });

                messageInput.addEventListener("keydown", () => {
                    if (!isTyping && messageInput.value.length > 0) {
                        isTyping = true;
                        typingRef.child(username).set({ time: firebase.database.ServerValue.TIMESTAMP });
                    }
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        if (isTyping && messageInput.value.length === 0) {
                            stopTyping();
                        } else if (isTyping) {
                            typingRef.child(username).set({ time: firebase.database.ServerValue.TIMESTAMP });
                        }
                    }, 2000);
                });

                function stopTyping() {
                    if (isTyping) {
                        isTyping = false;
                        typingRef.child(username).remove();
                    }
                    clearTimeout(typingTimeout);
                }

                document.getElementById("inputArea").addEventListener("submit", () => { stopTyping(); });

                typingRef.on("child_added", (snap) => {
                    if (snap.key === username) return;
                    const data = snap.val();
                    if (data && data.time) typingUsers.set(snap.key, data.time);
                    updateTypingDisplay();
                });

                typingRef.on("child_changed", (snap) => {
                    if (snap.key === username) return;
                    const data = snap.val();
                    if (data && data.time) typingUsers.set(snap.key, data.time);
                    updateTypingDisplay();
                });

                typingRef.on("child_removed", (snap) => {
                    if (snap.key === username) return;
                    typingUsers.delete(snap.key);
                    updateTypingDisplay();
                });

                setInterval(() => {
                    const now = Date.now() + serverTimeOffset;
                    let changed = false;
                    typingUsers.forEach((time, name) => {
                        if (now - time > 4000) {
                            typingUsers.delete(name);
                            changed = true;
                        }
                    });
                    if (changed) updateTypingDisplay();
                }, 2000);

                function updateTypingDisplay() {
                    const names = Array.from(typingUsers.keys());
                    if (names.length === 0) {
                        typingWrapper.style.display = "none";
                        return;
                    }
                    typingWrapper.style.display = "flex";
                    let msg = "";
                    if (names.length === 1) msg = `${names[0]} يكتب...`;
                    else if (names.length === 2) msg = `${names[0]} و ${names[1]} يكتبان...`;
                    else msg = `عدة أشخاص يكتبون...`;
                    typingText.textContent = msg;
                }

                typingRef.child(username).onDisconnect().remove();
            }

            // ==================== تنظيف المشغل ====================
            function cleanupPlayer() {
                if (currentPlayer) {
                    try {
                        if (playerEventListeners.length > 0) {
                            playerEventListeners.forEach(({ element, event, handler }) => {
                                if (element) element.removeEventListener(event, handler);
                            });
                            playerEventListeners = [];
                        }

                        if (currentPlayer.hls) {
                            currentPlayer.hls.destroy();
                            currentPlayer.hls = null;
                        }

                        if (currentPlayer.video) {
                            currentPlayer.video.pause();
                            currentPlayer.video.src = '';
                            currentPlayer.video.load();
                        }
                    } catch (e) {
                        console.warn('Error cleaning up player:', e);
                    }
                    currentPlayer = null;
                }
            }

            // ==================== مشغل Netflix المحسن ====================
            function createNetflixPlayer(container, source, type) {
                cleanupPlayer();
                const eventListeners = [];

                function addListener(element, event, handler) {
                    element.addEventListener(event, handler);
                    eventListeners.push({ element, event, handler });
                }

                const isHLS = (type === 'application/x-mpegURL' || source.includes('.m3u8') || source.includes('.m3u'));

                const wrapper = document.createElement('div');
                wrapper.className = 'nplayer';

                const videoWrap = document.createElement('div');
                videoWrap.className = 'nplayer-video-wrap';
                const video = document.createElement('video');
                video.playsInline = true;
                video.muted = false;
                videoWrap.appendChild(video);

                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'nplayer-loading';
                loadingDiv.innerHTML = '<span>⏳ جاري التحميل...</span>';
                videoWrap.appendChild(loadingDiv);

                const errorDiv = document.createElement('div');
                errorDiv.className = 'nplayer-error';
                errorDiv.innerHTML =
                    `<span>⚠️ فشل التشغيل</span><button class="retry-btn">إعادة المحاولة</button>`;
                videoWrap.appendChild(errorDiv);

                wrapper.appendChild(videoWrap);

                // شريط التحكم
                const controls = document.createElement('div');
                controls.className = 'nplayer-controls';

                const prog = document.createElement('div');
                prog.className = 'nprogress';
                const buffer = document.createElement('div');
                buffer.className = 'nprogress-buffer';
                const played = document.createElement('div');
                played.className = 'nprogress-played';
                const inputRange = document.createElement('input');
                inputRange.type = 'range';
                inputRange.min = 0;
                inputRange.max = 100;
                inputRange.value = 0;
                inputRange.className = 'nprogress-input';
                prog.appendChild(buffer);
                prog.appendChild(played);
                prog.appendChild(inputRange);

                const row = document.createElement('div');
                row.className = 'ncontrols-row';

                const playBtn = document.createElement('button');
                playBtn.innerHTML = '▶';
                const rewindBtn = document.createElement('button');
                rewindBtn.innerHTML = '⏪';
                const forwardBtn = document.createElement('button');
                forwardBtn.innerHTML = '⏩';

                const volWrap = document.createElement('div');
                volWrap.className = 'nvolume-wrap';
                const volBtn = document.createElement('button');
                volBtn.innerHTML = '🔊';
                const volSlider = document.createElement('input');
                volSlider.type = 'range';
                volSlider.min = 0;
                volSlider.max = 1;
                volSlider.step = 0.05;
                volSlider.value = 1;
                volSlider.className = 'nvolume-slider';
                volWrap.appendChild(volBtn);
                volWrap.appendChild(volSlider);

                const timeDisplay = document.createElement('span');
                timeDisplay.className = 'ntime';

                const speedWrap = document.createElement('div');
                speedWrap.className = 'nspeed-menu';
                const speedBtn = document.createElement('button');

                const speedDropdown = document.createElement('div');
                speedDropdown.className = 'nspeed-dropdown';
                [0.5, 0.75, 1, 1.25, 1.5, 2].forEach(s => {
                    const b = document.createElement('button');
                    b.textContent = s + 'x';

                    b.onclick = (e) => {
                        e.stopPropagation();
                        video.playbackRate = s;
                        speedBtn.textContent = s + 'x';
                        speedDropdown.querySelectorAll('button').forEach(btn => btn.classList.remove(
                            'active'));
                        b.classList.add('active');
                        speedDropdown.style.display = 'none';
                    };
                    speedDropdown.appendChild(b);
                });
                speedWrap.appendChild(speedBtn);
                speedWrap.appendChild(speedDropdown);

                const qualityWrap = document.createElement('div');
                qualityWrap.className = 'nquality-menu';
                const qualityBtn = document.createElement('button');
                qualityBtn.textContent = 'تلقائي';
                const qualityDropdown = document.createElement('div');
                qualityDropdown.className = 'nquality-dropdown';
                qualityWrap.appendChild(qualityBtn);
                qualityWrap.appendChild(qualityDropdown);

                const fsBtn = document.createElement('button');
                fsBtn.className = 'nfullscreen';
                fsBtn.innerHTML = '⛶';

                row.appendChild(playBtn);
                row.appendChild(rewindBtn);
                row.appendChild(forwardBtn);
                row.appendChild(volWrap);
                row.appendChild(timeDisplay);
                row.appendChild(speedWrap);
                row.appendChild(qualityWrap);
                row.appendChild(fsBtn);

                controls.appendChild(prog);
                controls.appendChild(row);
                wrapper.appendChild(controls);
                container.appendChild(wrapper);

                let hlsInstance = null;
                let retryCount = 0;
                const MAX_RETRY = 2;

                // إظهار/إخفاء التحكم
                let controlsTimeout;
                function showControls(show) {
                    if (show) {
                        controls.classList.add('show');
                        clearTimeout(controlsTimeout);
                        controlsTimeout = setTimeout(() => {
                            if (!video.paused) controls.classList.remove('show');
                        }, 3000);
                    } else {
                        controls.classList.remove('show');
                        clearTimeout(controlsTimeout);
                    }
                }

                addListener(videoWrap, 'mousemove', () => showControls(true));
                addListener(videoWrap, 'touchstart', () => showControls(true));
                addListener(video, 'play', () => showControls(true));
                addListener(video, 'pause', () => showControls(true));

                // تحميل التدفق
                function loadStream(url) {
                    loadingDiv.style.display = 'flex';
                    errorDiv.style.display = 'none';
                    if (hlsInstance) {
                        hlsInstance.destroy();
                        hlsInstance = null;
                    }

                    if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
                        hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            loadingDiv.style.display = 'none';
                            populateQualityMenu(hlsInstance.levels);
                            video.play().catch(() => {});
                        });
                        hlsInstance.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                            const level = hlsInstance.levels[data.level];
                            if (level) qualityBtn.textContent = level.height ? level.height + 'p' : 'HD';
                        });
                        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                            if (data.fatal) {
                                if (retryCount < MAX_RETRY) {
                                    retryCount++;
                                    loadingDiv.innerHTML =
                                        `<span>🔄 إعادة المحاولة (${retryCount}/${MAX_RETRY})...</span>`;
                                    setTimeout(() => loadStream(url), 1000);
                                } else {
                                    loadingDiv.style.display = 'none';
                                    errorDiv.style.display = 'flex';
                                }
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play().catch(() => {});
                        loadingDiv.style.display = 'none';
                    } else {
                        video.src = url;
                        video.play().catch(() => {});
                        loadingDiv.style.display = 'none';
                    }
                }

                // قائمة الجودة
                function populateQualityMenu(levels) {
                    qualityDropdown.innerHTML = '';
                    const autoBtn = document.createElement('button');

                        qualityDropdown.style.display = 'none';

                    qualityDropdown.appendChild(autoBtn);

                    if (levels && levels.length > 0) {
                        levels.forEach((level, idx) => {
                            const h = level.height ? level.height + 'p' : (level.bitrate ? Math.round(level
                                .bitrate / 1000) + 'k' : 'HD');
                            const btn = document.createElement('button');
                            btn.textContent = h;
                            btn.dataset.level = idx;
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                if (hlsInstance) hlsInstance.currentLevel = idx;
                                qualityBtn.textContent = h;
                                qualityDropdown.querySelectorAll('button').forEach(b => b.classList
                                    .remove('active'));
                                btn.classList.add('active');
                                qualityDropdown.style.display = 'none';
                            };
                            qualityDropdown.appendChild(btn);
                        });
                    }
                }

                // تحديث شريط التقدم
                function updateProgress() {
                    if (video.duration && !isNaN(video.duration)) {
                        const pct = (video.currentTime / video.duration) * 100;
                        played.style.width = pct + '%';
                        inputRange.value = pct;
                        if (video.buffered.length > 0) {
                            const bufEnd = video.buffered.end(video.buffered.length - 1);
                            buffer.style.width = ((bufEnd / video.duration) * 100) + '%';
                        }
                        const fmt = (t) => {
                            if (isNaN(t)) return '00:00';
                            const m = Math.floor(t / 60);
                            const s = Math.floor(t % 60);
                            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
                        };
                        timeDisplay.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
                    }
                }

                addListener(video, 'timeupdate', updateProgress);
                addListener(video, 'progress', updateProgress);
                addListener(video, 'loadedmetadata', () => {
                    loadingDiv.style.display = 'none';
                    updateProgress();
                });

                // أحداث الأزرار
                playBtn.onclick = () => { video.paused ? video.play().catch(() => {}) : video.pause(); };
                addListener(video, 'play', () => { playBtn.innerHTML = '⏸'; });
                addListener(video, 'pause', () => { playBtn.innerHTML = '▶'; });

                rewindBtn.onclick = () => { video.currentTime = Math.max(0, video.currentTime - 10); };
                forwardBtn.onclick = () => { video.currentTime = Math.min(video.duration || 0, video.currentTime + 10); };

                volBtn.onclick = () => {
                    video.muted = !video.muted;
                    volBtn.innerHTML = video.muted ? '🔇' : (video.volume > 0.5 ? '🔊' : '🔉');
                };
                volSlider.oninput = () => {
                    video.volume = parseFloat(volSlider.value);
                    video.muted = false;
                    volBtn.innerHTML = video.volume > 0.5 ? '🔊' : '🔉';
                };
                addListener(video, 'volumechange', () => {
                    volSlider.value = video.volume;
                    volBtn.innerHTML = video.muted ? '🔇' : (video.volume > 0.5 ? '🔊' : '🔉');
                });

                inputRange.oninput = () => { played.style.width = inputRange.value + '%'; };
                inputRange.onchange = () => {
                    if (video.duration) video.currentTime = (parseFloat(inputRange.value) / 100) * video.duration;
                };
                prog.addEventListener('click', (e) => {
                    if (e.target === inputRange) return;
                    const rect = prog.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    if (video.duration) video.currentTime = x * video.duration;
                });

                speedBtn.onclick = (e) => {
                    e.stopPropagation();
                    speedDropdown.style.display = speedDropdown.style.display === 'block' ? 'none' : 'block';
                    qualityDropdown.style.display = 'none';
                };
                qualityBtn.onclick = (e) => {
                    e.stopPropagation();
                    qualityDropdown.style.display = qualityDropdown.style.display === 'block' ? 'none' : 'block';
                    speedDropdown.style.display = 'none';
                };

                document.addEventListener('click', () => {
                    speedDropdown.style.display = 'none';
                    qualityDropdown.style.display = 'none';
                });

                fsBtn.onclick = () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        container.closest('#pinnedVideoPlayer').requestFullscreen().catch(() => {});
                    }
                };

                // زر إعادة المحاولة
                errorDiv.querySelector('.retry-btn').onclick = () => {
                    retryCount = 0;
                    loadStream(source);
                };

                loadStream(source);
                currentPlayer = { video, hls: hlsInstance, container: wrapper };
                playerEventListeners = eventListeners;
                return currentPlayer;
            }

            // ==================== Twitter ====================
            async function fetchTwitterVideos(tweetId) {
                const videos = [];
                try {
                    const res = await fetch(`https://api.fxtwitter.com/status/${tweetId}`);
                    if (res.ok) {
                        const data = await res.json();
                        const media = data.tweet?.media?.videos || [];
                        for (let v of media)
                            if (v.url) videos.push({ url: v.url, type: 'video/mp4' });
                    }
                } catch (e) { console.warn('Twitter API error:', e); }
                if (videos.length) return videos;
                try {
                    const res = await fetch(`https://api.vxtwitter.com/status/${tweetId}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.media_extended) {
                            for (let m of data.media_extended) {
                                if ((m.type === 'video' || m.type === 'gif') && m.url) videos.push({ url: m.url,
                                    type: 'video/mp4' });
                            }
                        }
                    }
                } catch (e) { console.warn('vxTwitter API error:', e); }
                return videos;
            }

            function embedTwitterNative(container, tweetId) {
                container.innerHTML = '';
                container.style.background = '#15202b';
                const iframe = document.createElement('iframe');
                iframe.src =
                `https://platform.twitter.com/embed/Tweet.html?id=${tweetId}&theme=dark&lang=ar`;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.minHeight = '320px';
                iframe.style.border = 'none';
                iframe.setAttribute('allowfullscreen', 'true');
                container.appendChild(iframe);
                if (!window.twttr) {
                    const script = document.createElement('script');
                    script.src = 'https://platform.twitter.com/widgets.js';
                    script.async = true;
                    document.head.appendChild(script);
                }
            }

            // ==================== السحب والإفلات ====================
            function makeDraggable(element, handle) {
                let startX, startY, startLeft, startTop, isDragging = false;
                const getPos = (e) => e.touches ? e.touches[0] : e;

                function onStart(e) {
                    if (e.target.classList && e.target.classList.contains('close-pinned-video')) return;
                    e.preventDefault();
                    isDragging = true;
                    const pos = getPos(e);
                    startX = pos.clientX;
                    startY = pos.clientY;
                    startLeft = element.offsetLeft;
                    startTop = element.offsetTop;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchend', onEnd);
                }

                function onMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    const pos = getPos(e);
                    let newLeft = startLeft + (pos.clientX - startX);
                    let newTop = startTop + (pos.clientY - startY);
                    if (window.innerWidth <= 600) return;
                    newLeft = Math.min(window.innerWidth - element.offsetWidth, Math.max(0, newLeft));
                    newTop = Math.min(window.innerHeight - element.offsetHeight, Math.max(0, newTop));
                    element.style.left = newLeft + 'px';
                    element.style.top = newTop + 'px';
                    element.style.right = 'auto';
                    element.style.bottom = 'auto';
                }

                function onEnd() {
                    isDragging = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchend', onEnd);
                }

                handle.addEventListener('mousedown', onStart);
                handle.addEventListener('touchstart', onStart, { passive: false });
            }

            function makeResizable(element, handle) {
                let startW, startH, startX, startY;
                const getPos = (e) => e.touches ? e.touches[0] : e;

                function onStart(e) {
                    e.preventDefault();
                    startW = element.offsetWidth;
                    startH = element.offsetHeight;
                    const pos = getPos(e);
                    startX = pos.clientX;
                    startY = pos.clientY;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchend', onEnd);
                }

                function onMove(e) {
                    e.preventDefault();
                    const pos = getPos(e);
                    let newW = startW + (pos.clientX - startX);
                    let newH = startH + (pos.clientY - startY);
                    if (newW > 280) element.style.width = newW + 'px';
                    if (newH > 200) element.style.height = newH + 'px';
                }

                function onEnd() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                }

                handle.addEventListener('mousedown', onStart);
                handle.addEventListener('touchstart', onStart, { passive: false });
            }

            // ==================== إغلاق النوافذ ====================
            function closeAllModals() {
                usersBox.style.display = 'none';
                setVideoModal.style.display = 'none';
                overlay.style.display = 'none';
            }

            function renderUsersList(users) {
                const list = document.getElementById("usersList");
                list.innerHTML = '';
                const now = Date.now() + serverTimeOffset;
                if (!users || Object.keys(users).length === 0) {
                    list.innerHTML =
                        '<div style="text-align:center;color:var(--text-muted);padding:15px;">لا يوجد متصلين حالياً</div>';
                    return;
                }
                for (let u in users) {
                    const last = users[u].lastActive || 0;
                    let statusClass = 'status-gray';
                    const diff = now - last;
                    if (diff < 30000) statusClass = 'status-green';
                    else if (diff < 60000) statusClass = 'status-yellow';

                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <span class="status-indicator ${statusClass}"></span>
                        <span>${escapeHtml(u)}</span>
                        ${u === username ? '<span style="color:var(--accent);font-size:11px;">(أنت)</span>' : ''}
                    `;
                    list.appendChild(div);
                }
            }

            // ==================== بدء الدردشة ====================
            function startChat() {
                loginScreen.style.display = 'none';
                chatContainer.style.display = 'flex';

                db.ref('.info/serverTimeOffset').on('value', snap => serverTimeOffset = snap.val() || 0);

                userRef = db.ref("online/" + username);
                messagesRef = db.ref("messages");
                onlineRef = db.ref("online");
                pinnedVideoRef = db.ref("pinned_video");

                userRef.set({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                userRef.onDisconnect().remove();
                setInterval(() => { userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP }); }, 30000);

                db.ref('.info/connected').on('value', (snap) => {
                    if (snap.val() === true) {
                        showToast('✅ متصل بالخادم', 'success');
                    } else {
                        showToast('⚠️ فقدان الاتصال بالخادم', 'error');
                    }
                });

                // تنظيف المستخدمين غير النشطين
                setInterval(() => {
                    const now = Date.now() + serverTimeOffset;
                    onlineRef.once('value', snap => {
                        snap.forEach(child => {
                            if (now - (child.val().lastActive || 0) > 120000) {
                                child.ref.remove();
                            }
                        });
                    });
                }, 60000);

                // إرسال الرسائل
                document.getElementById("inputArea").onsubmit = (e) => {
                    e.preventDefault();
                    const text = sanitizeInput(messageInput.value.trim());
                    if (!text) return;
                    if (!rateLimiter.canSend()) return;

                    messagesRef.push({
                        user: username,
                        text: text,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).catch(err => {
                        console.error('Send error:', err);
                        showToast('❌ فشل إرسال الرسالة', 'error');
                    });

                    messageInput.value = "";
                    messageInput.focus();
                    scrollToBottom();
                    if (typingRef) typingRef.child(username).remove();
                    clearTimeout(typingTimeout);
                };

                // استقبال الرسائل
                messagesRef.limitToLast(MESSAGE_LIMIT).on("child_added", snap => {
                    const val = snap.val();
                    if (val && val.user && val.text) {
                        const timestamp = val.timestamp || Date.now() + serverTimeOffset;
                        addMessageToUI(snap.key, { user: val.user, text: val.text, timestamp: timestamp });
                    }
                });

                messagesRef.on("child_removed", snap => {
                    messageTimestamps.delete(snap.key);
                    const el = document.getElementById(`msg-${snap.key}`);
                    if (el) el.remove();
                });

                // قائمة المتصلين
                onlineRef.on("value", snap => {
                    const count = snap.numChildren();
                    document.getElementById("count").innerText = count;
                    renderUsersList(snap.val() || {});
                });

                // أزرار النوافذ
                onlineListBtn.onclick = () => {
                    usersBox.style.display = 'block';
                    overlay.style.display = 'block';
                };

                setVideoBtn.onclick = () => {
                    setVideoModal.style.display = 'block';
                    overlay.style.display = 'block';
                };

                overlay.onclick = closeAllModals;

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeAllModals();
                });

                // تثبيت الفيديو
                submitVideoUrlBtn.onclick = async () => {
                    const raw = videoUrlInput.value.trim();
                    if (!raw) {
                        showToast('⚠️ يرجى إدخال رابط الفيديو', 'warning');
                        return;
                    }

                    try {
                        const cleanUrl = extractCleanUrl(raw) || raw;
                        const expandedUrl = await expandShortUrl(cleanUrl);
                        const media = detectMediaType(expandedUrl);

                        switch (media.type) {
                            case 'youtube':
                                await pinnedVideoRef.set({ type: 'youtube', id: media.id, setBy: username });
                                break;
                            case 'twitter':
                                await pinnedVideoRef.set({ type: 'twitter', id: media.id, setBy: username });
                                break;
                            case 'hls':
                                await pinnedVideoRef.set({ type: 'm3u', url: expandedUrl, setBy: username });
                                break;
                            case 'directVideo':
                                await pinnedVideoRef.set({ type: 'direct', url: expandedUrl, setBy: username });
                                break;
                            default:
                                showToast('⚠️ رابط غير مدعوم', 'warning');
                                return;
                        }

                        videoUrlInput.value = "";
                        closeAllModals();
                        showToast('✅ تم تثبيت الفيديو بنجاح', 'success');
                    } catch (error) {
                        console.error('Video set error:', error);
                        showToast('❌ فشل تثبيت الفيديو', 'error');
                    }
                };

                // مراقبة الفيديو المثبت
                pinnedVideoRef.on("value", async (snap) => {
                    cleanupPlayer();
                    pinnedVideoPlayer.innerHTML = '';
                    const data = snap.val();

                    if (!data) {
                        pinnedVideoPlayer.style.display = 'none';
                        return;
                    }

                    pinnedVideoPlayer.style.display = 'flex';
                    const header = document.createElement('div');
                    header.className = 'video-header';
                    header.innerHTML = `<span>🎬 بث - ${escapeHtml(data.setBy || 'مجهول')}</span>`;
                    const closeBtn = document.createElement('button');
                    closeBtn.className = 'close-pinned-video';
                    closeBtn.innerHTML = '✕';
                    closeBtn.onclick = (e) => {
                        e.stopPropagation();
                        cleanupPlayer();
                        pinnedVideoRef.remove();
                    };
                    header.appendChild(closeBtn);

                    const body = document.createElement('div');
                    body.className = 'video-body';

                    const resizeHandle = document.createElement('div');
                    resizeHandle.className = 'resize-handle';

                    pinnedVideoPlayer.appendChild(header);
                    pinnedVideoPlayer.appendChild(body);
                    pinnedVideoPlayer.appendChild(resizeHandle);

                    makeDraggable(pinnedVideoPlayer, header);
                    makeResizable(pinnedVideoPlayer, resizeHandle);

                    try {
                        if (data.type === 'youtube') {
                            body.innerHTML =
                                `<iframe src="https://www.youtube.com/embed/${data.id}?autoplay=1&rel=0" style="width:100%;aspect-ratio:16/9;border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                            currentPlayer = { video: null, hls: null, container: body };
                        } else if (data.type === 'm3u' || data.type === 'direct') {
                            const mime = data.type === 'm3u' ? 'application/x-mpegURL' : 'video/mp4';
                            createNetflixPlayer(body, data.url, mime);
                        } else if (data.type === 'twitter') {
                            embedTwitterNative(body, data.id);
                            const videos = await fetchTwitterVideos(data.id);
                            if (videos.length > 0) {
                                body.innerHTML = '';
                                createNetflixPlayer(body, videos[0].url, 'video/mp4');
                                if (videos.length > 1) {
                                    const bar = document.createElement('div');
                                    bar.className = 'video-selector-bar';
                                    videos.forEach((v, idx) => {
                                        const btn = document.createElement('button');
                                        btn.className = 'video-selector-btn' + (idx === 0 ? ' active' :
                                            '');
                                        btn.textContent = `🎥 مقطع ${idx+1}`;
                                        btn.onclick = () => {
                                            body.innerHTML = '';
                                            createNetflixPlayer(body, v.url, 'video/mp4');
                                            bar.querySelectorAll('.video-selector-btn').forEach(
                                                b => b.classList.remove('active'));
                                            btn.classList.add('active');
                                        };
                                        bar.appendChild(btn);
                                    });
                                    body.appendChild(bar);
                                }
                            }
                        }
                        showToast(`🎬 ${escapeHtml(data.setBy || 'مجهول')} قام بتشغيل فيديو`, 'info');
                    } catch (error) {
                        console.error('Video playback error:', error);
                        showToast('❌ فشل تشغيل الفيديو', 'error');
                    }
                });

                initTypingIndicator();
                messageInput.focus();
            }

            // ==================== تسجيل الدخول ====================
            function attemptLogin() {
                let raw = usernameInput.value.trim();
                if (!raw) {
                    showToast('⚠️ الرجاء إدخال اسم المستخدم', 'warning');
                    return;
                }
                if (/[.#$[\]/]/.test(raw)) {
                    showToast('⚠️ لا يُسمح بأحرف خاصة: . # $ [ ] /', 'warning');
                    return;
                }
                if (raw.length < 2) {
                    showToast('⚠️ الاسم قصير جداً', 'warning');
                    return;
                }
                if (raw.length > 15) {
                    showToast('⚠️ الاسم طويل جداً (الحد الأقصى 15 حرف)', 'warning');
                    return;
                }
                username = raw;
                startChat();
            }

            loginBtn.onclick = attemptLogin;
            usernameInput.onkeypress = (e) => {
                if (e.key === 'Enter') attemptLogin();
            };

            // ==================== تنظيف عند الخروج ====================
            window.addEventListener('beforeunload', () => {
                cleanupPlayer();
                if (userRef) userRef.remove();
                if (typingRef && username) typingRef.child(username).remove();
            });

            // ==================== معالجة الأخطاء العامة ====================
            window.addEventListener('error', (e) => {
                console.error('Global error:', e.error);
            });

            window.addEventListener('unhandledrejection', (e) => {
                console.error('Unhandled promise rejection:', e.reason);
            });

        })();
    </script>
