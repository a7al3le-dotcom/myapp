<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات خاص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-main: #05060a;
            --bg-grad-1: #151624;
            --bg-grad-2: #020307;
            --text-main: #ffffff;
            --text-muted: #a7aec4;
            --accent: #ffd54a;
            --accent-soft: #ffe788;
            --danger: #e53935;
            --ctrl-bg: rgba(0, 0, 0, 0.75);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            font-family: 'Tajawal', sans-serif;
            background: #05060a;
            color: #fff;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            backdrop-filter: blur(16px);
            position: relative;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.7) 45%, rgba(0, 0, 0, 0.9) 100%);
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            margin: 8px 0;
            display: flex;
            gap: 10px;
            align-items: center;
            direction: ltr;
            text-align: left;
            font-size: 15px;
            line-height: 1.4;
            color: var(--text-main);
        }
        .user {
            font-weight: bold;
            color: var(--accent);
        }
        .time {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 32px;
            text-align: right;
        }
        .sys {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 10px auto;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 999px;
        }
        #inputArea {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7));
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 10;
        }
        #messageInput {
            flex: 1;
            font-size: 16px;
            height: 44px;
            padding: 0 15px;
            border-radius: 999px;
            background: rgba(10, 11, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }
        #sendBtn {
            height: 44px;
            padding: 0 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        #topButtons {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            right: calc(10px + env(safe-area-inset-right));
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .btn {
            padding: 6px 12px;
            background: rgba(10, 11, 20, 0.95);
            border-radius: 999px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .btn .count-text {
            font-size: 13px;
            margin-right: 4px;
            color: var(--accent-soft);
            font-weight: 600;
        }
        #usersBox,
        #setVideoModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at top, #181a28 0%, #05060b 55%);
            padding: 20px;
            border-radius: 18px;
            z-index: 1003;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #usersList .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
        }
        .status-green {
            background-color: #2ecc71;
        }
        .status-yellow {
            background-color: #f1c40f;
        }
        .status-gray {
            background-color: #7f8c8d;
        }
        #videoUrlInput {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: rgba(5, 6, 12, 0.95);
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #submitVideoUrlBtn {
            padding: 8px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: #000;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
            backdrop-filter: blur(4px);
        }
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #181a28 0%, rgba(5, 6, 10, 0.96) 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        #loginBox {
            background: rgba(5, 6, 12, 0.98);
            padding: 26px;
            border-radius: 22px;
            text-align: center;
            min-width: 280px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #usernameInput {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 999px;
            font-size: 16px;
            background: rgba(3, 4, 10, 0.96);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
        }
        #loginBtn {
            background: linear-gradient(135deg, var(--accent), #ffe178);
            padding: 10px 26px;
            border-radius: 999px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: #000;
        }

        /* ===== مشغل Netflix ===== */
        #pinnedVideoPlayer {
            position: fixed;
            top: calc(60px + env(safe-area-inset-top));
            left: 10px;
            width: 380px;
            max-width: calc(100% - 20px);
            background: #000;
            border-radius: 16px;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.95);
            z-index: 998;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .video-header {
            background: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            cursor: move;
            touch-action: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-size: 13px;
            color: #ddd;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 5;
        }
        .close-pinned-video {
            background: var(--danger);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border: none;
            color: white;
            z-index: 10;
            pointer-events: auto;
        }
        .resize-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            bottom: 0;
            right: 0;
            cursor: nwse-resize;
            z-index: 10;
        }

        /* داخل المشغل */
        .nplayer {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .nplayer-video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
        }
        .nplayer-video-wrap video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        .nplayer-loading,
        .nplayer-error {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 16px;
            pointer-events: none;
        }
        .nplayer-error {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.85);
        }
        .nplayer-error button {
            margin-top: 12px;
            padding: 8px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        /* شريط التحكم السفلي */
        .nplayer-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            padding: 8px 12px 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
        }
        .nplayer-controls.show {
            opacity: 1;
            pointer-events: auto;
        }
        .nprogress {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .nprogress-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            width: 0%;
        }
        .nprogress-played {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            z-index: 2;
        }
        .nprogress-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
            margin: 0;
        }
        .ncontrols-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .ncontrols-row button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            opacity: 0.8;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 4px;
        }
        .ncontrols-row button:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }
        .ntime {
            font-size: 13px;
            color: #ccc;
            min-width: 90px;
            direction: ltr;
            font-variant-numeric: tabular-nums;
        }
        .nvolume-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .nvolume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
            transition: width 0.2s;
        }
        .nvolume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .nspeed-menu,
        .nquality-menu {
            position: relative;
            display: inline-block;
        }
        .nspeed-dropdown,
        .nquality-dropdown {
            position: absolute;
            bottom: 40px;
            right: 0;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 90px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            z-index: 20;
        }
        .nspeed-dropdown button,
        .nquality-dropdown button {
            background: none;
            border: none;
            color: #ddd;
            padding: 8px 16px;
            width: 100%;
            text-align: right;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        .nspeed-dropdown button:hover,
        .nquality-dropdown button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .nspeed-dropdown button.active,
        .nquality-dropdown button.active {
            color: var(--accent);
            font-weight: bold;
        }

        .nfullscreen {
            margin-right: auto;
        }

        @media (max-width: 600px) {
            #pinnedVideoPlayer {
                left: 50% !important;
                transform: translateX(-50%) !important;
                width: 94vw;
                top: calc(70px + env(safe-area-inset-top));
            }
            #topButtons {
                right: 8px;
                top: 8px;
            }
            #sendBtn {
                padding: 0 14px;
            }
            .nvolume-slider {
                width: 40px;
            }
            .ntime {
                font-size: 11px;
                min-width: 70px;
            }
            .ncontrols-row button {
                font-size: 16px;
                min-width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen">
        <div id="loginBox">
            <h2>👋 أهلاً بك في الدردشة</h2>
            <input type="text" id="usernameInput" placeholder="اسمك (بدون / # . $ [ ])" maxlength="15">
            <button id="loginBtn">دخول</button>
        </div>
    </div>
    <div id="chat-container" style="display: none;">
        <div id="topButtons">
            <div class="btn" id="setVideoBtn">📺</div>
            <div class="btn" id="onlineListBtn">👥 <span id="count" class="count-text">0</span></div>
        </div>
        <div id="pinnedVideoPlayer"></div>
        <div id="setVideoModal"><h4>تثبيت فيديو</h4><input type="text" id="videoUrlInput" placeholder="رابط يوتيوب، تويتر، m3u8، mp4..." /><button id="submitVideoUrlBtn">تثبيت</button></div>
        <div id="usersBox"><h4>المتصلين</h4><div id="usersList"></div></div>
        <div id="overlay"></div>
        <div id="messages"></div>
        <div class="typing-wrapper" id="typingWrapper" style="display: none;"><div id="typingIndicator"></div></div>
        <form id="inputArea">
            <button type="submit" id="sendBtn">إرسال</button>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off" />
        </form>
    </div>
    <script>
        (function() {
            // ========== Firebase ==========
            const firebaseConfig = {
                apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
                authDomain: "mychat-2d881.firebaseapp.com",
                databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            let username = '';
            let userRef, messagesRef, onlineRef, pinnedVideoRef, typingRef;
            let serverTimeOffset = 0;
            const messageTimestamps = new Map();
            let typingTimeout = null;

            // DOM
            const loginScreen = document.getElementById('loginScreen');
            const usernameInput = document.getElementById('usernameInput');
            const loginBtn = document.getElementById('loginBtn');
            const chatContainer = document.getElementById('chat-container');
            const messagesDiv = document.getElementById("messages");
            const messageInput = document.getElementById("messageInput");
            const onlineListBtn = document.getElementById("onlineListBtn");
            const setVideoBtn = document.getElementById("setVideoBtn");
            const usersBox = document.getElementById("usersBox");
            const setVideoModal = document.getElementById("setVideoModal");
            const videoUrlInput = document.getElementById("videoUrlInput");
            const submitVideoUrlBtn = document.getElementById("submitVideoUrlBtn");
            const pinnedVideoPlayer = document.getElementById("pinnedVideoPlayer");
            const overlay = document.getElementById("overlay");
            const typingWrapper = document.getElementById("typingWrapper");
            const typingIndicator = document.getElementById("typingIndicator");

            let currentPlayer = null; // مرجع لمشغل Netflix

            // ========== دوال مساعدة ==========
            function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, function(m) { if (m === '&')
                    return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

            function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }

            function getYoutubeVideoId(url) {
                if (!url) return null;
                const regex = /(?:youtube\.com\/shorts\/|youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                const match = url.match(regex);
                return match ? match[1] : null;
            }

            function getTweetId(url) {
                if (!url) return null;
                const match = url.match(/(?:twitter|x)\.com\/\w+\/status\/(\d+)/);
                return match ? match[1] : null;
            }

            function isDirectVideo(url) {
                return /\.(mp4|webm|mov|m4v)(\?.*)?$/i.test(url) || (url.includes('video') && !url.includes('youtube') &&
                    !url.includes('twitter'));
            }

            function extractCleanUrl(text) {
                const matches = text.match(/(https?:\/\/[^\s]+)/g);
                if (!matches) return null;
                let raw = matches[0];
                raw = raw.replace(/[،،؛\u0600-\u06FF]+$/, '').trim();
                return raw;
            }

            function updateTimeDisplay(key, timestamp, timeElement) {
                if (!timestamp) return;
                const now = Date.now() + serverTimeOffset;
                const diffMs = now - timestamp;
                const diffSec = Math.floor(diffMs / 1000);
                let text = "";
                if (diffSec < 5) text = "الآن";
                else if (diffSec < 60) text = "ثواني";
                else if (diffSec < 120) text = "د1";
                else if (diffSec < 3600) text = `د${Math.floor(diffSec / 60)}`;
                else if (diffSec < 86400) text = `س${Math.floor(diffSec / 3600)}`;
                else if (diffSec < 604800) text = `ي${Math.floor(diffSec / 86400)}`;
                else if (diffSec < 2592000) text = `أ${Math.floor(diffSec / 604800)}`;
                else if (diffSec < 31536000) text = `ش${Math.floor(diffSec / 2592000)}`;
                else text = `ع${Math.floor(diffSec / 31536000)}`;
                if (timeElement) timeElement.textContent = text;
            }

            function addNotification(text) {
                const div = document.createElement("div");
                div.className = "sys";
                div.textContent = text;
                messagesDiv.appendChild(div);
                scrollToBottom();
                setTimeout(() => { if (div.parentNode) div.remove(); }, 5000);
            }

            function addMessageToUI(key, { user, text, timestamp }) {
                const div = document.createElement("div");
                div.className = "msg";
                div.id = `msg-${key}`;
                const userSpan = document.createElement("span");
                userSpan.className = "user";
                userSpan.textContent = escapeHtml(user);
                const textSpan = document.createElement("span");
                textSpan.style.flex = "1";
                textSpan.style.wordBreak = "break-word";
                textSpan.textContent = escapeHtml(text);
                const timeSpan = document.createElement("span");
                timeSpan.className = "time";
                timeSpan.id = `time-${key}`;
                div.appendChild(userSpan);
                div.appendChild(textSpan);
                div.appendChild(timeSpan);
                messagesDiv.appendChild(div);
                messageTimestamps.set(key, { timestamp, element: timeSpan });
                updateTimeDisplay(key, timestamp, timeSpan);
                scrollToBottom();
            }

            setInterval(() => {
                messageTimestamps.forEach(({ timestamp, element }, key) => {
                    updateTimeDisplay(key, timestamp, element);
                });
            }, 60000);

            // ========== Typing ==========
            function initTypingIndicator() {
                typingRef = db.ref("typing");
                let isTyping = false;
                messageInput.addEventListener("input", (e) => {
                    const text = e.target.value;
                    if (text.length > 0 && !isTyping) {
                        isTyping = true;
                        typingRef.child(username).set({ time: firebase.database.ServerValue.TIMESTAMP });
                        if (typingTimeout) clearTimeout(typingTimeout);
                    } else if (text.length === 0 && isTyping) { stopTyping(); } else {
                        if (typingTimeout) clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            if (isTyping && messageInput.value.length === 0) stopTyping();
                            else if (isTyping) { typingRef.child(username).set({ time: firebase.database
                                    .ServerValue.TIMESTAMP }); }
                        }, 1000);
                    }
                });
                messageInput.addEventListener("keydown", () => {
                    if (!isTyping && messageInput.value.length > 0) {
                        isTyping = true;
                        typingRef.child(username).set({ time: firebase.database.ServerValue.TIMESTAMP });
                    }
                    if (typingTimeout) clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => {
                        if (isTyping && messageInput.value.length > 0) { typingRef.child(username).set({ time: firebase
                                .database.ServerValue.TIMESTAMP }); } else if (isTyping && messageInput.value
                            .length === 0) stopTyping();
                    }, 1200);
                });

                function stopTyping() {
                    if (isTyping) { isTyping = false;
                        typingRef.child(username).remove(); }
                    if (typingTimeout) clearTimeout(typingTimeout);
                }
                document.getElementById("inputArea").addEventListener("submit", () => { stopTyping(); });

                let typingUsers = new Map();
                typingRef.on("child_added", (snap) => {
                    const name = snap.key;
                    if (name === username) return;
                    const data = snap.val();
                    if (data && data.time) typingUsers.set(name, data.time);
                    updateTypingDisplay();
                });
                typingRef.on("child_changed", (snap) => {
                    const name = snap.key;
                    if (name === username) return;
                    const data = snap.val();
                    if (data && data.time) typingUsers.set(name, data.time);
                    updateTypingDisplay();
                });
                typingRef.on("child_removed", (snap) => {
                    const name = snap.key;
                    if (name === username) return;
                    typingUsers.delete(name);
                    updateTypingDisplay();
                });
                setInterval(() => {
                    const now = Date.now() + serverTimeOffset;
                    let changed = false;
                    for (let [name, ts] of typingUsers.entries()) {
                        if (now - ts > 3000) { typingUsers.delete(name);
                            changed = true; }
                    }
                    if (changed) updateTypingDisplay();
                }, 2000);

                function updateTypingDisplay() {
                    const names = Array.from(typingUsers.keys());
                    if (names.length === 0) { typingWrapper.style.display = "none"; return; }
                    typingWrapper.style.display = "flex";

                    else msg = `عدة أشخاص يكتبون...`;
                    typingIndicator.textContent = msg;
                }
                typingRef.child(username).onDisconnect().remove();
            }

                volWrap.appendChild(volSlider);

                speedWrap.appendChild(speedDropdown);

                const qualityWrap = document.createElement('div');
                qualityWrap.className = 'nquality-menu';

                row.appendChild(rewindBtn);
                row.appendChild(forwardBtn);
                row.appendChild(volWrap);
                row.appendChild(timeDisplay);
                row.appendChild(speedWrap);
                row.appendChild(qualityWrap);
                row.appendChild(fsBtn);

                controls.appendChild(prog);
                controls.appendChild(row);
                wrapper.appendChild(controls);
                container.appendChild(wrapper);

                // المتغيرات
                let isDraggingProgress = false;
                let hlsInstance = null;
                let retryCount = 0;
                const MAX_RETRY = 2;

                // ===== دالة إظهار/إخفاء التحكم =====
                let controlsTimeout = null;

                function showControls(show) {
                    if (show) {
                        controls.classList.add('show');
                        clearTimeout(controlsTimeout);
                        controlsTimeout = setTimeout(() => {
                            if (!video.paused) controls.classList.remove('show');
                        }, 3000);
                    } else {
                        controls.classList.remove('show');
                        clearTimeout(controlsTimeout);
                    }
                }

                videoWrap.addEventListener('mousemove', () => { showControls(true); });
                videoWrap.addEventListener('touchstart', () => { showControls(true); });
                video.addEventListener('play', () => { showControls(true); });
                video.addEventListener('pause', () => { showControls(true); });

                // ===== تشغيل HLS =====
                function loadStream(url) {
                    loadingDiv.style.display = 'flex';
                    errorDiv.style.display = 'none';
                    if (hlsInstance) {
                        hlsInstance.destroy();
                        hlsInstance = null;
                    }
                    if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) {
                        hlsInstance = new Hls({
                            enableWorker: true,
                            lowLatencyMode: true,
                        });
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                            loadingDiv.style.display = 'none';
                            // ملء قائمة الجودة
                            populateQualityMenu(hlsInstance.levels);
                            video.play().catch(() => {});
                        });
                        hlsInstance.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
                            const level = hlsInstance.levels[data.level];
                            if (level) {
                                const h = level.height ? level.height + 'p' : 'HD';
                                qualityBtn.textContent = h;
                            }
                        });
                        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                            if (data.fatal) {
                                if (retryCount < MAX_RETRY) {
                                    retryCount++;
                                    loadingDiv.innerHTML = `<span>🔄 إعادة المحاولة (${retryCount}/${MAX_RETRY})...</span>`;
                                    loadStream(url);
                                } else {
                                    loadingDiv.style.display = 'none';
                                    errorDiv.style.display = 'flex';
                                    errorDiv.querySelector('span').textContent =
                                        '⚠️ تعذر تشغيل التدفق (صلاحية منتهية أو مشكلة في الشبكة)';
                                }
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play().catch(() => {});
                        loadingDiv.style.display = 'none';
                    } else {
                        loadingDiv.style.display = 'none';
                        errorDiv.style.display = 'flex';
                        errorDiv.querySelector('span').textContent = '⚠️ المتصفح لا يدعم HLS';
                    }
                }

                // ===== قائمة الجودة =====
                function populateQualityMenu(levels) {
                    qualityDropdown.innerHTML = '';
                    // زر تلقائي
                    const autoBtn = document.createElement('button');
                    autoBtn.textContent = 'تلقائي';
                    autoBtn.dataset.level = '-1';
                    autoBtn.classList.add('active');
                    autoBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (hlsInstance) {
                            hlsInstance.currentLevel = -1;
                            qualityBtn.textContent = 'تلقائي';
                        }
                        qualityDropdown.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                        autoBtn.classList.add('active');
                        qualityDropdown.style.display = 'none';
                    };
                    qualityDropdown.appendChild(autoBtn);

                    if (!levels || levels.length === 0) {
                        const noBtn = document.createElement('button');
                        noBtn.textContent = 'لا تتوفر';
                        noBtn.disabled = true;
                        qualityDropdown.appendChild(noBtn);
                        return;
                    }
                    levels.forEach((level, idx) => {
                        const h = level.height ? level.height + 'p' : (level.bitrate ? Math.round(level
                            .bitrate / 1000) + 'k' : 'HD');
                        const btn = document.createElement('button');
                        btn.textContent = h;
                        btn.dataset.level = idx;
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            if (hlsInstance) {
                                hlsInstance.currentLevel = idx;
                                qualityBtn.textContent = h;
                            }
                            qualityDropdown.querySelectorAll('button').forEach(b => b.classList.remove(
                            'active'));
                            btn.classList.add('active');
                            qualityDropdown.style.display = 'none';
                        };
                        qualityDropdown.appendChild(btn);
                    });
                }

                // ===== تحديث شريط التقدم =====
                function updateProgress() {
                    if (video.duration) {
                        const pct = (video.currentTime / video.duration) * 100;
                        played.style.width = pct + '%';
                        inputRange.value = pct;
                        // Buffer
                        if (video.buffered.length > 0) {
                            const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                            const bufPct = (bufferedEnd / video.duration) * 100;
                            buffer.style.width = bufPct + '%';
                        }
                        // الوقت
                        const format = (t) => {
                            const m = Math.floor(t / 60);
                            const s = Math.floor(t % 60);
                            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
                        };
                        timeDisplay.textContent = format(video.currentTime) + ' / ' + format(video.duration);
                    }
                }

                // ===== أحداث الفيديو =====
                video.addEventListener('timeupdate', updateProgress);
                video.addEventListener('progress', updateProgress);
                video.addEventListener('loadedmetadata', () => {
                    loadingDiv.style.display = 'none';
                    updateProgress();
                });

                // ===== أزرار التحكم =====
                playBtn.onclick = () => {
                    if (video.paused) { video.play(); } else { video.pause(); }
                };
                video.addEventListener('play', () => { playBtn.innerHTML = '⏸'; });
                video.addEventListener('pause', () => { playBtn.innerHTML = '▶'; });

                rewindBtn.onclick = () => { video.currentTime = Math.max(0, video.currentTime - 10); };
                forwardBtn.onclick = () => { video.currentTime = Math.min(video.duration, video.currentTime + 10); };

                volBtn.onclick = () => { video.muted = !video.muted;
                    volBtn.innerHTML = video.muted ? '🔇' : '🔊'; };
                volSlider.oninput = () => { video.volume = parseFloat(volSlider.value);
                    video.muted = false;
                    volBtn.innerHTML = '🔊'; };
                video.addEventListener('volumechange', () => {
                    volSlider.value = video.volume;
                    volBtn.innerHTML = video.muted ? '🔇' : (video.volume > 0.5 ? '🔊' : '🔉');
                });

                // شريط التقدم
                inputRange.oninput = () => {
                    isDraggingProgress = true;
                    const val = parseFloat(inputRange.value);
                    played.style.width = val + '%';
                };
                inputRange.onchange = () => {
                    isDraggingProgress = false;
                    if (video.duration) {
                        video.currentTime = (parseFloat(inputRange.value) / 100) * video.duration;
                    }
                };
                prog.addEventListener('click', (e) => {
                    if (e.target === inputRange) return;
                    const rect = prog.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    if (video.duration) {
                        video.currentTime = x * video.duration;
                    }
                });

                // السرعة
                speedBtn.onclick = (e) => {
                    e.stopPropagation();
                    speedDropdown.style.display = speedDropdown.style.display === 'block' ? 'none' : 'block';
                    qualityDropdown.style.display = 'none';
                };

                // الجودة
                qualityBtn.onclick = (e) => {
                    e.stopPropagation();
                    qualityDropdown.style.display = qualityDropdown.style.display === 'block' ? 'none' : 'block';
                    speedDropdown.style.display = 'none';
                };

                // ملء الشاشة
                fsBtn.onclick = () => {
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        container.closest('#pinnedVideoPlayer').requestFullscreen().catch(() => {});
                    }
                };

                // إعادة المحاولة
                document.getElementById('nplayer-retry').onclick = () => {
                    retryCount = 0;
                    loadStream(source);
                };

                // ===== بدء التحميل =====
                loadStream(source);

                // حفظ المراجع
                currentPlayer = { video, hls: hlsInstance, container: wrapper };

                // تنظيف عند الإزالة
                return currentPlayer;
            }

            // ===== Twitter =====
            async function fetchTwitterVideos(tweetId) {
                const videos = [];
                try {
                    const res = await fetch(`https://api.fxtwitter.com/status/${tweetId}`);
                    if (res.ok) {
                        const data = await res.json();
                        const media = data.tweet?.media?.videos || [];
                        for (let v of media)
                            if (v.url) videos.push({ url: v.url, type: 'video/mp4' });
                    }
                } catch (e) { console.warn(e); }
                if (videos.length) return videos;
                try {
                    const res = await fetch(`https://api.vxtwitter.com/status/${tweetId}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.media_extended) {
                            for (let m of data.media_extended) {
                                if ((m.type === 'video' || m.type === 'gif') && m.url) videos.push({ url: m.url,
                                    type: 'video/mp4' });
                            }
                        }
                    }
                } catch (e) { console.warn(e); }
                return videos;
            }

            // ===== سحب وإفلات =====
            function makeDraggable(element, handle) {
                let startX, startY, startLeft, startTop, isDragging = false;
                const getPos = (e) => e.touches ? e.touches[0] : e;

                function onStart(e) {
                    if (e.target.classList && e.target.classList.contains('close-pinned-video')) return;
                    e.preventDefault();
                    isDragging = true;
                    const pos = getPos(e);
                    startX = pos.clientX;
                    startY = pos.clientY;
                    startLeft = element.offsetLeft;
                    startTop = element.offsetTop;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchend', onEnd);
                }

                function onMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();
                    const pos = getPos(e);
                    let newLeft = startLeft + (pos.clientX - startX);
                    let newTop = startTop + (pos.clientY - startY);
                    if (window.innerWidth <= 600) return;
                    newLeft = Math.min(window.innerWidth - element.offsetWidth, Math.max(0, newLeft));
                    newTop = Math.min(window.innerHeight - element.offsetHeight, Math.max(0, newTop));
                    element.style.left = newLeft + 'px';
                    element.style.top = newTop + 'px';
                    element.style.right = 'auto';
                    element.style.bottom = 'auto';
                }

                function onEnd() {
                    isDragging = false;
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('mouseup', onEnd);
                    document.removeEventListener('touchend', onEnd);
                }
                handle.addEventListener('mousedown', onStart);
                handle.addEventListener('touchstart', onStart, { passive: false });
            }

            function makeResizable(element, handle) {
                let startW, startH, startX, startY;
                const getPos = (e) => e.touches ? e.touches[0] : e;

                function onStart(e) {
                    e.preventDefault();
                    startW = element.offsetWidth;
                    startH = element.offsetHeight;
                    const pos = getPos(e);
                    startX = pos.clientX;
                    startY = pos.clientY;
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('touchmove', onMove, { passive: false });
                    document.addEventListener('mouseup', onEnd);
                    document.addEventListener('touchend', onEnd);
                }

                function onMove(e) {
                    e.preventDefault();
                    const pos = getPos(e);
                    let newW = startW + (pos.clientX - startX);
                    let newH = startH + (pos.clientY - startY);
                    if (newW > 280) element.style.width = newW + 'px';
                    if (newH > 200) element.style.height = newH + 'px';
                }

                function onEnd() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                }
                handle.addEventListener('mousedown', onStart);
                handle.addEventListener('touchstart', onStart, { passive: false });
            }

                });

                setInterval(() => {

                        snap.forEach(child => { if (now - child.val().lastActive > 90000) child.ref.remove(); });

                messagesRef.limitToLast(100).on("child_added", snap => {

                pinnedVideoRef.on("value", async (snap) => {

                    // تشغيل المحتوى
                    if (data.type === 'youtube') {
                        // يوتيوب: نستخدم iframe بسيط لأن HLS لا يدعمه
                        body.innerHTML =
                            `<iframe src="https://www.youtube.com/embed/${data.id}?autoplay=1&rel=0" style="width:100%;aspect-ratio:16/9;border:none;border-radius:0;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                        currentPlayer = { video: null, hls: null };
                    } else if (data.type === 'm3u' || data.type === 'direct') {
                        const mime = data.type === 'direct' ? 'video/mp4' : 'application/x-mpegURL';
                        createNetflixPlayer(body, data.url, mime);
                    } else if (data.type === 'twitter') {
                        embedTwitterNative(body, data.id);
                        const videos = await fetchTwitterVideos(data.id);
                        if (videos.length > 0) {
                            // نعيد بناء المشغل بالفيديو الأول
                            body.innerHTML = '';
                            createNetflixPlayer(body, videos[0].url, 'video/mp4');
                            // إضافة محدد للمقاطع
                            if (videos.length > 1) {
                                const bar = document.createElement('div');
                                bar.className = 'video-selector-bar';
                                videos.forEach((v, idx) => {
                                    const btn = document.createElement('button');
                                    btn.className = 'video-selector-btn' + (idx === 0 ? ' active' : '');
                                    btn.textContent = `مقطع ${idx+1}`;
                                    btn.onclick = () => {
                                        body.innerHTML = '';
                                        createNetflixPlayer(body, v.url, 'video/mp4');
                                        bar.querySelectorAll('.video-selector-btn').forEach(b => b
                                            .classList.remove('active'));
                                        btn.classList.add('active');
                                    };
                                    bar.appendChild(btn);
                                });
                                body.appendChild(bar);
                            }
                        }
                    }
                    addNotification(`${data.setBy} قام بتشغيل فيديو`);
                });

                initTypingIndicator();
            }

            function attemptLogin() {
                let raw = usernameInput.value.trim();
                if (!raw) { alert("الرجاء إدخال اسم"); return; }
                if (/[.#$[\]/]/.test(raw)) { alert("لا يُسمح بأحرف خاصة: . # $ [ ] /"); return; }
                if (raw.length < 2) { alert("الاسم قصير جداً"); return; }
                username = raw;
                startChat();
            }
            loginBtn.onclick = attemptLogin;
            usernameInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); };
        })();
    </script>
</body>
</html>
