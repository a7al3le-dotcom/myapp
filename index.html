<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>شات خاص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-youtube@3.0.1/dist/Youtube.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

    <style>
        /* ===== CSS Variables & Reset ===== */
        :root {
            --bg-primary: #0a0b12;
            --bg-secondary: #11131f;
            --bg-elevated: #181b2b;
            --bg-input: #0f111c;
            --text-primary: #f0f2fa;
            --text-secondary: #9aa1b8;
            --text-muted: #5d6478;
            --accent-primary: #6c5ce7;
            --accent-secondary: #a29bfe;
            --accent-gradient: linear-gradient(135deg, #6c5ce7, #fd79a8);
            --success: #00b894;
            --danger: #e17055;
            --warning: #fdcb6e;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.8);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ===== Scrollbar Styling ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: var(--radius-full);
        }

        /* ===== Login Screen ===== */
        #loginScreen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            z-index: 10000;
            padding: 20px;
        }

        #loginBox {
            background: var(--bg-secondary);
            padding: 40px 36px 32px;
            border-radius: var(--radius-lg);
            text-align: center;
            max-width: 380px;
            width: 100%;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-strong);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #loginBox .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        #loginBox h2 {
            font-size: 24px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }

        #loginBox .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        #usernameInput {
            width: 100%;
            padding: 14px 18px;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
            transition: var(--transition-fast);
            outline: none;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #usernameInput:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2), inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        #usernameInput::placeholder {
            color: var(--text-muted);
        }

        #loginBtn {
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }

        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
        }

        #loginBtn:active {
            transform: translateY(0);
        }

        /* ===== Chat Container ===== */
        #chat-container {
            display: none;
            flex-direction: column;
            height: 100dvh;
            background: var(--bg-primary);
            position: relative;
        }

        /* ===== Messages Area ===== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            padding-top: 70px;
            scroll-behavior: smooth;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            margin: 4px 0;
            animation: msgIn 0.25s ease;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            max-width: 85%;
            word-break: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .msg.self {
            align-self: flex-end;
            background: rgba(108, 92, 231, 0.15);
            border-color: rgba(108, 92, 231, 0.3);
        }

        .msg .user {
            font-weight: 700;
            color: var(--accent-secondary);
            white-space: nowrap;
        }

        .msg .text {
            flex: 1;
        }

        .msg .time {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
            margin-right: 8px;
            padding-top: 2px;
        }

        .sys {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            padding: 6px 16px;
            margin: 6px auto;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            max-width: 80%;
        }

        /* ===== Input Area ===== */
        #inputArea {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
        }

        #messageInput {
            flex: 1;
            height: 48px;
            padding: 0 20px;
            border-radius: var(--radius-full);
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition-fast);
        }

        #messageInput:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        #messageInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            height: 48px;
            padding: 0 28px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.25);
        }

        #sendBtn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.35);
        }

        #sendBtn:active {
            transform: scale(0.97);
        }

        /* ===== Top Buttons ===== */
        #topButtons {
            position: fixed;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .btn {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-fast);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-soft);
        }

        .btn:hover {
            background: var(--bg-elevated);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        .btn .count {
            background: var(--accent-primary);
            color: #fff;
            border-radius: var(--radius-full);
            padding: 0 8px;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        /* ===== Video Player (New Professional Design) ===== */
        #pinnedVideoPlayer {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 420px;
            max-width: 92vw;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-strong);
            z-index: 999;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: width 0.3s ease, height 0.3s ease;
        }

        #pinnedVideoPlayer.minimized {
            width: 200px !important;
            height: 120px !important;
            cursor: pointer;
        }

        #pinnedVideoPlayer.minimized .video-header {
            padding: 4px 10px;
            font-size: 11px;
        }

        #pinnedVideoPlayer.minimized .video-header .title {
            display: none;
        }

        #pinnedVideoPlayer.minimized .video-body {
            min-height: 80px;
        }

        #pinnedVideoPlayer.minimized .video-body video-js,
        #pinnedVideoPlayer.minimized .video-body iframe {
            min-height: 80px;
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-elevated);
            cursor: move;
            touch-action: none;
            user-select: none;
            flex-shrink: 0;
        }

        .video-header .title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .video-header .title .highlight {
            color: var(--accent-secondary);
        }

        .video-header .controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .video-header .controls button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: var(--text-secondary);
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-header .controls button:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
        }

        .video-header .controls .close-btn {
            background: rgba(225, 112, 85, 0.2);
            color: var(--danger);
        }

        .video-header .controls .close-btn:hover {
            background: var(--danger);
            color: #fff;
        }

        .video-body {
            width: 100%;
            background: #000;
            flex-shrink: 0;
            min-height: 240px;
            position: relative;
        }

        .video-body video-js {
            width: 100% !important;
            height: 100% !important;
            min-height: 240px;
        }

        .video-body iframe {
            width: 100%;
            height: 100%;
            min-height: 240px;
            border: none;
        }

        /* ===== Resize Handle ===== */
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 24px;
            height: 24px;
            cursor: nwse-resize;
            z-index: 10;
            background: linear-gradient(135deg, transparent 50%, rgba(255, 255, 255, 0.15) 50%);
            border-radius: 0 0 var(--radius-md) 0;
        }

        /* ===== Custom VideoJS Theme ===== */
        .video-js.vjs-custom-theme {
            background: #000;
        }

        .vjs-custom-theme .vjs-control-bar {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85), transparent);
            height: 4em;
        }

        .vjs-custom-theme .vjs-big-play-button {
            display: none !important;
        }

        .vjs-custom-theme .vjs-progress-control {
            position: absolute;
            top: -2.5em;
            left: 0;
            right: 0;
            width: 100%;
            height: 2.5em;
        }

        .vjs-custom-theme .vjs-progress-holder {
            height: 4px;
            margin: 1em 0;
            border-radius: var(--radius-full);
        }

        .vjs-custom-theme .vjs-play-progress {
            background: var(--accent-gradient);
        }

        .vjs-custom-theme .vjs-play-progress:before {
            display: none;
        }

        .vjs-custom-theme .vjs-load-progress {
            background: rgba(255, 255, 255, 0.2);
        }

        .vjs-custom-theme .vjs-time-control {
            line-height: 3em;
            padding: 0 0.8em;
            font-size: 12px;
        }

        .vjs-custom-theme .vjs-button>.vjs-icon-placeholder:before {
            font-size: 1.8em;
            line-height: 2;
        }

        /* ===== Video Selector ===== */
        .video-selector-bar {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .video-selector-btn {
            flex-shrink: 0;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 11px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .video-selector-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .video-selector-btn.active {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
        }

        /* ===== Modals ===== */
        #usersBox,
        #setVideoModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: var(--bg-secondary);
            padding: 24px 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-strong);
            z-index: 1003;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            width: 400px;
            max-width: 92vw;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #usersBox h4,
        #setVideoModal h4 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #usersList {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.02);
            font-size: 14px;
        }

        .user-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .user-item .status.online {
            background: var(--success);
        }
        .user-item .status.idle {
            background: var(--warning);
        }
        .user-item .status.offline {
            background: var(--text-muted);
        }

        .user-item .username {
            flex: 1;
        }

        .user-item .badge {
            font-size: 10px;
            background: var(--accent-primary);
            color: #fff;
            padding: 0 8px;
            border-radius: var(--radius-full);
        }

        #videoUrlInput {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: var(--transition-fast);
            margin-bottom: 12px;
        }

        #videoUrlInput:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        #videoUrlInput::placeholder {
            color: var(--text-muted);
        }

        #submitVideoUrlBtn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--accent-gradient);
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        #submitVideoUrlBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 1001;
            display: none;
        }

        /* ===== Toast Notifications ===== */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 24px;
            border-radius: var(--radius-full);
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow-strong);
            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards;
            pointer-events: auto;
            backdrop-filter: blur(12px);
        }

        .toast.info {
            border-color: rgba(108, 92, 231, 0.3);
        }
        .toast.success {
            border-color: rgba(0, 184, 148, 0.3);
        }
        .toast.error {
            border-color: rgba(225, 112, 85, 0.3);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            #pinnedVideoPlayer {
                top: 70px;
                right: 10px;
                width: 340px;
                max-width: 94vw;
            }

            #pinnedVideoPlayer.minimized {
                width: 160px !important;
                height: 100px !important;
            }

            #messages {
                padding: 16px 12px;
                padding-top: 70px;
            }

            .msg {
                max-width: 95%;
                font-size: 13px;
                padding: 6px 12px;
            }

            #topButtons {
                top: 8px;
                right: 8px;
                gap: 4px;
            }

            .btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .btn .count {
                font-size: 10px;
                min-width: 16px;
            }

            #inputArea {
                padding: 8px 12px;
                gap: 6px;
            }

            #messageInput {
                height: 40px;
                font-size: 16px;
                padding: 0 14px;
            }

            #sendBtn {
                height: 40px;
                padding: 0 18px;
                font-size: 13px;
            }

            #usersBox,
            #setVideoModal {
                padding: 18px 16px;
                width: 94vw;
            }
        }

        @media (max-width: 480px) {
            #pinnedVideoPlayer {
                top: 60px;
                right: 5px;
                width: 96vw;
                max-width: 96vw;
            }

            #pinnedVideoPlayer.minimized {
                width: 120px !important;
                height: 80px !important;
                right: 5px;
            }

            #pinnedVideoPlayer.minimized .video-header .controls .minimize-btn {
                display: none;
            }
        }
    </style>
</head>

<body>

    <!-- ===== Login Screen ===== -->
    <div id="loginScreen">
        <div id="loginBox">
            <div class="logo">💬</div>
            <h2>شات خاص</h2>
            <p class="subtitle">تواصل مع أصدقائك وشاهد الفيديوهات معاً</p>
            <input type="text" id="usernameInput" placeholder="اكتب اسمك..." maxlength="15" autofocus>
            <button id="loginBtn">دخول</button>
        </div>
    </div>

    <!-- ===== Chat Container ===== -->
    <div id="chat-container">
        <!-- Top Buttons -->
        <div id="topButtons">
            <button class="btn" id="setVideoBtn" title="تثبيت فيديو">📺 فيديو</button>
            <button class="btn" id="onlineListBtn" title="المتصلين">
                👥 <span class="count" id="count">0</span>
            </button>
        </div>

        <!-- Messages -->
        <div id="messages"></div>

        <!-- Input -->
        <form id="inputArea">
            <button type="submit" id="sendBtn">إرسال</button>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
        </form>
    </div>

    <!-- ===== Video Player ===== -->
    <div id="pinnedVideoPlayer">
        <div class="video-header">
            <span class="title">🎬 <span class="highlight">بث مباشر</span></span>
            <div class="controls">
                <button class="minimize-btn" title="تصغير">⤢</button>
                <button class="close-btn" title="إغلاق">✕</button>
            </div>
        </div>
        <div class="video-body"></div>
        <div class="resize-handle"></div>
    </div>

    <!-- ===== Modals ===== -->
    <div id="setVideoModal">
        <h4>📺 تثبيت فيديو للجميع</h4>
        <input type="text" id="videoUrlInput" placeholder="رابط يوتيوب، تويتر، M3U8، أو MP4">
        <button id="submitVideoUrlBtn">تثبيت الفيديو</button>
    </div>

    <div id="usersBox">
        <h4>👥 المتصلين الآن</h4>
        <div id="usersList"></div>
    </div>

    <div id="overlay"></div>

    <!-- ===== Toast Container ===== -->
    <div id="toastContainer"></div>

    <!-- ===== JavaScript ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ============================================
            // CONFIG
            // ============================================
            const firebaseConfig = {
  apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
  authDomain: "mychat-2d881.firebaseapp.com",
  databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com",
  projectId: "mychat-2d881",
  storageBucket: "mychat-2d881.firebasestorage.app",
  messagingSenderId: "532385733649",
  appId: "1:532385733649:web:7bb6cce9add057acf1e5b0"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // ============================================
            // STATE
            // ============================================
            let username = '';
            let userRef, messagesRef, onlineRef, pinnedVideoRef;
            let serverTimeOffset = 0;
            let videoPlayerInstance = null;
            let currentVideoIndex = 0;
            let currentVideosList = [];
            let isMinimized = false;
            let isDragging = false;
            let dragOffsetX = 0,
                dragOffsetY = 0;
            let messageTimestamps = new Map();
            let toastTimeout = null;

            // ============================================
            // DOM REFS
            // ============================================
            const loginScreen = document.getElementById('loginScreen');
            const usernameInput = document.getElementById('usernameInput');
            const loginBtn = document.getElementById('loginBtn');
            const chatContainer = document.getElementById('chat-container');
            const messagesDiv = document.getElementById('messages');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const onlineListBtn = document.getElementById('onlineListBtn');
            const setVideoBtn = document.getElementById('setVideoBtn');
            const usersBox = document.getElementById('usersBox');
            const usersList = document.getElementById('usersList');
            const setVideoModal = document.getElementById('setVideoModal');
            const videoUrlInput = document.getElementById('videoUrlInput');
            const submitVideoUrlBtn = document.getElementById('submitVideoUrlBtn');
            const pinnedVideoPlayer = document.getElementById('pinnedVideoPlayer');
            const videoBody = document.querySelector('.video-body');
            const videoHeader = document.querySelector('.video-header');
            const videoTitle = document.querySelector('.video-header .title');
            const minimizeBtn = document.querySelector('.minimize-btn');
            const closeBtn = document.querySelector('.close-btn');
            const resizeHandle = document.querySelector('.resize-handle');
            const overlay = document.getElementById('overlay');
            const toastContainer = document.getElementById('toastContainer');

            // ============================================
            // UTILITY FUNCTIONS
            // ============================================
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.toString()
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            function scrollToBottom() {
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, 3000);
            }

            function closeAllModals() {
                usersBox.style.display = 'none';
                setVideoModal.style.display = 'none';
                overlay.style.display = 'none';
            }

            function getYoutubeVideoId(url) {
                if (!url) return null;
                const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                const match = url.match(regex);
                return match ? match[1] : null;
            }

            function getTweetId(url) {
                if (!url) return null;
                const regex = /(?:https?:\/\/)?(?:www\.)?(?:twitter|x)\.com\/(?:\w+)\/status\/(\d+)/;
                const match = url.match(regex);
                return match ? match[1] : null;
            }

            function isDirectVideo(url) {
                if (!url) return false;
                if (/\.(mp4|webm|ogv|mkv|avi|mov|flv|m4v)(\?.*)?$/i.test(url)) return true;
                if (/video/i.test(url) && !/(youtube|youtu\.be|twitter|x\.com)/i.test(url)) return true;
                return false;
            }

            // ============================================
            // LOGIN
            // ============================================
            function attemptLogin() {
                let inputName = usernameInput.value.trim();
                const invalidChars = /[.#$\\[\\]]/;
                if (invalidChars.test(inputName)) {
                    showToast('❌ الاسم يحتوي على رموز غير مسموحة', 'error');
                    return;
                }
                if (inputName.length < 2) {
                    showToast('❌ الاسم قصير جداً (2 أحرف على الأقل)', 'error');
                    return;
                }
                username = inputName;
                userRef = db.ref('online/' + username);
                messagesRef = db.ref('messages');
                onlineRef = db.ref('online');
                pinnedVideoRef = db.ref('pinned_video');
                startChat();
            }

            loginBtn.onclick = attemptLogin;
            usernameInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); };

            // ============================================
            // MAIN CHAT
            // ============================================
            function startChat() {
                loginScreen.style.display = 'none';
                chatContainer.style.display = 'flex';

                // Server time offset
                db.ref('.info/serverTimeOffset').on('value', snap => {
                    serverTimeOffset = snap.val() || 0;
                });

                // Online presence
                userRef.set({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                userRef.onDisconnect().remove();

                setInterval(() => {
                    userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                }, 45000);

                // Cleanup inactive users
                setInterval(() => {
                    const now = Date.now() + serverTimeOffset;
                    onlineRef.once('value', snap => {
                        snap.forEach(child => {
                            if (now - (child.val().lastActive || 0) > 90000) {
                                child.ref.remove();
                            }
                        });
                    });
                }, 60000);

                // Messages - receive
                messagesRef.limitToLast(100).on('child_added', snap => {
                    addMessageToUI(snap.key, snap.val());
                });

                messagesRef.on('child_removed', snap => {
                    const el = document.getElementById(`msg-${snap.key}`);
                    if (el) {
                        el.style.opacity = '0';
                        el.style.transform = 'translateX(-20px)';
                        setTimeout(() => el.remove(), 300);
                    }
                });

                // Online users
                onlineRef.on('value', snap => {
                    document.getElementById('count').textContent = snap.numChildren();
                    renderUsersList(snap.val() || {});
                });

                // Pinned video
                pinnedVideoRef.on('value', async (snap) => {
                    const data = snap.val();
                    handlePinnedVideo(data);
                });

                // Send message
                document.getElementById('inputArea').onsubmit = (e) => {
                    e.preventDefault();
                    const text = messageInput.value.trim();
                    if (!text) return;

                    const time = new Date().toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: false
                    });
                    messagesRef.push({
                        user: username,
                        text: text,
                        time: time,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    messageInput.value = '';
                    userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                    scrollToBottom();
                };

                // Modal controls
                onlineListBtn.onclick = (e) => {
                    e.stopPropagation();
                    usersBox.style.display = 'block';
                    overlay.style.display = 'block';
                };

                setVideoBtn.onclick = (e) => {
                    e.stopPropagation();
                    setVideoModal.style.display = 'block';
                    overlay.style.display = 'block';
                };

                overlay.onclick = closeAllModals;

                // Submit video
                submitVideoUrlBtn.onclick = () => {
                    const url = videoUrlInput.value.trim();
                    if (!url) {
                        showToast('⚠️ الرجاء إدخال رابط', 'error');
                        return;
                    }

                    const youtubeId = getYoutubeVideoId(url);
                    const tweetId = getTweetId(url);

                    if (youtubeId) {
                        pinnedVideoRef.set({ type: 'youtube', id: youtubeId, setBy: username });
                        showToast('✅ تم تثبيت فيديو يوتيوب', 'success');
                    } else if (tweetId) {
                        pinnedVideoRef.set({ type: 'twitter', id: tweetId, setBy: username });
                        showToast('✅ تم تثبيت التغريدة', 'success');
                    } else if (url.toLowerCase().includes('.m3u') || url.toLowerCase().includes('.m3u8')) {
                        pinnedVideoRef.set({ type: 'm3u', url: url, setBy: username });
                        showToast('✅ تم تثبيت بث M3U8', 'success');
                    } else if (isDirectVideo(url)) {
                        pinnedVideoRef.set({ type: 'direct', url: url, setBy: username });
                        showToast('✅ تم تثبيت الفيديو', 'success');
                    } else {
                        showToast('❌ الرابط غير مدعوم', 'error');
                        return;
                    }

                    videoUrlInput.value = '';
                    closeAllModals();
                };

                // Click outside modals to close
                document.addEventListener('click', (e) => {
                    if (e.target === overlay) closeAllModals();
                });
            }

            // ============================================
            // MESSAGE UI
            // ============================================
            function addMessageToUI(key, { user, text, timestamp }) {
                const wrapper = document.createElement('div');
                wrapper.className = 'msg-wrapper';
                wrapper.id = `msg-${key}`;

                const msg = document.createElement('div');
                msg.className = 'msg';
                if (user === username) msg.classList.add('self');

                const userSpan = document.createElement('span');
                userSpan.className = 'user';
                userSpan.textContent = escapeHtml(user);

                const textSpan = document.createElement('span');
                textSpan.className = 'text';
                textSpan.textContent = escapeHtml(text);

                const timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.id = `time-${key}`;

                msg.appendChild(userSpan);
                msg.appendChild(textSpan);
                msg.appendChild(timeSpan);
                wrapper.appendChild(msg);
                messagesDiv.appendChild(wrapper);

                messageTimestamps.set(key, { timestamp, el: timeSpan });
                updateTimeDisplay(key, timestamp, timeSpan);
                scrollToBottom();
            }

            function updateTimeDisplay(key, timestamp, timeElement) {
                if (!timestamp) return;
                const now = Date.now() + serverTimeOffset;
                const diffMs = now - (timestamp + serverTimeOffset);
                const diffSec = Math.floor(diffMs / 1000);
                const diffMin = Math.floor(diffSec / 60);

                let text;
                if (diffSec < 5) text = 'الآن';
                else if (diffSec < 60) text = 'ثواني';
                else if (diffMin < 2) text = 'د1';
                else if (diffMin < 60) text = `د${diffMin}`;
                else text = new Date(timestamp + serverTimeOffset).toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });

                timeElement.textContent = text;
            }

            // Update times every 30 seconds
            setInterval(() => {
                messageTimestamps.forEach(({ timestamp, el }, key) => {
                    updateTimeDisplay(key, timestamp, el);
                });
            }, 30000);

            // ============================================
            // USERS LIST
            // ============================================
            function renderUsersList(users) {
                usersList.innerHTML = '';
                const now = Date.now() + serverTimeOffset;
                const sorted = Object.keys(users).sort();

                sorted.forEach(uName => {
                    const uData = users[uName];
                    const div = document.createElement('div');
                    div.className = 'user-item';

                    const status = document.createElement('span');
                    status.className = 'status';
                    const diff = now - (uData.lastActive || 0);
                    if (diff > 60000) status.classList.add('offline');
                    else if (diff > 30000) status.classList.add('idle');
                    else status.classList.add('online');

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'username';
                    nameSpan.textContent = escapeHtml(uName);

                    div.appendChild(status);
                    div.appendChild(nameSpan);

                    if (uName === username) {
                        const badge = document.createElement('span');
                        badge.className = 'badge';
                        badge.textContent = 'أنت';
                        div.appendChild(badge);
                    }

                    usersList.appendChild(div);
                });
            }

            // ============================================
            // PINNED VIDEO - PROFESSIONAL PLAYER
            // ============================================
            async function handlePinnedVideo(data) {
                // Clean up existing player
                if (videoPlayerInstance) {
                    try {
                        videoPlayerInstance.dispose();
                    } catch (e) {}
                    videoPlayerInstance = null;
                }
                videoBody.innerHTML = '';
                currentVideosList = [];
                currentVideoIndex = 0;

                if (!data) {
                    pinnedVideoPlayer.style.display = 'none';
                    isMinimized = false;
                    return;
                }

                // Show player
                pinnedVideoPlayer.style.display = 'flex';
                pinnedVideoPlayer.classList.remove('minimized');
                isMinimized = false;

                // Update title
                const setBy = data.setBy || 'مجهول';
                const typeMap = {
                    youtube: 'يوتيوب',
                    twitter: 'تغريدة',
                    m3u: 'بث مباشر',
                    direct: 'فيديو'
                };
                videoTitle.innerHTML = `🎬 <span class="highlight">${typeMap[data.type] || 'فيديو'}</span> - بواسطة ${escapeHtml(setBy)}`;

                // Create video based on type
                if (data.type === 'youtube') {
                    createYouTubePlayer(data.id);
                } else if (data.type === 'twitter') {
                    await createTwitterPlayer(data.id);
                } else if (data.type === 'm3u') {
                    createHLSPlayer(data.url);
                } else if (data.type === 'direct') {
                    createDirectPlayer(data.url);
                }

                showToast(`📺 تم تشغيل فيديو بواسطة ${escapeHtml(setBy)}`, 'info');
            }

            function createYouTubePlayer(videoId) {
                const el = document.createElement('video-js');
                el.className = 'vjs-custom-theme';
                videoBody.appendChild(el);

                try {
                    videoPlayerInstance = videojs(el, {
                        autoplay: true,
                        muted: true,
                        controls: true,
                        playsinline: true,
                        techOrder: ['youtube'],
                        sources: [{ type: 'video/youtube', src: `https://www.youtube.com/watch?v=${videoId}` }]
                    });
                    videoPlayerInstance.on('error', () => {
                        showToast('⚠️ تعذر تشغيل فيديو يوتيوب', 'error');
                        videoBody.innerHTML = `<div style="color:#e17055;padding:20px;text-align:center;">⚠️ تعذر تشغيل الفيديو</div>`;
                    });
                } catch (e) {
                    videoBody.innerHTML = `<div style="color:#e17055;padding:20px;text-align:center;">⚠️ خطأ في تحميل المشغل</div>`;
                }
            }

            function createHLSPlayer(url) {
                const el = document.createElement('video-js');
                el.className = 'vjs-custom-theme';
                videoBody.appendChild(el);

                const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);

                if (isSafari || !window.Hls || !Hls.isSupported()) {
                    // Native HLS
                    try {
                        videoPlayerInstance = videojs(el, {
                            autoplay: true,
                            muted: true,
                            controls: true,
                            playsinline: true,
                            sources: [{ type: 'application/x-mpegURL', src: url }]
                        });
                    } catch (e) {
                        videoBody.innerHTML = `<div style="color:#e17055;padding:20px;text-align:center;">⚠️ تعذر تشغيل البث</div>`;
                    }
                } else {
                    // Use hls.js
                    const nativeVideo = document.createElement('video');
                    nativeVideo.controls = true;
                    nativeVideo.autoplay = true;
                    nativeVideo.muted = true;
                    nativeVideo.playsInline = true;
                    nativeVideo.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
                    videoBody.innerHTML = '';
                    videoBody.appendChild(nativeVideo);

                    const hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                    });
                    hls.loadSource(url);
                    hls.attachMedia(nativeVideo);
                    videoPlayerInstance = {
                        dispose: () => {
                            hls.destroy();
                            nativeVideo.remove();
                        }
                    };
                }
            }

            function createDirectPlayer(url) {
                const el = document.createElement('video-js');
                el.className = 'vjs-custom-theme';
                videoBody.appendChild(el);

                try {
                    videoPlayerInstance = videojs(el, {
                        autoplay: true,
                        muted: true,
                        controls: true,
                        playsinline: true,
                        sources: [{ type: 'video/mp4', src: url }]
                    });
                    videoPlayerInstance.on('error', () => {
                        showToast('⚠️ تعذر تشغيل الفيديو', 'error');
                    });
                } catch (e) {
                    videoBody.innerHTML = `<div style="color:#e17055;padding:20px;text-align:center;">⚠️ تعذر تشغيل الفيديو</div>`;
                }
            }

            async function createTwitterPlayer(tweetId) {
                // Try to fetch video first, fallback to embed
                try {
                    const videos = await fetchTwitterVideos(tweetId);
                    if (videos && videos.length > 0) {
                        currentVideosList = videos;
                        currentVideoIndex = 0;
                        createTwitterVideoPlayer(videos[0].url);
                        if (videos.length > 1) {
                            createVideoSelector(videos);
                        }
                        return;
                    }
                } catch (e) {
                    console.warn('[Twitter] Fetch failed, using embed fallback', e);
                }

                // Fallback: embed tweet
                embedTwitter(videoBody, tweetId);
            }

            function createTwitterVideoPlayer(videoUrl) {
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;
                video.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
                video.src = videoUrl;
                videoBody.innerHTML = '';
                videoBody.appendChild(video);

                video.onerror = () => {
                    showToast('⚠️ تعذر تشغيل فيديو التغريدة', 'error');
                };

                videoPlayerInstance = {
                    dispose: () => {
                        video.src = '';
                        video.remove();
                    }
                };
            }

            function embedTwitter(container, tweetId) {
                container.innerHTML = '';
                container.style.background = '#15202b';
                const iframe = document.createElement('iframe');
                iframe.src = `https://platform.twitter.com/embed/Tweet.html?id=${tweetId}&theme=dark&lang=ar&dnt=true`;
                iframe.style.cssText = 'width:100%;height:100%;min-height:240px;border:none;';
                iframe.setAttribute('allowfullscreen', '');
                iframe.setAttribute('allow', 'autoplay; fullscreen');
                container.appendChild(iframe);
                videoPlayerInstance = {
                    dispose: () => {
                        iframe.src = '';
                        iframe.remove();
                    }
                };
            }

            function createVideoSelector(videos) {
                const bar = document.createElement('div');
                bar.className = 'video-selector-bar';

                videos.forEach((v, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'video-selector-btn';
                    if (idx === 0) btn.classList.add('active');
                    btn.textContent = `مقطع ${idx + 1}`;

                    btn.onclick = (e) => {
                        e.preventDefault();
                        if (idx !== currentVideoIndex) {
                            currentVideoIndex = idx;
                            // Update video source
                            const video = videoBody.querySelector('video');
                            if (video) {
                                video.src = videos[idx].url;
                                video.play();
                            }
                            bar.querySelectorAll('.video-selector-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        }
                    };
                    bar.appendChild(btn);
                });

                videoBody.appendChild(bar);
            }

            // ============================================
            // FETCH TWITTER VIDEOS (Multiple APIs)
            // ============================================
            async function fetchTwitterVideos(tweetId) {
                const videos = [];

                // 1. Syndication API
                try {
                    const token = ((Number(tweetId) / 1e15) * Math.PI)
                        .toString(36).replace(/(0+|\.)/g, '');
                    const res = await fetch(
                        `https://cdn.syndication.twimg.com/tweet-result?id=${tweetId}&lang=ar&token=${token}`, {
                            headers: { 'Accept': 'application/json' }
                        }
                    );
                    if (res.ok) {
                        const data = await res.json();
                        (data.mediaDetails || []).forEach(media => {
                            if (media.type === 'video' || media.type === 'animated_gif') {
                                const variants = (media.video_info?.variants || [])
                                    .filter(v => v.content_type === 'video/mp4')
                                    .sort((a, b) => (b.bitrate || 0) - (a.bitrate || 0));
                                if (variants.length) {
                                    videos.push({ url: variants[0].url });
                                }
                            }
                        });
                    }
                } catch (e) { /* silent */ }

                if (videos.length) return videos;

                // 2. fxtwitter
                try {
                    const res = await fetch(`https://api.fxtwitter.com/status/${tweetId}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const media = data.tweet?.media || {};
                        const items = media.videos || media.all?.filter(v => v.type === 'video' || v.type === 'gif') || [];
                        items.forEach(v => {
                            const src = v.url || v.variants?.[0]?.url;
                            if (src) videos.push({ url: src });
                        });
                        if (!videos.length && data.tweet?.video) {
                            const src = data.tweet.video.url || data.tweet.video.variants?.[0]?.url;
                            if (src) videos.push({ url: src });
                        }
                    }
                } catch (e) { /* silent */ }

                if (videos.length) return videos;

                // 3. vxtwitter
                try {
                    const res = await fetch(`https://api.vxtwitter.com/status/${tweetId}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        (data.media_extended || []).forEach(m => {
                            if (m && (m.type === 'video' || m.type === 'gif') && m.url) {
                                videos.push({ url: m.url });
                            }
                        });
                    }
                } catch (e) { /* silent */ }

                return videos;
            }

            // ============================================
            // VIDEO PLAYER CONTROLS (Minimize, Close, Drag, Resize)
            // ============================================
            // Minimize
            minimizeBtn.onclick = (e) => {
                e.stopPropagation();
                isMinimized = !isMinimized;
                pinnedVideoPlayer.classList.toggle('minimized', isMinimized);
                minimizeBtn.textContent = isMinimized ? '⤢' : '⤣';
            };

            // Close
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                if (pinnedVideoRef) {
                    pinnedVideoRef.remove();
                    showToast('🗑️ تم إغلاق الفيديو', 'info');
                }
            };

            // Restore on click when minimized
            pinnedVideoPlayer.onclick = (e) => {
                if (isMinimized && e.target.closest('.video-header') === null) {
                    isMinimized = false;
                    pinnedVideoPlayer.classList.remove('minimized');
                    minimizeBtn.textContent = '⤣';
                }
            };

            // Drag
            function getPointer(e) {
                return e.touches ? e.touches[0] : e;
            }

            videoHeader.addEventListener('mousedown', startDrag);
            videoHeader.addEventListener('touchstart', startDrag, { passive: false });

            function startDrag(e) {
                if (e.target.closest('.controls')) return;
                const pointer = getPointer(e);
                const rect = pinnedVideoPlayer.getBoundingClientRect();
                dragOffsetX = pointer.clientX - rect.left;
                dragOffsetY = pointer.clientY - rect.top;
                isDragging = true;
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('touchmove', onDrag, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
                pinnedVideoPlayer.style.position = 'fixed';
                if (e.type === 'mousedown') e.preventDefault();
            }

            function onDrag(e) {
                if (!isDragging) return;
                const pointer = getPointer(e);
                pinnedVideoPlayer.style.left = (pointer.clientX - dragOffsetX) + 'px';
                pinnedVideoPlayer.style.top = (pointer.clientY - dragOffsetY) + 'px';
                pinnedVideoPlayer.style.right = 'auto';
                if (e.type === 'touchmove') e.preventDefault();
            }

            function endDrag() {
                isDragging = false;
                document.removeEventListener('mousemove', onDrag);
                document.removeEventListener('touchmove', onDrag);
                document.removeEventListener('mouseup', endDrag);
                document.removeEventListener('touchend', endDrag);
            }

            // Resize
            resizeHandle.addEventListener('mousedown', startResize);
            resizeHandle.addEventListener('touchstart', startResize, { passive: false });

            let resizeStartX, resizeStartY, resizeStartW, resizeStartH;

            function startResize(e) {
                const pointer = getPointer(e);
                resizeStartX = pointer.clientX;
                resizeStartY = pointer.clientY;
                resizeStartW = pinnedVideoPlayer.offsetWidth;
                resizeStartH = pinnedVideoPlayer.offsetHeight;
                document.addEventListener('mousemove', onResize);
                document.addEventListener('touchmove', onResize, { passive: false });
                document.addEventListener('mouseup', endResize);
                document.addEventListener('touchend', endResize);
                if (e.type === 'mousedown') e.preventDefault();
            }

            function onResize(e) {
                const pointer = getPointer(e);
                const dw = pointer.clientX - resizeStartX;
                const dh = pointer.clientY - resizeStartY;
                const newW = Math.max(300, resizeStartW + dw);
                const newH = Math.max(200, resizeStartH + dh);
                pinnedVideoPlayer.style.width = newW + 'px';
                pinnedVideoPlayer.style.height = newH + 'px';
                if (e.type === 'touchmove') e.preventDefault();
            }

            function endResize() {
                document.removeEventListener('mousemove', onResize);
                document.removeEventListener('touchmove', onResize);
                document.removeEventListener('mouseup', endResize);
                document.removeEventListener('touchend', endResize);
            }

            // ============================================
            // INIT
            // ============================================
            // Focus input on load
            setTimeout(() => usernameInput.focus(), 300);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeAllModals();
                    if (isMinimized) {
                        isMinimized = false;
                        pinnedVideoPlayer.classList.remove('minimized');
                        minimizeBtn.textContent = '⤣';
                    }
                }
            });

            console.log('🚀 شات خاص - النسخة المتطورة');
            console.log('📺 مشغل فيديو احترافي مع تحسينات UX متقدمة');
        });
    </script>
</body>
