<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
:root{
--bg:#0f111a;
--card:#1a1d2b;
--accent:#ffd54a;
--text:#fff;
--muted:#aaa;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* ===== Top Bar ===== */
#topBar{
background:var(--card);
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:5;
}

button{
background:var(--accent);
border:none;
padding:6px 14px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* ===== Messages ===== */
#messages{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:90px;
scroll-behavior:smooth;
}

.msg{margin:8px 0;font-size:14px}
.user{color:var(--accent);font-weight:bold}
.time{font-size:11px;color:var(--muted);margin-right:6px}
.sys{text-align:center;font-size:12px;color:var(--muted);margin:10px 0}

/* ===== Input Fixed Bottom ===== */
#inputArea{
position:fixed;
bottom:0;
left:0;
right:0;
background:var(--card);
display:flex;
gap:8px;
padding:10px;
z-index:10;
}

#messageInput{
flex:1;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

/* ===== Sidebar ===== */
#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
opacity:0;
visibility:hidden;
transition:.3s;
z-index:20;
}

#overlay.active{
opacity:1;
visibility:visible;
}

#sidebar{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100%;
background:var(--card);
transition:.3s;
padding:15px;
overflow-y:auto;
z-index:30;
}

#sidebar.active{
right:0;
}

.userItem{
padding:8px 0;
border-bottom:1px solid #333;
}

/* ===== Video Box ===== */
#videoContainer{
position:fixed;
bottom:100px;
left:20px;
width:320px;
background:#000;
border-radius:10px;
overflow:hidden;
display:none;
resize:both;
min-width:220px;
min-height:150px;
z-index:15;
}

.video-header{
background:#111;
padding:6px;
cursor:move;
display:flex;
justify-content:space-between;
}
</style>

</head>
<body>

<div id="topBar">
<div>
👥 <span id="onlineCount">0</span>
<button onclick="openSidebar()">المتصلين</button>
</div>
<button onclick="setVideo()">📺 فيديو</button>
</div>

<div id="messages"></div>

<form id="inputArea">
<input id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off">
<button>إرسال</button>
</form>

<div id="overlay"></div>

<div id="sidebar">
<h3>المتصلين</h3>
<div id="onlineList"></div>
</div>

<div id="videoContainer">
<div class="video-header">
<span>فيديو</span>
<button onclick="removeVideo()">✖</button>
</div>
<div id="videoBody"></div>
</div>

<script>
/* ===== Firebase Config ===== */
const firebaseConfig={
apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
  authDomain: "mychat-2d881.firebaseapp.com",
  databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ===== User ===== */
let username=localStorage.getItem("chatName") || prompt("اكتب اسمك");
if(!username||username.length<2)location.reload();
localStorage.setItem("chatName",username);

const uid=db.ref("online").push().key;
const userRef=db.ref("online/"+uid);
userRef.set({name:username});
userRef.onDisconnect().remove();

/* ===== Refs ===== */
const messagesRef=db.ref("messages");
const onlineRef=db.ref("online");
const videoRef=db.ref("pinnedVideo");

const messagesDiv=document.getElementById("messages");
const onlineList=document.getElementById("onlineList");
const overlay=document.getElementById("overlay");
const sidebar=document.getElementById("sidebar");

/* ===== Messaging ===== */
let lastSend=0;

document.getElementById("inputArea").onsubmit=e=>{
e.preventDefault();
const text=messageInput.value.trim();
if(!text||Date.now()-lastSend<800)return;
lastSend=Date.now();

messagesRef.push({
user:username,
text,
timestamp:Date.now()
});
messageInput.value="";
};

messagesRef.limitToLast(50).on("child_added",snap=>{
const d=snap.val();
const div=document.createElement("div");
div.className="msg";
div.innerHTML=`<span class="user">${escape(d.user)}</span> ${escape(d.text)} <span class="time">${timeAgo(d.timestamp)}</span>`;
messagesDiv.appendChild(div);
messagesDiv.scrollTop=messagesDiv.scrollHeight;
});

/* ===== Online Users ===== */
onlineRef.on("value",snap=>{
onlineCount.textContent=snap.numChildren();
onlineList.innerHTML="";
snap.forEach(c=>{
const div=document.createElement("div");
div.className="userItem";
div.textContent=c.val().name;
onlineList.appendChild(div);
});
});

/* ===== Sidebar Logic ===== */
function openSidebar(){
sidebar.classList.add("active");
overlay.classList.add("active");
document.body.style.overflow="hidden";
}

function closeSidebar(){
sidebar.classList.remove("active");
overlay.classList.remove("active");
document.body.style.overflow="";
}

overlay.onclick=closeSidebar;
document.addEventListener("keydown",e=>{
if(e.key==="Escape")closeSidebar();
});

/* ===== Video ===== */
function getTweetId(url){
const m=url.match(/(?:twitter|x)\.com\/\w+\/status\/(\d+)/);
return m?m[1]:null;
}

async function fetchTwitterVideo(id){
try{
const r=await fetch("https://api.fxtwitter.com/status/"+id);
const d=await r.json();
return d.tweet.media.videos[0].url;
}catch{return null;}
}

async function setVideo(){
let url=prompt("رابط تويتر أو mp4");
if(!url)return;
const id=getTweetId(url);
if(id){
const v=await fetchTwitterVideo(id);
if(v)videoRef.set({url:v});
else alert("تعذر جلب الفيديو");
}else{
videoRef.set({url});
}
}

videoRef.on("value",snap=>{
const data=snap.val();
if(!data){videoContainer.style.display="none";return;}
videoContainer.style.display="block";
videoBody.innerHTML=`<video src="${data.url}" controls autoplay style="width:100%"></video>`;
});

function removeVideo(){videoRef.remove();}

/* ===== Drag Video ===== */
let isDragging=false,offsetX=0,offsetY=0;
const header=document.querySelector(".video-header");
header.addEventListener("mousedown",e=>{
isDragging=true;
offsetX=e.clientX-videoContainer.offsetLeft;
offsetY=e.clientY-videoContainer.offsetTop;
});
document.addEventListener("mousemove",e=>{
if(!isDragging)return;
videoContainer.style.left=(e.clientX-offsetX)+"px";
videoContainer.style.top=(e.clientY-offsetY)+"px";
});
document.addEventListener("mouseup",()=>isDragging=false);

/* ===== Utils ===== */
function timeAgo(ts){
const diff=Math.floor((Date.now()-ts)/1000);
if(diff<60)return diff+"ث";
if(diff<3600)return Math.floor(diff/60)+"د";
return Math.floor(diff/3600)+"س";
}

function escape(t){
return t.replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;","\">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}
</script>

</body>
</html>
