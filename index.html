<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شات خاص — تصميم أنيق</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #0e0e12;
            color: #f0f0f0;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a22;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #d4af37, #b8962e);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #e8c84a;
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(ellipse at 50% 30%, #1e1e2a 0%, #0e0e12 75%);
            position: relative;
            overflow: hidden;
        }

        #loginScreen::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            pointer-events: none;
        }
        #loginScreen::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(74, 124, 247, 0.06) 0%, transparent 70%);
            bottom: -80px;
            left: -80px;
            border-radius: 50%;
            pointer-events: none;
        }

        #loginContainer {
            background: rgba(26, 26, 34, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px 32px 36px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(212, 175, 55, 0.08);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }

        #loginContainer:hover {
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(212, 175, 55, 0.12);
        }

        #loginScreen h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(135deg, #d4af37 0%, #f0d060 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        #loginScreen .subtitle {
            text-align: center;
            font-size: 14px;
            color: #787888;
            margin-bottom: 28px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        #loginScreen input {
            padding: 14px 18px;
            margin-bottom: 16px;
            width: 100%;
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f0;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        #loginScreen input:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.06);
        }

        #loginScreen input::placeholder {
            color: #5a5a6a;
            font-weight: 300;
        }

        #loginScreen button {
            padding: 14px 20px;
            width: 100%;
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0e0e12;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            letter-spacing: 0.3px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
        }

        #loginScreen button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.25);
        }

        #loginScreen button:active {
            transform: scale(0.97);
            box-shadow: 0 2px 12px rgba(212, 175, 55, 0.1);
        }

        /* ===== CHAT SCREEN ===== */
        #chatScreen {
            display: none;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 0%, #1a1a26 0%, #0e0e12 80%);
            position: relative;
        }

        /* ===== TOP BAR ===== */
        #topBar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(22, 22, 30, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            height: 64px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        #myStatus {
            color: #43b581;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #myStatus::before {
            content: '●';
            font-size: 10px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        #onlineBtn,
        #adminBtn {
            cursor: pointer;
            color: #c8c8d8;
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #onlineBtn:hover,
        #adminBtn:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: rgba(212, 175, 55, 0.15);
            color: #f0f0f0;
            transform: translateY(-1px);
        }

        #onlineBtn:active,
        #adminBtn:active {
            transform: scale(0.96);
        }

        #onlineBtn .badge {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: #0e0e12;
            border-radius: 40px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        /* ===== POPUP OVERLAY ===== */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            z-index: 30;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #onlinePopup,
        #adminPopup {
            background: rgba(26, 26, 34, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 90%;
            max-width: 360px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 24px 20px 20px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.10);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 80px;
            right: 5%;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        #onlinePopup h4,
        #adminPopup h4 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
            background: linear-gradient(135deg, #d4af37, #f0d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            letter-spacing: 0.3px;
        }

        .user,
        .admin-user {
            font-size: 14px;
            margin-bottom: 6px;
            padding: 10px 14px;
            border-radius: 12px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
        }

        .user:hover,
        .admin-user:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user.you {
            background: rgba(212, 175, 55, 0.08);
            border-right: 3px solid #d4af37;
        }

        .admin-user.admin span {
            color: #d4af37;
            font-weight: 600;
        }
        .admin-user.mod span {
            color: #4a7cf7;
            font-weight: 600;
        }

        #adminPopup button {
            margin-top: 16px;
            padding: 12px 20px;
            width: 100%;
            background: rgba(255, 70, 70, 0.08);
            color: #ff6b6b;
            border: 1px solid rgba(255, 70, 70, 0.12);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #adminPopup button:hover {
            background: rgba(255, 70, 70, 0.15);
            border-color: rgba(255, 70, 70, 0.25);
            transform: translateY(-1px);
        }

        /* ===== MESSAGES (بدون مربعات) ===== */
        .messages {
            position: absolute;
            top: 64px;
            bottom: 80px;          /* مسافة كافية فوق مربع الإدخال */
            width: 100%;
            overflow-y: auto;
            padding: 16px 18px 20px;
            display: flex;
            flex-direction: column-reverse;
            scroll-behavior: smooth;
            z-index: 10;
        }

        .message {
            margin-bottom: 12px;
            animation: messageIn 0.35s ease;
            max-width: 95%;
            word-wrap: break-word;
            text-align: right;
            padding: 6px 0;        /* بدون خلفية أو مربع */
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            align-self: flex-end;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .name {
            font-weight: 700;
            font-size: 14px;
            margin-left: 6px;
            background: linear-gradient(135deg, #d4af37, #f0d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .message .text {
            font-size: 15px;
            display: inline;
            color: #e8e8f0;
            line-height: 1.6;
            background: transparent;
        }

        .message .time {
            font-size: 10px;
            color: #5a5a6a;
            margin-right: 8px;
            direction: ltr;
            display: inline;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ===== TYPING ===== */
        #typingStatus {
            position: fixed;
            bottom: 78px;
            padding: 6px 18px;
            font-size: 13px;
            color: #787888;
            margin: 0 16px;
            right: 0;
            animation: fadeIn 0.3s ease;
            font-weight: 300;
            letter-spacing: 0.2px;
            background: rgba(14, 14, 18, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 6px 18px;
            z-index: 15;
        }

        /* ===== INPUT BOX ===== */
        .input-box {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(22, 22, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(212, 175, 55, 0.06);
            padding: 12px 0 16px;
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.2);
            z-index: 25;           /* أعلى من الرسائل */
        }

        .input-row {
            display: flex;
            padding: 0 14px;
            gap: 10px;
            align-items: center;
        }

        .input-row input {
            flex: 1;
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f0f0;
            font-size: 15px;
            min-height: 48px;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .input-row input:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.25);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.04);
        }

        .input-row input::placeholder {
            color: #5a5a6a;
            font-weight: 300;
        }

        .input-row button {
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0e0e12;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.12);
        }

        .input-row button:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);
        }

        .input-row button:active {
            transform: scale(0.92);
            box-shadow: 0 2px 12px rgba(212, 175, 55, 0.08);
        }

        /* ===== CONNECTION STATUS ===== */
        #connectionStatus {
            position: fixed;
            top: 64px;
            width: 100%;
            background: rgba(212, 175, 55, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f0d060;
            text-align: center;
            padding: 10px 16px;
            font-size: 13px;
            z-index: 15;
            display: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            letter-spacing: 0.3px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 30px 20px;
            color: #5a5a6a;
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            #loginContainer { padding: 30px 20px 28px; border-radius: 20px; }
            #loginScreen h2 { font-size: 22px; }
            #topBar { padding: 10px 14px; height: 58px; }
            #onlineBtn, #adminBtn { padding: 6px 12px; font-size: 12px; }
            .message { padding: 4px 0; }
            .message .text { font-size: 14px; }
            .input-row input { padding: 12px 16px; font-size: 14px; min-height: 44px; }
            .input-row button { width: 44px; height: 44px; font-size: 18px; }
            #onlinePopup, #adminPopup { padding: 20px 16px 16px; top: 70px; max-height: 60vh; }
            .messages { bottom: 76px; padding: 12px 12px 16px; }
        }

        @media (max-width: 380px) {
            #topBar { flex-wrap: wrap; height: auto; min-height: 54px; gap: 6px; padding: 8px 12px; }
            #myStatus { font-size: 12px; }
            #onlineBtn, #adminBtn { font-size: 11px; padding: 4px 10px; }
            .messages { top: 70px; bottom: 72px; }
            .input-box { padding: 8px 0 12px; }
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN ===== -->
    <div id="loginScreen">
        <div id="loginContainer">
            <h2>✦ شات خاص</h2>
            <p class="subtitle">تواصل بأناقة</p>
            <input id="usernameInput" placeholder="اسمك (حرفين على الأقل)" autocomplete="off">
            <button onclick="login()" id="loginBtn">دخول إلى الشات</button>
        </div>
    </div>

    <!-- ===== CHAT ===== -->
    <div id="chatScreen">

        <!-- TOP BAR -->
        <div id="topBar">
            <span id="myStatus">متصل</span>
            <span id="onlineBtn">👥 المتصلون <span class="badge" id="onlineCount">0</span></span>
            <span id="adminBtn">⚙️ لوحة التحكم</span>
        </div>

        <!-- CONNECTION STATUS -->
        <div id="connectionStatus">🔄 جاري إعادة الاتصال…</div>

        <!-- POPUPS -->
        <div id="overlay" onclick="closePopup()">
            <div id="onlinePopup" onclick="event.stopPropagation()">
                <h4>👥 المتصلون الآن</h4>
                <div id="onlineUsersList"></div>
            </div>
            <div id="adminPopup" onclick="event.stopPropagation()">
                <h4>⚙️ لوحة التحكم</h4>
                <div id="adminUsersList"></div>
                <button onclick="clearChat()">🗑️ مسح الشات</button>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="messages" id="messages">
            <div class="loading">جارٍ تحميل الرسائل…</div>
        </div>
        <div id="typingStatus"></div>

        <!-- INPUT -->
        <div class="input-box">
            <div class="input-row">
                <input id="messageInput" placeholder="اكتب رسالة أو رابط يوتيوب / صورة" autocomplete="off">
                <button onclick="send()" id="sendBtn">➤</button>
            </div>
        </div>

    </div>

    <script>
        // ===== FIREBASE =====
        const firebaseConfig = {
            apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
            databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== GLOBALS =====
        let username = "";
        let role = "";
        let messageListeners = [],
            typingListeners = [],
            onlineListeners = [],
            connectionListeners = [];
        let lastMessageKey = null,
            isScrolledUp = false;

        // ===== DOM =====
        const usernameInput = document.getElementById("usernameInput");
        const loginScreen = document.getElementById("loginScreen");
        const chatScreen = document.getElementById("chatScreen");
        const messageInput = document.getElementById("messageInput");
        const messages = document.getElementById("messages");
        const typingStatus = document.getElementById("typingStatus");
        const onlineCount = document.getElementById("onlineCount");
        const onlineUsersList = document.getElementById("onlineUsersList");
        const adminUsersList = document.getElementById("adminUsersList");
        const overlay = document.getElementById("overlay");
        const onlineBtn = document.getElementById("onlineBtn");
        const adminBtn = document.getElementById("adminBtn");
        const connectionStatus = document.getElementById("connectionStatus");

        // ===== ROLES =====
        const ROLE_CONFIG = {
            "Mod": { role: "admin" },
            "Admin": { role: "admin" },
            "User": { role: "user" }
        };

        // ===== UTILITY =====
        function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div');
            d.textContent = text; return d.innerHTML; }

        function formatTime(ts) { const d = new Date(ts); return d.toLocaleTimeString('ar-SA', { hour: '2-digit',
                minute: '2-digit', hour12: true }); }

        // ===== LOGIN =====
        function login() {
            const raw = usernameInput.value.trim();
            if (!raw || raw.length < 2) { alert("الرجاء إدخال اسم صحيح (حرفين على الأقل)"); return; }
            username = escapeHtml(raw);
            role = ROLE_CONFIG[username]?.role || "user";

            loginScreen.style.display = "none";
            chatScreen.style.display = "block";
            loadMessages();
            setupConnection();
            setTimeout(() => { messageInput.focus(); }, 300);
        }

        // ===== CONNECTION =====
        function setupConnection() {
            const connectedRef = db.ref(".info/connected");
            const connListener = connectedRef.on("value", (snap) => {
                if (snap.val()) {
                    connectionStatus.style.display = "none";
                    const onlineRef = db.ref("onlineUsers/" + encodeURIComponent(username));
                    onlineRef.set({ name: username, status: "online", lastActive: Date.now() });
                    onlineRef.onDisconnect().remove();
                    const typingRef = db.ref("typing/" + encodeURIComponent(username));
                    typingRef.onDisconnect().remove();
                    connectionListeners.push(connListener);
                } else {
                    connectionStatus.style.display = "block";
                }
            });
            setupOnlineUsers();
            setupTyping();
        }

        // ===== MESSAGES =====
        function loadMessages() {
            cleanupListeners();
            const chatRef = db.ref("messages");
            const listener = chatRef.limitToLast(50).on("child_added", (snap) => {
                const data = snap.val();
                if (!data) return;
                lastMessageKey = snap.key;
                renderMessage(data);
            });
            messageListeners.push(listener);
        }

        function renderMessage(data) {
            const div = document.createElement("div");
            div.className = "message";
            const roleTag = ROLE_CONFIG[data.user]?.role === "admin" ? "✦" : data.user === "Mod" ? "◆" : "";
            div.innerHTML =
                `<span class="name">${escapeHtml(data.user)} ${roleTag}</span><span class="text">${escapeHtml(data.text)}</span><span class="time">${formatTime(data.time)}</span>`;
            messages.insertBefore(div, messages.firstChild);
            if (!isScrolledUp) { setTimeout(() => { messages.scrollTop = 0; }, 100); }
        }

        // ===== SEND =====
        function extractMedia(text) {
            const yt = text.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (yt) return { type: "youtube", id: yt[1] };
            const mp4 = text.match(/https?:\/\/\S+\.(mp4|webm|ogg)/i);
            if (mp4) return { type: "file", id: mp4[0] };
            const img = text.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp)/i);
            if (img) return { type: "image", id: img[0] };
            return null;
        }

        function send() {
            const text = messageInput.value.trim();
            if (!text || !username) return;
            const media = extractMedia(text);
            const chatRef = db.ref("messages");
            chatRef.push({ user: username, text: text, mediaType: media ? media.type : null, mediaId: media ? media.id :
                    null, time: Date.now() });
            messageInput.value = "";
            db.ref("typing/" + encodeURIComponent(username)).remove();
            messageInput.focus();
        }

        // ===== TYPING =====
        function setupTyping() {
            const typingRef = db.ref("typing");
            messageInput.addEventListener("input", () => {
                if (!username) return;
                const ref = db.ref("typing/" + encodeURIComponent(username));
                ref.set(Date.now());
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => { ref.remove(); }, 2000);
            });
            const listener = typingRef.on("value", (snap) => {
                const data = snap.val() || {};
                const now = Date.now();
                const active = Object.keys(data).filter(k => decodeURIComponent(k) !== username && (now - data[k] <
                    2000));
                typingStatus.textContent = active.length === 0 ? "" : active.map(k => decodeURIComponent(k)).join(
                    ", ") + " يكتب الآن…";
            });
            typingListeners.push(listener);
        }

        // ===== ONLINE USERS =====
        function setupOnlineUsers() {
            const onlineRef = db.ref("onlineUsers");
            const listener = onlineRef.on("value", (snap) => {
                const users = snap.val() || {};
                const names = Object.keys(users);
                onlineCount.textContent = names.length;
                onlineUsersList.innerHTML = names.map(k => {
                    const u = users[k];
                    const isYou = u.name === username;
                    return `<div class="user ${isYou?'you':''}">🟢 ${escapeHtml(u.name)} ${isYou?'(أنت)':''}</div>`;
                }).join('');

                if (role === "admin") {
                    adminUsersList.innerHTML = names.map(k => {
                        const u = users[k];
                        const r = ROLE_CONFIG[u.name]?.role || "user";
                        return `<div class="admin-user ${r}"><span>${escapeHtml(u.name)}</span></div>`;
                    }).join('');
                }
            });
            onlineListeners.push(listener);
        }

        // ===== SCROLL =====
        messages.addEventListener('scroll', () => {
            const st = messages.scrollTop,
                sh = messages.scrollHeight,
                ch = messages.clientHeight;
            isScrolledUp = st < sh - ch - 100;
        });

        // ===== POPUPS =====
        onlineBtn.onclick = () => { overlay.style.display = "block";
            document.getElementById('onlinePopup').style.display = "block";
            document.getElementById('adminPopup').style.display = "none"; };
        adminBtn.onclick = () => {
            if (role === "admin") { overlay.style.display = "block";
                document.getElementById('adminPopup').style.display = "block";
                document.getElementById('onlinePopup').style.display = "none"; }
        };

        function closePopup() { overlay.style.display = "none"; }

        // ===== CLEAR =====
        function clearChat() { if (role === "admin") db.ref("messages").remove(); }

        // ===== ENTER =====
        messageInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault();
                send(); } });

        // ===== CLEANUP =====
        function cleanupListeners() {
            messageListeners.forEach(l => { if (l) db.ref("messages").off("child_added", l); });
            typingListeners.forEach(l => { if (l) db.ref("typing").off("value", l); });
            onlineListeners.forEach(l => { if (l) db.ref("onlineUsers").off("value", l); });
            connectionListeners.forEach(l => { if (l) db.ref(".info/connected").off("value", l); });
            messageListeners = [];
            typingListeners = [];
            onlineListeners = [];
            connectionListeners = [];
        }
    </script>

</body>
</html>
