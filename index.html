<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">

<title>Chat</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  position:fixed;
  width:100%;
  background:#0f0f0f; /* 🌙 وضع ليلي إجباري */
  color:#eee;
  font-family:Arial;
}

/* تسجيل الدخول */
#login{
  display:flex;
  height:100%;
  justify-content:center;
  align-items:center;
}

#chat{
  display:none;
  flex-direction:column;
  height:100%;
}

/* الهيدر */
header{
  background:#1a1a1a;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
}

.status{
  font-size:12px;
  opacity:0.8;
}

/* منطقة الرسائل */
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  -webkit-overflow-scrolling:touch;
}

/* ❌ بدون فقاعات - كل الرسائل نفس الشكل */
.msg{
  padding:6px 0;
  font-size:15px;
  border-bottom:1px solid #1f1f1f;
}

.name{
  color:#4fc3f7;
  font-weight:bold;
}

.text{
  color:#e0e0e0;
}

.time{
  font-size:11px;
  color:#888;
  margin-left:6px;
}

/* الإدخال */
footer{
  display:flex;
  background:#1a1a1a;
  border-top:1px solid #333;
}

textarea{
  flex:1;
  padding:10px;
  border:none;
  resize:none;
  font-size:16px;
  outline:none;
  background:#121212;
  color:#fff;
  max-height:90px;
}

button{
  padding:10px;
  border:none;
  background:#333;
  color:#fff;
  min-width:60px;
}

/* متواجدين */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

#modal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#1a1a1a;
  width:90%;
  max-width:320px;
  max-height:400px;
  overflow:auto;
  border-radius:10px;
  padding:15px;
  color:#fff;
}

.user{
  padding:6px;
  border-bottom:1px solid #333;
  color:#ddd;
}

/* جاري الكتابة */
#typing{
  font-size:12px;
  color:#aaa;
  padding:5px 10px;
  height:18px;
}
</style>
</head>

<body>

<div id="login">
  <div>
    <h3>ادخل اسمك</h3>
    <input id="name">
    <button onclick="enterChat()">دخول</button>
  </div>
</div>

<div id="chat">

<header>
  <div>
    الدردشة<br>
    <span class="status" id="status">...</span>
  </div>
  <button onclick="openOnline()">👥 <span id="count">0</span></button>
</header>

<div id="messages"></div>

<div id="typing"></div>

<footer>
  <textarea id="msgInput" placeholder="اكتب رسالة..."></textarea>
  <button onclick="sendMsg()">إرسال</button>
</footer>

</div>

<!-- المتواجدين -->
<div id="overlay" onclick="closeOnline()">
  <div id="modal" onclick="event.stopPropagation()">
    <h4>المتواجدين</h4>
    <div id="onlineList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyB1AsEHXP05N8M66jYPusheLaE60q_Jw",
  authDomain:"mychat-2d881.firebaseapp.com",
  databaseURL:"https://mychat-2d881-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let username="";

/* دخول */
function enterChat(){
  username=document.getElementById("name").value.trim();
  if(!username) return alert("اكتب اسم");

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";

  const ref=db.ref("online/"+username);
  ref.set(true);
  ref.onDisconnect().remove();

  listenMessages();
  loadOnline();
  typingListener();
}

/* وقت */
function formatTime(t){
  const d=new Date(t);
  let h=d.getHours();
  let m=d.getMinutes().toString().padStart(2,'0');
  let p=h>=12?"م":"ص";
  h=h%12||12;
  return h+":"+m+" "+p;
}

/* إرسال */
function sendMsg(){
  const input=document.getElementById("msgInput");
  const text=input.value.trim();
  if(!text) return;

  db.ref("messages").push({
    name:username,
    text:text.substring(0,200),
    time:Date.now()
  });

  input.value="";
  db.ref("typing/"+username).remove();
}

/* Enter */
document.getElementById("msgInput").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
});

/* كتابة المستخدم */
document.getElementById("msgInput").addEventListener("input",()=>{
  db.ref("typing/"+username).set(true);

  clearTimeout(window.typingTimer);
  window.typingTimer=setTimeout(()=>{
    db.ref("typing/"+username).remove();
  },1500);
});

/* الرسائل */
function listenMessages(){
  const box=document.getElementById("messages");

  db.ref("messages").limitToLast(30).on("child_added",snap=>{
    const msg=snap.val();

    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <span class="name">${msg.name}:</span>
      <span class="text">${msg.text}</span>
      <span class="time">${formatTime(msg.time)}</span>
    `;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}

/* المتواجدين */
function loadOnline(){
  db.ref("online").on("value",snap=>{
    const list=document.getElementById("onlineList");
    list.innerHTML="";
    let count=0;

    snap.forEach(c=>{
      count++;
      const d=document.createElement("div");
      d.className="user";
      d.textContent=c.key;
      list.appendChild(d);
    });

    document.getElementById("count").textContent=count;
  });
}

/* جاري الكتابة */
function typingListener(){
  const box=document.getElementById("typing");

  db.ref("typing").on("value",snap=>{
    let users=[];

    snap.forEach(c=>{
      if(c.key!==username) users.push(c.key);
    });

    box.textContent=users.length
      ? "✍️ " + users.join(", ") + " يكتب..."
      : "";
  });
}

/* نافذة */
function openOnline(){
  document.getElementById("overlay").style.display="block";
}
function closeOnline(){
  document.getElementById("overlay").style.display="none";
}

/* حالة الاتصال */
firebase.database().ref(".info/connected").on("value",snap=>{
  const s=document.getElementById("status");

  if(snap.val()){
    s.textContent="🟢 متصل";
  }else{
    s.textContent="🔴 غير متصل";
  }
});
</script>

</body>
</html>
