<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات خاص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #ffb347;
            --accent-glow: #ff8c00;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --info: #1e90ff;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(18, 18, 26, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(255, 179, 71, 0.15);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        body {
            display: flex;
            flex-direction: column;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255, 179, 71, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(30, 144, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 71, 87, 0.02) 0%, transparent 50%);
        }

        /* ============ شريط الحالة العلوي ============ */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow), var(--info), var(--accent));
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
            z-index: 10000;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* ============ منطقة الرسائل ============ */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 60px 15px 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background:
                radial-gradient(ellipse at top, rgba(255, 255, 255, 0.02) 0%, transparent 60%);
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ============ رسالة ============ */
        .msg-wrapper {
            display: flex;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            animation: msgSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transition: all var(--transition-fast);
            position: relative;
        }

        .msg-wrapper:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .msg-wrapper::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0;
            background: var(--accent);
            border-radius: 2px;
            transition: height var(--transition-smooth);
        }

        .msg-wrapper:hover::before {
            height: 60%;
        }

        @keyframes msgSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg-avatar {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .msg-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
        }

        .msg-content {
            flex: 1;
            min-width: 0;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-user {
            font-weight: 700;
            color: var(--accent);
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .msg-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255, 179, 71, 0.15);
            color: var(--accent);
            font-weight: 500;
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .msg-text {
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            direction: rtl;
            text-align: right;
            opacity: 0.95;
        }

        /* ============ رسائل النظام ============ */
        .sys-msg {
            text-align: center;
            color: var(--accent);
            font-size: 12px;
            margin: 10px auto;
            background: rgba(255, 179, 71, 0.08);
            border: 1px solid rgba(255, 179, 71, 0.15);
            padding: 8px 20px;
            border-radius: 30px;
            max-width: fit-content;
            animation: sysMsgIn 0.5s ease, sysMsgOut 0.5s ease 5s forwards;
            backdrop-filter: blur(10px);
        }

        @keyframes sysMsgIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes sysMsgOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ============ منطقة الإدخال ============ */
        #inputArea {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border-subtle);
            position: relative;
            z-index: 10;
        }

        #inputArea::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        #messageInput {
            width: 100%;
            font-size: 15px;
            height: 48px;
            padding: 0 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-medium);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            transition: all var(--transition-smooth);
            outline: none;
        }

        #messageInput:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 179, 71, 0.08);
        }

        #messageInput::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-actions {
            display: flex;
            gap: 6px;
        }

        .emoji-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-medium);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .emoji-btn:hover {
            background: rgba(255, 179, 71, 0.1);
            border-color: var(--accent);
        }

        #sendBtn {
            height: 48px;
            padding: 0 28px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            transition: all var(--transition-smooth);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(255, 179, 71, 0.25);
        }

        #sendBtn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        #sendBtn:hover::before {
            left: 100%;
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 179, 71, 0.4);
        }

        #sendBtn:active {
            transform: translateY(0) scale(0.97);
        }

        /* ============ الأزرار العلوية ============ */
        #topButtons {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            right: calc(12px + env(safe-area-inset-right));
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .top-btn {
            height: 44px;
            padding: 0 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 22px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            color: #fff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            transition: all var(--transition-smooth);
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
        }

        .top-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: var(--shadow-glow);
        }

        .top-btn .icon {
            font-size: 18px;
        }

        .online-badge {
            background: var(--accent);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 7px;
        }

        /* ============ مشغل الفيديو - في الأعلى مثل الأصل ============ */
        #pinnedVideoPlayer {
            position: fixed;
            top: calc(65px + env(safe-area-inset-top));
            left: 15px;
            width: 380px;
            max-width: calc(100% - 30px);
            min-width: 260px;
            background: #000;
            border-radius: var(--radius-md);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.08);
            z-index: 998;
            display: none;
            flex-direction: column;
            overflow: visible;
            animation: playerSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transition: none;
        }

        @keyframes playerSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .player-header {
            background: rgba(10, 10, 15, 0.98);
            padding: 8px 14px;
            cursor: move;
            touch-action: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            font-size: 12px;
            color: #ccc;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        .player-header .dots {
            display: flex;
            gap: 6px;
        }

        .player-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .player-header .dot.red { background: var(--danger); }
        .player-header .dot.yellow { background: var(--warning); }
        .player-header .dot.green { background: var(--success); }

        .close-player {
            background: rgba(255, 71, 87, 0.2);
            border: none;
            color: var(--danger);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .close-player:hover {
            background: var(--danger);
            color: #fff;
            transform: rotate(90deg);
        }

        .player-body {
            position: relative;
            background: #000;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            overflow: hidden;
            min-height: 160px;
        }

        .resize-grip {
            position: absolute;
            width: 16px;
            height: 16px;
            bottom: 3px;
            right: 3px;
            cursor: nwse-resize;
            z-index: 20;
            opacity: 0;
            transition: opacity var(--transition-fast);
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        #pinnedVideoPlayer:hover .resize-grip {
            opacity: 1;
        }

        .video-tabs {
            display: flex;
            gap: 2px;
            padding: 4px 6px;
            background: rgba(0, 0, 0, 0.9);
            overflow-x: auto;
        }

        .video-tab {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #aaa;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Tajawal', sans-serif;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }

        .video-tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            border-color: var(--accent);
        }

        .video-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ============ مشغل Netflix الداخلي المحسن ============ */
        .nplayer {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        .nplayer-video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
            cursor: pointer;
        }

        .nplayer-video-wrap video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            object-fit: contain;
        }

        .nplayer-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            z-index: 2;
        }

        .nplayer-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .nplayer-error {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            font-size: 13px;
            z-index: 3;
            text-align: center;
            padding: 20px;
        }

        .nplayer-error .error-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .nplayer-error button {
            margin-top: 14px;
            padding: 10px 28px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all var(--transition-fast);
        }

        .nplayer-error button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(255, 179, 71, 0.4);
        }

        /* شريط التحكم */
        .nplayer-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.4) 70%, transparent 100%);
            padding: 35px 10px 8px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 4;
        }

        .nplayer-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .nprogress-bar {
            position: relative;
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: height 0.2s;
        }

        .nprogress-bar:hover {
            height: 7px;
        }

        .nprogress-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .nprogress-filled {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            z-index: 2;
            transition: width 0.1s linear;
        }

        .nprogress-filled::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nprogress-bar:hover .nprogress-filled::after {
            opacity: 1;
        }

        .nprogress-input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            z-index: 3;
            margin: 0;
        }

        .ncontrols-bottom {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ncontrols-bottom button {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 8px;
            opacity: 0.85;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 34px;
            height: 34px;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
        }

        .ncontrols-bottom button:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.05);
        }

        .ncontrols-bottom button.active {
            color: var(--accent);
        }

        .ntime-display {
            font-size: 12px;
            color: #ccc;
            min-width: 90px;
            direction: ltr;
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            letter-spacing: 0.5px;
        }

        .nvolume-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nvolume-slider {
            width: 55px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: width 0.2s;
        }

        .nvolume-group:hover .nvolume-slider {
            width: 70px;
        }

        .nvolume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255, 179, 71, 0.5);
        }

        .ndropdown-menu {
            position: relative;
        }

        .ndropdown-content {
            position: absolute;
            bottom: 40px;
            right: 0;
            background: rgba(15, 15, 25, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 90px;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            z-index: 25;
        }

        .ndropdown-content button {
            display: block;
            background: none;
            border: none;
            color: #ccc;
            padding: 8px 18px;
            width: 100%;
            text-align: right;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }

        .ndropdown-content button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .ndropdown-content button.selected {
            color: var(--accent);
            font-weight: 700;
            background: rgba(255, 179, 71, 0.08);
        }

        .nfullscreen-btn {
            margin-right: auto;
            font-size: 20px !important;
        }

        /* ============ النوافذ المنبثقة ============ */
        #usersBox,
        #setVideoModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-secondary);
            padding: 28px;
            border-radius: var(--radius-lg);
            z-index: 1003;
            display: none;
            max-height: 80vh;
            width: 92%;
            max-width: 440px;
            overflow-y: auto;
            border: 1px solid var(--border-medium);
            box-shadow: var(--shadow-lg);
            animation: modalPopIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalPopIn {

    <script>
        (function() {

            // ==================== Rate Limiter ====================

                    const now = Date.now();

                    if (this.msgs.length >= this.max) { showToast('⚠️ تمهل قليلاً', 'warning'); return false; }
                    this.msgs.push(now);

            const limiter = new RateLimiter();

            const esc = (s) => { const d = document.createElement('div');
                d.textContent = s || ''; return d.innerHTML; };
            const sanitize = (s) => s.replace(/<[^>]*>/g, '').replace(/javascript:/gi, '').substring(0, 500);
            const avatarColor = (n) => ['#ffb347', '#1e90ff', '#2ed573', '#ff4757', '#a55eea', '#ff6b81',

                    '') : null; };
            const detectMedia = (u) => {
                if (ytId(u)) return { type: 'youtube', id: ytId(u) };

            function addNote(text) {

            function addMsg(key, { user, text, timestamp }) {

                rew.innerHTML = '⏪';

                        ctTimeout = setTimeout(() => { if (!vid.paused) ct.classList.remove('visible'); }, 3000); } else { ct
                            .classList.remove('visible');
                        clearTimeout(ctTimeout); } }
                on(vw, 'mousemove', () => showCt(true));
                on(vw, 'touchstart', () => showCt(true));
                on(vid, 'play', () => showCt(true));
                on(vid, 'pause', () => showCt(true));

                function loadStream(url) {
                    ld.style.display = 'flex';
                    er.style.display = 'none'; if (hls) { hls.destroy();
                        hls = null; }
                    if (isHLS && Hls.isSupported()) {
                        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                        hls.loadSource(url);
                        hls.attachMedia(vid);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => { ld.style.display = 'none';
                            fillQuality(hls.levels);
                            vid.play().catch(() => {}); });
                        hls.on(Hls.Events.LEVEL_SWITCHED, (e, d) => { const lv = hls.levels[d.level]; if (lv) qB
                                .textContent = lv.height ? lv.height + 'p' : 'HD'; });
                        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) { if (retries < 2) { retries++;
                                    ld.innerHTML =
                                        `<div class="spinner"></div><span>إعادة المحاولة (${retries}/2)...</span>`;
                                    setTimeout(() => loadStream(url), 1000); } else { ld.style.display =
                                        'none';
                                    er.style.display = 'flex'; } } });
                    } else { vid.src = url;
                        vid.play().catch(() => {});
                        ld.style.display = 'none'; }
                }

                function fillQuality(levels) {
                    qD.innerHTML = '';
                    const aB = document.createElement('button');
                    aB.textContent = 'تلقائي';
                    aB.classList.add('selected');
                    aB.onclick = e => { e.stopPropagation(); if (hls) hls.currentLevel = -1;
                        qB.textContent = 'تلقائي';
                        qD.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
                        aB.classList.add('selected');
                        qD.style.display = 'none'; };
                    qD.appendChild(aB); if (levels) levels.forEach((lv, i) => { const h = lv.height ? lv.height +
                            'p' : 'HD';
                        const b = document.createElement('button');
                        b.textContent = h;
                        b.onclick = e => { e.stopPropagation(); if (hls) hls.currentLevel = i;
                            qB.textContent = h;
                            qD.querySelectorAll('button').forEach(x => x.classList.remove('selected'));
                            b.classList.add('selected');
                            qD.style.display = 'none'; };
                        qD.appendChild(b); });
                }

                function updProgress() {
                    if (vid.duration && !isNaN(vid.duration)) { const p = (vid.currentTime / vid.duration) * 100;
                        fill.style.width = p + '%';
                        inp.value = p; if (vid.buffered.length) { const be = vid.buffered.end(vid.buffered.length -
                                1);
                            buf.style.width = ((be / vid.duration) * 100) + '%'; } const f = t => { if (isNaN(t))
                                return '00:00';
                            const m = Math.floor(t / 60),
                                s = Math.floor(t % 60); return String(m).padStart(2, '0') + ':' + String(s)
                                .padStart(2, '0'); };
                        timeD.textContent = f(vid.currentTime) + ' / ' + f(vid.duration); }
                }
                on(vid, 'timeupdate', updProgress);
                on(vid, 'progress', updProgress);
                on(vid, 'loadedmetadata', () => { ld.style.display = 'none';
                    updProgress(); });
                playB.onclick = () => { vid.paused ? vid.play().catch(() => {}) : vid.pause(); };
                on(vid, 'play', () => playB.innerHTML = '⏸');
                on(vid, 'pause', () => playB.innerHTML = '▶');
                rew.onclick = () => vid.currentTime = Math.max(0, vid.currentTime - 10);
                fwd.onclick = () => vid.currentTime = Math.min(vid.duration || 0, vid.currentTime + 10);
                volB.onclick = () => { vid.muted = !vid.muted;
                    volB.innerHTML = vid.muted ? '🔇' : (vid.volume > 0.5 ? '🔊' : '🔉'); };
                volS.oninput = () => { vid.volume = +volS.value;
                    vid.muted = false;
                    volB.innerHTML = vid.volume > 0.5 ? '🔊' : '🔉'; };
                on(vid, 'volumechange', () => { volS.value = vid.volume;
                    volB.innerHTML = vid.muted ? '🔇' : (vid.volume > 0.5 ? '🔊' : '🔉'); });
                inp.oninput = () => fill.style.width = inp.value + '%';
                inp.onchange = () => { if (vid.duration) vid.currentTime = (+inp.value / 100) * vid.duration; };
                pb.addEventListener('click', e => { if (e.target === inp) return;
                    const r = pb.getBoundingClientRect(); if (vid.duration) vid.currentTime = ((e.clientX - r.left) /
                        r.width) * vid.duration; });
                spB.onclick = e => { e.stopPropagation();
                    spD.style.display = spD.style.display === 'block' ? 'none' : 'block';
                    qD.style.display = 'none'; };
                qB.onclick = e => { e.stopPropagation();
                    qD.style.display = qD.style.display === 'block' ? 'none' : 'block';
                    spD.style.display = 'none'; };
                document.addEventListener('click', () => { spD.style.display = 'none';
                    qD.style.display = 'none'; });
                fsB.onclick = () => { document.fullscreenElement ? document.exitFullscreen() : container.closest(
                        '#pinnedVideoPlayer').requestFullscreen().catch(() => {}); };
                er.querySelector('.retry-btn').onclick = () => { retries = 0;
                    loadStream(source); };
                loadStream(source);
                currentPlayer = { video: vid, hls, container: wr };
                playerListeners = L;
                return currentPlayer;
            }

            // ==================== Twitter ====================
            async function fetchTwVids(tid) {
                let vids = [];
                try { const r = await fetch(`https://api.fxtwitter.com/status/${tid}`); if (r.ok) { const d = await r
                        .json(); for (let v of(d.tweet?.media?.videos || [])) if (v.url) vids.push({ url: v.url,
                            type: 'video/mp4' }); } } catch (e) {} if (vids.length) return vids;
                try { const r = await fetch(`https://api.vxtwitter.com/status/${tid}`); if (r.ok) { const d = await r
                        .json(); if (d.media_extended) for (let m of d.media_extended) if ((m.type === 'video' || m
                            .type === 'gif') && m.url) vids.push({ url: m.url, type: 'video/mp4' }); } } catch (e) {}
                return vids;
            }

            function embedTw(container, tid) {
                container.innerHTML =
                    `<iframe src="https://platform.twitter.com/embed/Tweet.html?id=${tid}&theme=dark&lang=ar" style="width:100%;height:100%;min-height:320px;border:none;" allowfullscreen></iframe>`;
                if (!window.twttr) { const s = document.createElement('script');
                    s.src = 'https://platform.twitter.com/widgets.js';
                    s.async = true;
                    document.head.appendChild(s); }
            }

            // ==================== السحب وتغيير الحجم ====================
            function makeDraggable(el, handle) {
                let sx, sy, sl, st,
                    dragging = false;
                const gp = e => e.touches?.[0] || e;
                handle.addEventListener('mousedown', e => { if (e.target.closest('.close-player')) return;
                    e.preventDefault();
                    dragging = true;
                    sx = e.clientX;
                    sy = e.clientY;
                    sl = el.offsetLeft;
                    st = el.offsetTop;
                    el.style.transition = 'none';
                    el.style.right = 'auto';
                    el.style.bottom = 'auto';
                    el.style.left = sl + 'px';
                    el.style.top = st + 'px';
                    document.addEventListener('mousemove', mv);
                    document.addEventListener('mouseup', up); });
                handle.addEventListener('touchstart', e => { if (e.target.closest('.close-player')) return;
                    e.preventDefault();
                    dragging = true;
                    const p = gp(e);
                    sx = p.clientX;
                    sy = p.clientY;
                    sl = el.offsetLeft;
                    st = el.offsetTop;
                    el.style.transition = 'none';
                    el.style.right = 'auto';
                    el.style.bottom = 'auto';
                    el.style.left = sl + 'px';
                    el.style.top = st + 'px';
                    document.addEventListener('touchmove', mv, { passive: false });
                    document.addEventListener('touchend', up); }, { passive: false });

                function mv(e) { if (!dragging) return;
                    e.preventDefault();
                    const p = gp(e); let nl = sl + p.clientX - sx,
                        nt = st + p.clientY - sy;
                    nl = Math.max(0, Math.min(nl, window.innerWidth - el.offsetWidth));
                    nt = Math.max(0, Math.min(nt, window.innerHeight - el.offsetHeight));
                    el.style.left = nl + 'px';
                    el.style.top = nt + 'px'; }

                function up() { dragging = false;
                    el.style.transition = '';
                    document.removeEventListener('mousemove', mv);
                    document.removeEventListener('touchmove', mv);
                    document.removeEventListener('mouseup', up);
                    document.removeEventListener('touchend', up); }
            }

            function makeResizable(el, handle) {
                let sw, sh, sx, sy,
                    resizing = false;
                const gp = e => e.touches?.[0] || e;
                handle.addEventListener('mousedown', e => { e.preventDefault();
                    e.stopPropagation();
                    resizing = true;
                    sw = el.offsetWidth;
                    sh = el.offsetHeight;
                    sx = e.clientX;
                    sy = e.clientY;
                    el.style.transition = 'none';
                    document.addEventListener('mousemove', mv);
                    document.addEventListener('mouseup', up); });
                handle.addEventListener('touchstart', e => { e.preventDefault();
                    e.stopPropagation();
                    resizing = true;
                    sw = el.offsetWidth;
                    sh = el.offsetHeight;
                    const p = gp(e);
                    sx = p.clientX;
                    sy = p.clientY;
                    el.style.transition = 'none';
                    document.addEventListener('touchmove', mv, { passive: false });
                    document.addEventListener('touchend', up); }, { passive: false });

                function mv(e) { if (!resizing) return;
                    e.preventDefault();
                    const p = gp(e);
                    el.style.width = Math.max(260, sw + p.clientX - sx) + 'px';
                    el.style.height = Math.max(180, sh + p.clientY - sy) + 'px'; }

                function up() { resizing = false;
                    el.style.transition = '';
                    document.removeEventListener('mousemove', mv);
                    document.removeEventListener('touchmove', mv);
                    document.removeEventListener('mouseup', up);
                    document.removeEventListener('touchend', up); }
            }

            // ==================== إغلاق النوافذ ====================
            function closeModals() { usersBox.style.display = 'none';
                setVideoModal.style.display = 'none';
                overlay.style.display = 'none'; }

            function renderUsers(users) {
                const list = $('usersList');
                list.innerHTML = '';
                const now = Date.now() + serverTimeOffset; if (!users || !Object.keys(users).length) { list.innerHTML =
                        '<div style="text-align:center;color:#888;padding:20px;">لا يوجد متصلين</div>'; return; }
                for (let u in users) { const d = now - (users[u].lastActive || 0); let cls = 'offline'; if (d < 30000)
                        cls = 'online'; else if (d < 60000) cls = 'idle';
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML =
                        `<span class="status-dot ${cls}"></span><span>${esc(u)}</span>${u===username?'<span style="color:var(--accent);font-size:11px;">(أنت)</span>':''}`;
                    list.appendChild(row); }
            }

            // ==================== بدء الدردشة ====================
            function startChat() {
                loginScreen.style.display = 'none';
                chatContainer.style.display = 'flex';
                db.ref('.info/serverTimeOffset').on('value', s => serverTimeOffset = s.val() || 0);
                userRef = db.ref('online/' + username);
                messagesRef = db.ref('messages');
                onlineRef = db.ref('online');
                pinnedVideoRef = db.ref('pinned_video');
                userRef.set({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                userRef.onDisconnect().remove();
                setInterval(() => userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP }), 30000);
                db.ref('.info/connected').on('value', s => showToast(s.val() ? '✅ متصل بالخادم' :
                    '⚠️ فقدان الاتصال', s.val() ? 'success' : 'error'));
                setInterval(() => { const now = Date.now() + serverTimeOffset;
                    onlineRef.once('value', s => s.forEach(c => { if (now - (c.val().lastActive || 0) > 120000) c.ref
                            .remove(); })); }, 60000);
                $('inputArea').onsubmit = e => { e.preventDefault();
                    const txt = sanitize(messageInput.value.trim()); if (!txt || !limiter.canSend()) return;
                    messagesRef.push({ user: username, text: txt, timestamp: firebase.database.ServerValue
                            .TIMESTAMP }).catch(() => showToast('❌ فشل الإرسال', 'error'));
                    messageInput.value = '';
                    messageInput.focus();
                    scrollBottom(); if (typingRef) typingRef.child(username).remove();
                    clearTimeout(typingTimeout); };
                messagesRef.limitToLast(MSG_LIMIT).on('child_added', s => { const v = s.val(); if (v?.user && v?.text)
                        addMsg(s.key, { user: v.user, text: v.text, timestamp: v.timestamp || Date.now() +
                            serverTimeOffset }); });
                messagesRef.on('child_removed', s => { messageTimestamps.delete(s.key);
                    document.getElementById(`msg-${s.key}`)?.remove(); });
                onlineRef.on('value', s => { $('count').innerText = s.numChildren();
                    renderUsers(s.val() || {}); });
                onlineListBtn.onclick = () => { usersBox.style.display = 'block';
                    overlay.style.display = 'block'; };
                setVideoBtn.onclick = () => { setVideoModal.style.display = 'block';
                    overlay.style.display = 'block'; };
                overlay.onclick = closeModals;
                document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });
                submitVideoUrlBtn.onclick = async () => { const raw = videoUrlInput.value.trim(); if (!raw) { showToast(
                            '⚠️ أدخل رابطاً', 'warning'); return; } try { const u = cleanUrl(raw) || raw;
                        const m = detectMedia(u); if (m.type === 'unknown') { showToast('⚠️ رابط غير مدعوم',
                                'warning'); return; }
                        await pinnedVideoRef.set({ ...m, setBy: username });
                        videoUrlInput.value = '';
                        closeModals();
                        showToast('✅ تم التشغيل', 'success'); } catch (e) { showToast('❌ فشل', 'error'); } };
                pinnedVideoRef.on('value', async s => {
                    if (currentPlayer) { playerListeners.forEach(({ el, ev, h }) => el.removeEventListener(ev, h));
                        playerListeners = []; if (currentPlayer.hls) { currentPlayer.hls.destroy();
                            currentPlayer.hls = null; } if (currentPlayer.video) { currentPlayer.video.pause();
                            currentPlayer.video.src = ''; }
                        currentPlayer = null; }
                    const data = s.val(); if (!data) { pinnedVideoPlayer.style.display = 'none';
                        pinnedVideoPlayer.querySelector('.player-body').innerHTML = ''; return; }
                    pinnedVideoPlayer.innerHTML = `<div class="player-header"><div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div><span style="font-weight:500;">مشغل - ${esc(data.setBy||'')}</span><button class="close-player">✕</button></div><div class="player-body"></div><div class="resize-grip"></div>`;
                    pinnedVideoPlayer.style.display = 'flex';
                    pinnedVideoPlayer.querySelector('.close-player').onclick = e => { e.stopPropagation();
                        pinnedVideoRef.remove();
                        pinnedVideoPlayer.style.display = 'none'; };
                    makeDraggable(pinnedVideoPlayer, pinnedVideoPlayer.querySelector('.player-header'));
                    makeResizable(pinnedVideoPlayer, pinnedVideoPlayer.querySelector('.resize-grip'));
                    const body = pinnedVideoPlayer.querySelector('.player-body');
                    try { if (data.type === 'youtube') body.innerHTML =
                            `<iframe src="https://www.youtube.com/embed/${data.id}?autoplay=1&rel=0" style="width:100%;aspect-ratio:16/9;border:none;" allow="autoplay;encrypted-media" allowfullscreen></iframe>`; else if (
                            data.type === 'm3u' || data.type === 'direct') createPlayer(body, data.url, data.type ===
                            'm3u' ? 'application/x-mpegURL' : 'video/mp4'); else if (data.type === 'twitter') { const
                            vids = await fetchTwVids(data.id); if (vids.length) { createPlayer(body, vids[0].url,
                                'video/mp4'); if (vids.length > 1) { const bar = document.createElement('div');
                                bar.className = 'video-tabs';
                                vids.forEach((v, i) => { const btn = document.createElement('button');
                                    btn.className = 'video-tab' + (i === 0 ? ' active' : '');
                                    btn.textContent = `مقطع ${i+1}`;
                                    btn.onclick = () => { body.innerHTML = '';
                                        createPlayer(body, v.url, 'video/mp4');
                                        bar.querySelectorAll('.video-tab').forEach(b => b
                                            .classList.remove('active'));
                                        btn.classList.add('active'); };
                                    bar.appendChild(btn); });
                                body.appendChild(bar); } } else embedTw(body, data.id); }
                        showToast(`🎬 ${esc(data.setBy||'')} شغّل فيديو`, 'info'); } catch (e) { showToast(
                            '❌ فشل التشغيل', 'error'); }
                });
                initTyping();
                messageInput.focus();
            }

            // ==================== تسجيل الدخول ====================
            function attemptLogin() {
                const raw = usernameInput.value.trim(); if (!raw) return showToast('⚠️ أدخل اسماً', 'warning'); if (
                    /[.#$[\]/]/.test(raw)) return showToast('⚠️ أحرف غير مسموحة', 'warning'); if (raw.length < 2)
                    return showToast('⚠️ الاسم قصير', 'warning'); if (raw.length > 15) return showToast(
                    '⚠️ الاسم طويل', 'warning');
                username = raw;
                startChat();
            }
            loginBtn.onclick = attemptLogin;
            usernameInput.onkeypress = e => { if (e.key === 'Enter') attemptLogin(); };
            window.addEventListener('beforeunload', () => { if (currentPlayer?.hls) currentPlayer.hls.destroy(); if (
                    userRef) userRef.remove(); if (typingRef && username) typingRef.child(username).remove(); });
        })();
    </script>
</body>
