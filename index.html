<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1e1f22">

<title>Chat</title>

<style>
*{box-sizing:border-box;font-family:Arial}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#1e1f22;
  color:#fff;
}

/* login */
#login{
  display:flex;
  height:100%;
  justify-content:center;
  align-items:center;
}

/* app */
#app{
  display:none;
  height:100%;
  flex-direction:column;
}

/* header */
header{
  padding:10px;
  background:#2b2d31;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* chat */
#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* msg بدون فقاعة */
.msg{
  padding:6px 0;
  border-bottom:1px solid #2a2b2f;
}

.name{color:#5865f2;font-weight:bold}
.text{color:#ddd}

/* footer */
footer{
  display:flex;
  background:#2b2d31;
  padding:8px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  background:#1e1f22;
  color:#fff;
  outline:none;
}

button{
  padding:10px;
  border:none;
  background:#5865f2;
  color:#fff;
}

/* 🔥 نافذة المستخدمين */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
}

#modal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:300px;
  background:#2b2d31;
  border-radius:10px;
  padding:10px;
}

.user{
  padding:6px;
  border-bottom:1px solid #3a3c41;
}
</style>
</head>

<body>

<div id="login">
  <div>
    <h3>اسمك</h3>
    <input id="name">
    <button onclick="enter()">دخول</button>
  </div>
</div>

<div id="app">

<header>
  💬 Chat
  <button onclick="openUsers()">👥</button>
</header>

<div id="messages"></div>

<div id="typing"></div>

<footer>
  <input id="msg">
  <button onclick="send()">إرسال</button>
</footer>

</div>

<!-- USERS MODAL -->
<div id="overlay" onclick="closeUsers()">
  <div id="modal" onclick="event.stopPropagation()">
    <h4>المستخدمين</h4>
    <div id="users"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyB1AsEHXP05N8M66jYPusheLaE60q_Jw",
  authDomain:"mychat-2d881.firebaseapp.com",
  databaseURL:"https://mychat-2d881-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let name="";

/* دخول */
function enter(){
  name=document.getElementById("name").value.trim();
  if(!name) return;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  const ref=db.ref("online/"+name);
  ref.set(true);
  ref.onDisconnect().remove();

  loadMessages();
  loadUsers();
  typingFix();
}

/* إرسال */
function send(){
  let msg=document.getElementById("msg").value;
  if(!msg) return;

  db.ref("messages").push({
    name,
    text:msg,
    time:Date.now()
  });

  document.getElementById("msg").value="";
  db.ref("typing/"+name).remove();
}

/* رسائل */
function loadMessages(){
  const box=document.getElementById("messages");

  db.ref("messages").limitToLast(50).on("child_added",s=>{
    let m=s.val();

    let div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <span class="name">${m.name}:</span>
      <span class="text">${m.text}</span>
    `;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}

/* 👥 المستخدمين (Modal) */
function openUsers(){
  document.getElementById("overlay").style.display="block";
}
function closeUsers(){
  document.getElementById("overlay").style.display="none";
}

function loadUsers(){
  db.ref("online").on("value",s=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    s.forEach(c=>{
      let d=document.createElement("div");
      d.className="user";
      d.textContent=c.key;
      box.appendChild(d);
    });
  });
}

/* ✍️ إصلاح “يكتب الآن” */
function typingFix(){
  const input=document.getElementById("msg");

  input.addEventListener("input",()=>{

    db.ref("typing/"+name).set({
      t:Date.now()   // مهم: بيانات حقيقية
    });

    clearTimeout(window.typingTimer);

    window.typingTimer=setTimeout(()=>{
      db.ref("typing/"+name).remove();
    },1200);
  });

  db.ref("typing").on("value",s=>{
    let arr=[];

    s.forEach(c=>{
      if(c.key!==name) arr.push(c.key);
    });

    document.getElementById("typing").textContent =
      arr.length ? "✍️ " + arr.join(", ") + " يكتب..." : "";
  });
}
</script>

</body>
</html>
