<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#075e54">

<title>شات خاص</title>

<style>
* {
  -webkit-tap-highlight-color: transparent;
  box-sizing: border-box;
}

body {
  margin:0;
  font-family:Arial;
  background:#ece5dd;
  overscroll-behavior:none;
}

/* تسجيل الدخول */
#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

/* الهيدر */
header {
  background:#075e54;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status {
  font-size:12px;
  opacity:0.9;
}

/* الرسائل */
#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  -webkit-overflow-scrolling:touch;
}

.msg {
  display:flex;
  gap:6px;
  background:#fff;
  padding:6px 10px;
  margin:4px 0;
  border-radius:8px;
  max-width:85%;
  font-size:14px;
}

.me {
  background:#dcf8c6;
  margin-left:auto;
}

.name { font-weight:bold; }
.text { flex:1; }
.time { font-size:11px; color:#666; white-space:nowrap; }

/* الإدخال */
footer {
  display:flex;
  background:#fff;
  position:sticky;
  bottom:0;
}

textarea {
  flex:1;
  padding:10px;
  border:none;
  resize:none;
  font-size:16px;
  outline:none;
  max-height:90px;
}

button {
  padding:10px;
  border:none;
  background:#128c7e;
  color:#fff;
  min-width:60px;
  font-size:16px;
}

/* نافذة المتواجدين */
#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

#modal {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  width:90%;
  max-width:320px;
  max-height:400px;
  overflow:auto;
  border-radius:10px;
  padding:15px;
}

.user {
  padding:6px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div id="login">
  <div>
    <h3>ادخل اسمك</h3>
    <input id="name">
    <button onclick="enterChat()">دخول</button>
  </div>
</div>

<div id="chat">

<header>
  <div>
    الدردشة<br>
    <span class="status" id="status">...</span>
  </div>
  <button onclick="openOnline()">👥 <span id="count">0</span></button>
</header>

<div id="messages"></div>

<footer>
  <textarea id="msgInput" placeholder="اكتب رسالة..."></textarea>
  <button onclick="sendMsg()">إرسال</button>
</footer>

</div>

<div id="overlay" onclick="closeOnline()">
  <div id="modal" onclick="event.stopPropagation()">
    <h4>المتواجدين</h4>
    <div id="onlineList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB1AsEHXP05N8M66jYPusheLaE60q_Jw",
  authDomain: "mychat-2d881.firebaseapp.com",
  databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let msgCount=0;

/* دخول */
function enterChat(){
  username = document.getElementById("name").value.trim();
  if(!username) return alert("اكتب اسم");

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";

  const ref = db.ref("online/"+username);
  ref.set(true);
  ref.onDisconnect().remove();

  listenMessages();
  loadOnline();
}

/* وقت */
function formatTime(t){
  const d = new Date(t);
  let h = d.getHours();
  let m = d.getMinutes().toString().padStart(2,'0');
  let p = h>=12?"م":"ص";
  h = h%12 || 12;
  return h+":"+m+" "+p;
}

/* إرسال */
function sendMsg(){
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;

  db.ref("messages").push({
    name: username,
    text: text.substring(0,200),
    time: Date.now()
  });

  input.value="";
}

/* Enter */
document.getElementById("msgInput").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
});

/* تكبير الإدخال */
document.getElementById("msgInput").addEventListener("input", function(){
  this.style.height="auto";
  this.style.height=this.scrollHeight+"px";
});

/* رسائل */
function listenMessages(){
  const box = document.getElementById("messages");

  db.ref("messages").limitToLast(30).on("child_added", snap=>{
    const msg = snap.val();

    const div = document.createElement("div");
    div.className="msg " + (msg.name===username?"me":"");

    div.innerHTML=`
      <span class="name">${msg.name}:</span>
      <span class="text">${msg.text}</span>
      <span class="time">${formatTime(msg.time)}</span>
    `;

    box.appendChild(div);

    box.scrollTo({
      top: box.scrollHeight,
      behavior:"smooth"
    });

    msgCount++;
    if(msgCount>30){
      box.removeChild(box.firstChild);
    }
  });
}

/* متواجدين */
function loadOnline(){
  db.ref("online").on("value", snap=>{
    const list=document.getElementById("onlineList");
    list.innerHTML="";
    let count=0;

    snap.forEach(c=>{
      count++;
      const div=document.createElement("div");
      div.className="user";
      div.textContent=c.key;
      list.appendChild(div);
    });

    document.getElementById("count").textContent=count;
  });
}

/* نافذة */
function openOnline(){
  document.getElementById("overlay").style.display="block";
}
function closeOnline(){
  document.getElementById("overlay").style.display="none";
}

/* إغلاق ESC */
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeOnline();
});

/* اتصال */
let retry=0;
let timer;

firebase.database().ref(".info/connected").on("value", snap=>{
  const s=document.getElementById("status");

  if(snap.val()){
    retry=0;
    clearInterval(timer);
    s.textContent="🟢 متصل";
  }else{
    timer=setInterval(()=>{
      retry++;
      s.textContent="🔄 إعادة الاتصال ("+retry+")...";
    },2000);
  }
});
</script>

</body>
</html>
