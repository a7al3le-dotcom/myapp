<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات خاص - نسخة متطورة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-secondary: #111827;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-dark: #d97706;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(17, 24, 39, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 50%, #0a0e17 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ============ شاشة تسجيل الدخول المحسنة ============ */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            z-index: 9999;
        }

        .login-container {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .input-group label {
            position: absolute;
            right: 20px;
            top: -12px;
            background: #1e293b;
            padding: 0 10px;
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* ============ شريط التنبيهات ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 24px;
            color: white;
            font-size: 14px;
            pointer-events: auto;
            animation: toastIn 0.5s ease, toastOut 0.5s ease 4s forwards;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.warning { border-left: 4px solid var(--warning); }
        .toast.info { border-left: 4px solid #3b82f6; }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* ============ واجهة الدردشة ============ */
        .chat-wrapper {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: black;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 16px;
            animation: messageIn 0.3s ease;
            transition: all 0.3s ease;
        }

        .message:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-username {
            font-weight: 700;
            color: var(--accent-light);
            font-size: 14px;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .message-text {
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-text a {
            color: #3b82f6;
            text-decoration: underline;
        }

        .system-message {
            text-align: center;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 12px;
            padding: 8px 20px;
            margin: 10px auto;
            font-size: 13px;
            color: var(--accent-light);
            max-width: fit-content;
        }

        .typing-indicator {
            display: none;
            padding: 8px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            font-style: italic;
        }

        .typing-indicator .dots {
            display: inline-flex;
            gap: 3px;
            margin-right: 5px;
        }

        .typing-indicator .dot {
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingDot 1.4s infinite;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingDot {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }

        .input-area {
            padding: 12px 20px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.1);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ============ النوافذ المنبثقة ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent-light);
        }

        .user-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .user-list-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .online-dot.online {
            background: var(--success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .online-dot.idle {
            background: var(--warning);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        .online-dot.offline {
            background: #6b7280;
        }

        .video-url-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .video-url-input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        /* ============ مشغل الفيديو ============ */
        .video-player {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 400px;
            max-width: calc(100vw - 40px);
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            z-index: 900;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            resize: both;
            min-width: 300px;
            min-height: 200px;
        }

        .video-header-bar {
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .close-video-btn {
            background: var(--danger);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-video-btn:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .video-container iframe,
        .video-container video {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .video-player {
                top: auto;
                bottom: 80px;
                right: 10px;
                width: calc(100vw - 20px);
                max-width: none;
            }

            .login-container {
                padding: 25px;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- شاشة تسجيل الدخول -->
    <div class="login-screen" id="loginScreen">
        <div class="login-container">
            <div class="login-header">
                <span class="login-icon">💬</span>
                <h1 class="login-title">شات خاص</h1>
                <p class="login-subtitle">انضم إلى المحادثة الآن</p>
            </div>
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="usernameInput" placeholder="أدخل اسمك..." maxlength="20" autocomplete="off">
            </div>
            <button class="login-btn" id="loginBtn">🚀 دخول إلى الشات</button>
        </div>
    </div>

    <!-- حاوية التنبيهات -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- واجهة الدردشة -->
    <div class="chat-wrapper" id="chatWrapper">
        <div class="chat-header">
            <h2 style="font-size: 20px;">💬 شات مباشر</h2>
            <div class="header-buttons">
                <button class="icon-btn" id="videoBtn" title="تشغيل فيديو">
                    📺
                </button>
                <button class="icon-btn" id="usersBtn" title="المستخدمين المتصلين">
                    👥
                    <span class="badge" id="onlineCount">0</span>
                </button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer"></div>
        <div class="typing-indicator" id="typingIndicator">
            <span id="typingText"></span>
            <span class="dots">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </span>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off" maxlength="500">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <!-- نافذة المستخدمين -->
    <div class="modal-overlay" id="usersOverlay">
        <div class="modal" id="usersModal">
            <h3 class="modal-title">👥 المستخدمين المتصلين</h3>
            <div id="usersList"></div>
        </div>
    </div>

    <!-- نافذة إضافة فيديو -->
    <div class="modal-overlay" id="videoOverlay">
        <div class="modal" id="videoModal">
            <h3 class="modal-title">📺 تشغيل فيديو للجميع</h3>
            <input type="text" class="video-url-input" id="videoUrlInput" placeholder="الصق رابط الفيديو هنا...">
            <button class="submit-btn" id="submitVideoBtn">🎬 تشغيل الفيديو</button>
        </div>
    </div>

    <!-- مشغل الفيديو -->
    <div class="video-player" id="videoPlayer">
        <div class="video-header-bar" id="videoHeader">
            <span style="font-size: 13px;">🎬 مشغل الفيديو</span>
            <button class="close-video-btn" id="closeVideoBtn">✕</button>
        </div>
        <div class="video-container" id="videoContainer"></div>
    </div>

    <script>
        (function() {
            // ============ تهيئة Firebase ============
            const firebaseConfig = {
                apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
                authDomain: "mychat-2d881.firebaseapp.com",
                databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
            };

            try {
                firebase.initializeApp(firebaseConfig);
            } catch (e) {
                console.log('Firebase already initialized');
            }

            const db = firebase.database();
            let currentUser = '';
            let messageLimit = 100;

            // ============ نظام التوست (الإشعارات) ============
            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, 4500);
            }

            // ============ دوال مساعدة ============
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getAvatarColor(name) {
                const colors = ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                }
                return colors[Math.abs(hash) % colors.length];
            }

            function getInitials(name) {
                return name.substring(0, 2).toUpperCase();
            }

            function detectMediaType(url) {
                const patterns = {
                    youtube: /(?:youtube\.com\/(?:shorts\/|watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/i,
                    twitter: /(?:twitter|x)\.com\/\w+\/status\/(\d+)/i,
                    directVideo: /\.(mp4|webm|mov|m4v|mkv|avi)(\?.*)?$/i,
                    hls: /\.(m3u8|m3u)(\?.*)?$/i
                };

                for (let [type, pattern] of Object.entries(patterns)) {
                    const match = url.match(pattern);
                    if (match) return { type, id: match[1] || url };
                }
                return { type: 'unknown', id: url };
            }

            function formatTime(timestamp) {
                if (!timestamp) return '';
                const now = Date.now();
                const diff = Math.floor((now - timestamp) / 1000);

                if (diff < 10) return 'الآن';
                if (diff < 60) return `${diff} ثانية`;
                if (diff < 3600) return `${Math.floor(diff / 60)} دقيقة`;
                if (diff < 86400) return `${Math.floor(diff / 3600)} ساعة`;

                const date = new Date(timestamp);
                return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            }

            // ============ نظام Rate Limiting ============
            class RateLimiter {
                constructor(maxMessages = 3, timeWindow = 5000) {
                    this.messages = [];
                    this.maxMessages = maxMessages;
                    this.timeWindow = timeWindow;
                }

                canSend() {
                    const now = Date.now();
                    this.messages = this.messages.filter(time => now - time < this.timeWindow);
                    if (this.messages.length >= this.maxMessages) {
                        showToast('⚠️ يرجى الانتظار قليلاً قبل الإرسال مرة أخرى', 'warning');
                        return false;
                    }
                    this.messages.push(now);
                    return true;
                }
            }

            const rateLimiter = new RateLimiter(3, 5000);

            // ============ إدارة الدردشة ============
            function initializeChat() {
                const loginScreen = document.getElementById('loginScreen');
                const chatWrapper = document.getElementById('chatWrapper');
                const messagesContainer = document.getElementById('messagesContainer');
                const messageInput = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const typingIndicator = document.getElementById('typingIndicator');
                const typingText = document.getElementById('typingText');
                const onlineCount = document.getElementById('onlineCount');
                const usersList = document.getElementById('usersList');
                const usersOverlay = document.getElementById('usersOverlay');
                const videoOverlay = document.getElementById('videoOverlay');
                const videoUrlInput = document.getElementById('videoUrlInput');
                const videoPlayer = document.getElementById('videoPlayer');
                const videoContainer = document.getElementById('videoContainer');

                // الحصول على الوقت من السيرفر
                db.ref('.info/serverTimeOffset').on('value', snap => {
                    window.serverTimeOffset = snap.val() || 0;
                });

                // مراجع Firebase
                const messagesRef = db.ref('messages');
                const onlineRef = db.ref('online');
                const videoRef = db.ref('pinned_video');
                const typingRef = db.ref('typing');

                // إعداد المستخدم
                const userRef = db.ref(`online/${currentUser}`);
                userRef.set({
                    lastActive: firebase.database.ServerValue.TIMESTAMP,
                    joinedAt: firebase.database.ServerValue.TIMESTAMP
                });
                userRef.onDisconnect().remove();

                // تحديث النشاط
                setInterval(() => {
                    userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                }, 30000);

                // تنظيف المستخدمين غير النشطين
                setInterval(() => {
                    const now = Date.now() + (window.serverTimeOffset || 0);
                    onlineRef.once('value', snap => {
                        snap.forEach(child => {
                            const lastActive = child.val().lastActive || 0;
                            if (now - lastActive > 120000) {
                                child.ref.remove();
                            }
                        });
                    });
                }, 60000);

                // حالة الاتصال
                db.ref('.info/connected').on('value', snap => {
                    if (snap.val() === true) {
                        showToast('✅ متصل بالخادم', 'success');
                    } else {
                        showToast('⚠️ فقدان الاتصال بالخادم', 'error');
                    }
                });

                // ============ استقبال وإرسال الرسائل ============
                messagesRef.limitToLast(messageLimit).on('child_added', snap => {
                    const msg = snap.val();
                    if (!msg || !msg.user) return;

                    const messageElement = createMessageElement(snap.key, msg);
                    messagesContainer.appendChild(messageElement);
                    scrollToBottom();

                    // إزالة الرسائل القديمة
                    while (messagesContainer.children.length > messageLimit + 20) {
                        const firstChild = messagesContainer.firstElementChild;
                        if (firstChild) firstChild.remove();
                    }
                });

                messagesRef.on('child_removed', snap => {
                    const element = document.getElementById(`msg-${snap.key}`);
                    if (element) element.remove();
                });

                function createMessageElement(key, msg) {
                    const div = document.createElement('div');
                    div.className = 'message';
                    div.id = `msg-${key}`;

                    const avatarColor = getAvatarColor(msg.user);
                    const initials = getInitials(msg.user);
                    const time = formatTime(msg.timestamp);

                    div.innerHTML = `
                        <div class="message-avatar" style="background: ${avatarColor};">${initials}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-username">${escapeHTML(msg.user)}</span>
                                <span class="message-time">${time}</span>
                            </div>
                            <div class="message-text">${escapeHTML(msg.text || '')}</div>
                        </div>
                    `;

                    return div;
                }

                function scrollToBottom() {
                    requestAnimationFrame(() => {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    });
                }

                function sendMessage() {
                    const text = messageInput.value.trim();
                    if (!text) return;
                    if (text.length > 500) {
                        showToast('⚠️ الرسالة طويلة جداً (الحد الأقصى 500 حرف)', 'warning');
                        return;
                    }
                    if (!rateLimiter.canSend()) return;

                    messagesRef.push({
                        user: currentUser,
                        text: text,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).catch(err => {
                        console.error('Error sending message:', err);
                        showToast('❌ فشل إرسال الرسالة', 'error');
                    });

                    messageInput.value = '';
                    messageInput.focus();
                    typingRef.child(currentUser).remove();
                }

                sendBtn.addEventListener('click', sendMessage);
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // ============ مؤشر الكتابة ============
                let typingTimeout;
                let isTyping = false;

                messageInput.addEventListener('input', () => {
                    if (messageInput.value.length > 0) {
                        if (!isTyping) {
                            isTyping = true;
                            typingRef.child(currentUser).set({
                                timestamp: firebase.database.ServerValue.TIMESTAMP
                            });
                        }
                        clearTimeout(typingTimeout);
                        typingTimeout = setTimeout(() => {
                            isTyping = false;
                            typingRef.child(currentUser).remove();
                        }, 2000);
                    } else {
                        isTyping = false;
                        typingRef.child(currentUser).remove();
                        clearTimeout(typingTimeout);
                    }
                });

                const typingUsers = new Map();
                typingRef.on('value', snap => {
                    typingUsers.clear();
                    snap.forEach(child => {
                        if (child.key !== currentUser) {
                            typingUsers.set(child.key, child.val().timestamp);
                        }
                    });
                    updateTypingDisplay();
                });

                function updateTypingDisplay() {
                    const now = Date.now() + (window.serverTimeOffset || 0);
                    const activeTypers = [];

                    typingUsers.forEach((timestamp, user) => {
                        if (now - timestamp < 3000) {
                            activeTypers.push(user);
                        }
                    });

                    if (activeTypers.length === 0) {
                        typingIndicator.style.display = 'none';
                    } else {
                        typingIndicator.style.display = 'block';
                        if (activeTypers.length === 1) {
                            typingText.textContent = `${activeTypers[0]} يكتب`;
                        } else if (activeTypers.length === 2) {
                            typingText.textContent = `${activeTypers[0]} و ${activeTypers[1]} يكتبان`;
                        } else {
                            typingText.textContent = `${activeTypers.length} أشخاص يكتبون`;
                        }
                    }
                }

                // ============ قائمة المستخدمين ============
                onlineRef.on('value', snap => {
                    const users = snap.val() || {};
                    const count = Object.keys(users).length;
                    onlineCount.textContent = count;
                    updateUsersList(users);
                });

                function updateUsersList(users) {
                    const now = Date.now() + (window.serverTimeOffset || 0);
                    usersList.innerHTML = '';

                    if (Object.keys(users).length === 0) {
                        usersList.innerHTML = '<p style="text-align:center;color:#9ca3af;">لا يوجد مستخدمين متصلين</p>';
                        return;
                    }

                    Object.entries(users).forEach(([name, data]) => {
                        const lastActive = data.lastActive || 0;
                        const diff = now - lastActive;
                        let status = 'offline';
                        if (diff < 30000) status = 'online';
                        else if (diff < 60000) status = 'idle';

                        const div = document.createElement('div');
                        div.className = 'user-list-item';
                        div.innerHTML = `
                            <div class="online-dot ${status}"></div>
                            <span>${escapeHTML(name)}</span>
                            ${name === currentUser ? '<span style="color:#f59e0b;font-size:12px;">(أنت)</span>' : ''}
                        `;
                        usersList.appendChild(div);
                    });
                }

                // ============ إدارة الفيديو ============
                videoRef.on('value', snap => {
                    const data = snap.val();
                    if (!data) {
                        videoPlayer.style.display = 'none';
                        videoContainer.innerHTML = '';
                        return;
                    }

                    videoPlayer.style.display = 'block';
                    showToast(`🎬 ${data.setBy} قام بتشغيل فيديو`, 'info');

                    try {
                        if (data.type === 'youtube') {
                            videoContainer.innerHTML = `
                                <iframe src="https://www.youtube.com/embed/${data.id}?autoplay=1&rel=0"
                                    allow="autoplay; encrypted-media" allowfullscreen>
                                </iframe>
                            `;
                        } else if (data.type === 'direct' || data.type === 'm3u') {
                            videoContainer.innerHTML = `
                                <video controls autoplay playsinline style="width:100%;height:100%;">
                                    <source src="${data.url}" type="${data.type === 'm3u' ? 'application/x-mpegURL' : 'video/mp4'}">
                                </video>
                            `;
                            const video = videoContainer.querySelector('video');
                            if (video) {
                                video.play().catch(() => {
                                    showToast('ℹ️ انقر على زر التشغيل لبدء الفيديو', 'info');
                                });
                            }
                        } else if (data.type === 'twitter') {
                            videoContainer.innerHTML = `
                                <iframe src="https://platform.twitter.com/embed/Tweet.html?id=${data.id}&theme=dark"
                                    style="width:100%;height:100%;min-height:300px;border:none;">
                                </iframe>
                            `;
                        }
                    } catch (e) {
                        console.error('Error loading video:', e);
                        showToast('❌ فشل تحميل الفيديو', 'error');
                    }
                });

                document.getElementById('submitVideoBtn').addEventListener('click', async () => {
                    const url = videoUrlInput.value.trim();
                    if (!url) {
                        showToast('⚠️ يرجى إدخال رابط الفيديو', 'warning');
                        return;
                    }

                    const media = detectMediaType(url);

                    try {
                        switch (media.type) {
                            case 'youtube':
                                await videoRef.set({ type: 'youtube', id: media.id, setBy: currentUser });
                                break;
                            case 'directVideo':
                                await videoRef.set({ type: 'direct', url: media.id, setBy: currentUser });
                                break;
                            case 'hls':
                                await videoRef.set({ type: 'm3u', url: media.id, setBy: currentUser });
                                break;
                            case 'twitter':
                                await videoRef.set({ type: 'twitter', id: media.id, setBy: currentUser });
                                break;
                            default:
                                showToast('⚠️ رابط غير مدعوم', 'warning');
                                return;
                        }

                        videoUrlInput.value = '';
                        videoOverlay.style.display = 'none';
                        showToast('✅ تم تشغيل الفيديو بنجاح', 'success');
                    } catch (e) {
                        console.error('Error setting video:', e);
                        showToast('❌ فشل تشغيل الفيديو', 'error');
                    }
                });

                document.getElementById('closeVideoBtn').addEventListener('click', () => {
                    videoRef.remove();
                    videoPlayer.style.display = 'none';
                    videoContainer.innerHTML = '';
                });

                // ============ سحب الفيديو ============
                const videoHeader = document.getElementById('videoHeader');
                let isDragging = false;
                let startX, startY, startLeft, startTop;

                videoHeader.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    const rect = videoPlayer.getBoundingClientRect();
                    startLeft = rect.left;
                    startTop = rect.top;
                    videoPlayer.style.transition = 'none';
                });

                videoHeader.addEventListener('touchstart', (e) => {
                    isDragging = true;
                    const touch = e.touches[0];
                    startX = touch.clientX;
                    startY = touch.clientY;
                    const rect = videoPlayer.getBoundingClientRect();
                    startLeft = rect.left;
                    startTop = rect.top;
                    videoPlayer.style.transition = 'none';
                }, { passive: false });

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    videoPlayer.style.right = 'auto';
                    videoPlayer.style.left = `${startLeft + dx}px`;
                    videoPlayer.style.top = `${startTop + dy}px`;
                });

                document.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    const touch = e.touches[0];
                    const dx = touch.clientX - startX;
                    const dy = touch.clientY - startY;
                    videoPlayer.style.right = 'auto';
                    videoPlayer.style.left = `${startLeft + dx}px`;
                    videoPlayer.style.top = `${startTop + dy}px`;
                }, { passive: false });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                    videoPlayer.style.transition = 'all 0.3s ease';
                });

                document.addEventListener('touchend', () => {
                    isDragging = false;
                    videoPlayer.style.transition = 'all 0.3s ease';
                });

                // ============ أزرار الواجهة ============
                document.getElementById('usersBtn').addEventListener('click', () => {
                    usersOverlay.style.display = 'flex';
                });

                document.getElementById('videoBtn').addEventListener('click', () => {
                    videoOverlay.style.display = 'flex';
                });

                usersOverlay.addEventListener('click', (e) => {
                    if (e.target === usersOverlay) usersOverlay.style.display = 'none';
                });

                videoOverlay.addEventListener('click', (e) => {
                    if (e.target === videoOverlay) videoOverlay.style.display = 'none';
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        usersOverlay.style.display = 'none';
                        videoOverlay.style.display = 'none';
                    }
                });

                // إظهار الواجهة
                loginScreen.style.display = 'none';
                chatWrapper.style.display = 'flex';
                messageInput.focus();
                scrollToBottom();
            }

            // ============ تسجيل الدخول ============
            document.getElementById('loginBtn').addEventListener('click', () => {
                const username = document.getElementById('usernameInput').value.trim();

                if (!username) {
                    showToast('⚠️ يرجى إدخال اسم المستخدم', 'warning');
                    return;
                }

                if (username.length < 2) {
                    showToast('⚠️ الاسم قصير جداً', 'warning');
                    return;
                }

                if (username.length > 20) {
                    showToast('⚠️ الاسم طويل جداً', 'warning');
                    return;
                }

                if (/[.#$\[\]\/]/.test(username)) {
                    showToast('⚠️ لا يسمح باستخدام الرموز: . # $ [ ] /', 'warning');
                    return;
                }

                currentUser = username;
                initializeChat();
            });

            document.getElementById('usernameInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('loginBtn').click();
                }
            });

            // تنظيف عند الخروج
            window.addEventListener('beforeunload', () => {
                if (currentUser) {
                    db.ref(`online/${currentUser}`).remove();
                    db.ref(`typing/${currentUser}`).remove();
                }
            });

            // معالجة الأخطاء العامة
            window.addEventListener('error', (e) => {
                console.error('Global error:', e.error);
            });

            window.addEventListener('unhandledrejection', (e) => {
                console.error('Unhandled promise rejection:', e.reason);
            });

        })();
    </script>
</body>
</html>
