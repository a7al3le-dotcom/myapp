<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lumen Chat – شات احترافي</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ==============================
       ROOT VARIABLES – تصميم داكن أنيق
    ============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    :root {
      --bg-app: #0e0e12;
      --bg-sidebar: #16161d;
      --bg-chat: #1a1a22;
      --bg-input: #282836;
      --bg-bubble-own: #2d2d44;
      --bg-bubble-other: #222233;
      --text-primary: #f0eefa;
      --text-secondary: #b0b0cc;
      --text-muted: #6a6a88;
      --accent: #7c6cf0;
      --accent-glow: rgba(124, 108, 240, 0.3);
      --gold: #d4af37;
      --border: #2a2a3a;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --header-height: 60px;
      --input-height: 68px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg-app);
      color: var(--text-primary);
      overflow: hidden;
      touch-action: pan-y;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 8px;
    }

    /* ==============================
       LOGIN SCREEN
    ============================== */
    #loginScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: radial-gradient(ellipse at 30% 30%, #1f1f2e, #0a0a0e 80%);
    }
    #loginContainer {
      background: var(--bg-sidebar);
      padding: 40px 30px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(124, 108, 240, 0.2);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(6px);
    }
    #loginContainer .brand {
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    #loginContainer .sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      font-weight: 300;
    }
    #loginContainer .input-group {
      position: relative;
      margin-bottom: 18px;
    }
    #loginContainer .input-group i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 16px;
    }
    #loginContainer input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 15px;
      transition: border var(--transition), box-shadow var(--transition);
      direction: rtl;
    }
    #loginContainer input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }
    #loginBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #5a4ad0);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #loginBtn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 28px rgba(124, 108, 240, 0.4);
    }
    #loginBtn:active {
      transform: scale(0.96);
    }
    #loginError {
      color: #ef476f;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

    /* ==============================
       CHAT LAYOUT – سلايدر جانبي
    ============================== */
    #chatScreen {
      display: none;
      height: 100vh;
      flex-direction: row;
      background: var(--bg-app);
    }
    #chatScreen.active {
      display: flex;
    }

    /* ---- Sidebar (المستخدمين) ---- */
    #sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      height: 100vh;
      overflow: hidden;
      transition: transform 0.3s ease, width 0.3s ease;
      z-index: 20;
    }
    #sidebar .sidebar-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      height: var(--header-height);
    }
    #sidebar .sidebar-header h3 {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-weight: 400;
    }
    #sidebar .sidebar-header h3 i {
      color: var(--accent);
    }
    #sidebar .sidebar-header .online-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 0 10px;
      font-size: 12px;
      line-height: 22px;
      font-weight: 600;
    }
    #sidebar .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
    }
    #sidebar .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      cursor: default;
      font-size: 14px;
    }
    #sidebar .user-item:hover {
      background: var(--bg-input);
    }
    #sidebar .user-item .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3ba55c;
      flex-shrink: 0;
    }
    #sidebar .user-item .name {
      flex: 1;
    }
    #sidebar .user-item .role-badge {
      font-size: 10px;
      padding: 0 8px;
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-muted);
    }
    #sidebar .user-item .role-badge.admin {
      background: rgba(212, 175, 55, 0.15);
      color: var(--gold);
    }
    #sidebar .user-item .role-badge.mod {
      background: rgba(96, 240, 255, 0.1);
      color: #60f0ff;
    }
    #sidebar .user-item.you {
      background: rgba(124, 108, 240, 0.08);
      border-right: 3px solid var(--accent);
    }

    /* ---- Main Chat ---- */
    #mainChat {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-chat);
      position: relative;
    }

    /* Header */
    #chatHeader {
      height: var(--header-height);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-sidebar);
    }
    #chatHeader .room-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #chatHeader .room-info i {
      color: var(--accent);
      font-size: 20px;
    }
    #chatHeader .room-info span {
      font-weight: 600;
      font-size: 16px;
    }
    #chatHeader .actions {
      display: flex;
      gap: 6px;
    }
    #chatHeader .actions button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #chatHeader .actions button:hover {
      background: var(--bg-input);
      color: var(--text-primary);
    }

    /* Messages */
    #messagesContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #messages {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column-reverse;
      scroll-behavior: smooth;
    }

    /* Message Bubbles */
    .msg-wrapper {
      animation: fadeUp 0.25s ease;
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      max-width: 82%;
      align-self: flex-end;
    }
    .msg-wrapper.self {
      align-self: flex-end;
    }
    .msg-wrapper.self .bubble {
      background: var(--bg-bubble-own);
      border: 1px solid rgba(124, 108, 240, 0.2);
      border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
    }
    .msg-wrapper:not(.self) {
      align-self: flex-start;
    }
    .msg-wrapper:not(.self) .bubble {
      background: var(--bg-bubble-other);
      border: 1px solid var(--border);
      border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
    }
    .bubble {
      padding: 10px 16px;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      position: relative;
    }
    .bubble .header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }
    .bubble .header .name {
      font-weight: 700;
      font-size: 14px;
      color: var(--accent);
    }
    .bubble .header .name.admin {
      color: var(--gold);
    }
    .bubble .header .name.mod {
      color: #60f0ff;
    }
    .bubble .header .time {
      font-size: 10px;
      color: var(--text-muted);
      direction: ltr;
    }
    .bubble .text {
      font-size: 15px;
      line-height: 1.6;
    }
    .bubble .text a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px dotted rgba(212, 175, 55, 0.3);
    }
    .bubble .text a:hover {
      border-bottom-color: var(--gold);
    }

    /* Media */
    .media-wrap {
      margin-top: 6px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-width: 100%;
      cursor: pointer;
    }
    .media-wrap img {
      max-width: 100%;
      max-height: 280px;
      border-radius: var(--radius-sm);
      display: block;
      transition: transform 0.2s;
    }
    .media-wrap img:hover {
      transform: scale(1.02);
    }
    .yt-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .yt-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .yt-thumb {
      position: relative;
      cursor: pointer;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .yt-thumb img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
    }
    .yt-thumb .play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: 0.3s;
    }
    .yt-thumb .play:hover {
      background: rgba(124, 108, 240, 0.9);
      transform: translate(-50%, -50%) scale(1.08);
    }

    /* Reactions */
    .reactions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .reactions .reac {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 10px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      line-height: 24px;
      user-select: none;
    }
    .reactions .reac:hover {
      background: var(--bg-hover);
      transform: scale(1.05);
    }
    .reactions .reac .cnt {
      font-size: 11px;
      color: var(--text-muted);
    }
    .reactions .reac.reacted {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    /* Actions (hover) */
    .msg-actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      justify-content: flex-end;
    }
    .msg-wrapper:hover .msg-actions,
    .msg-actions:focus-within {
      opacity: 1;
    }
    .msg-actions button {
      background: var(--bg-input);
      border: none;
      color: var(--text-secondary);
      padding: 0 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      line-height: 24px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .msg-actions button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .msg-actions button.danger:hover {
      background: #ef476f;
      color: #fff;
    }

    /* Reaction picker (floating) */
    .reac-picker {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px 6px;
      box-shadow: var(--shadow);
      z-index: 30;
      gap: 2px;
      flex-wrap: wrap;
      max-width: 180px;
    }
    .reac-picker.show {
      display: flex;
    }
    .reac-picker button {
      background: transparent;
      border: none;
      font-size: 20px;
      padding: 2px 4px;
      cursor: pointer;
      transition: 0.15s;
      border-radius: 4px;
    }
    .reac-picker button:hover {
      background: var(--bg-hover);
      transform: scale(1.1);
    }

    /* System message */
    .system-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 6px 0;
      margin: 4px 0;
      width: 100%;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg-sidebar);
      border-radius: 6px;
      opacity: 0.6;
    }

    /* Typing */
    #typingStatus {
      position: fixed;
      bottom: calc(var(--input-height) + 10px);
      padding: 2px 20px;
      font-size: 13px;
      color: var(--text-secondary);
      right: 0;
      left: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: typeBounce 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes typeBounce {
      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Input */
    #inputBox {
      height: var(--input-height);
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #inputBox .tools {
      display: flex;
      gap: 4px;
    }
    #inputBox .tools button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #inputBox .tools button:hover {
      background: var(--bg-input);
      color: var(--accent);
    }
    #inputBox .tools button.active {
      color: var(--accent);
    }
    #msgInput {
      flex: 1;
      border: none;
      padding: 10px 18px;
      border-radius: var(--radius-full);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 15px;
      min-height: 40px;
      transition: box-shadow 0.2s;
      direction: rtl;
    }
    #msgInput:focus {
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #sendBtn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #5a4ad0);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #sendBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 4px 24px rgba(124, 108, 240, 0.4);
    }
    #sendBtn:active {
      transform: scale(0.92);
    }

    /* Emoji picker (grid) */
    #emojiPicker {
      display: none;
      position: absolute;
      bottom: calc(var(--input-height) + 10px);
      left: 16px;
      right: 16px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      z-index: 30;
      max-height: 220px;
      overflow-y: auto;
      display: none;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      box-shadow: var(--shadow);
    }
    #emojiPicker.show {
      display: grid;
    }
    #emojiPicker button {
      background: transparent;
      border: none;
      font-size: 24px;
      padding: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
    }
    #emojiPicker button:hover {
      background: var(--bg-input);
      transform: scale(1.08);
    }

    /* Connection status */
    #connectionStatus {
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      background: #faa81a;
      color: #0a0a0f;
      text-align: center;
      padding: 6px;
      font-size: 13px;
      font-weight: 600;
      z-index: 40;
      display: none;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      z-index: 100;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      padding: 20px;
    }
    #lightbox img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.8);
    }

    /* New messages indicator */
    #newMsgIndicator {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 4px 18px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 5;
      display: none;
      animation: fadeIn 0.3s;
      gap: 6px;
      align-items: center;
      box-shadow: 0 4px 20px rgba(124, 108, 240, 0.3);
    }
    #newMsgIndicator.show {
      display: flex;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 0;
      font-size: 14px;
    }
    .loading-state i {
      font-size: 30px;
      margin-bottom: 10px;
      display: block;
      animation: spin 1.5s linear infinite;
      color: var(--accent);
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Responsive – Mobile */
    @media (max-width: 700px) {
      #sidebar {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 280px;
        transform: translateX(100%);
        border-left: none;
        border-right: 1px solid var(--border);
        box-shadow: var(--shadow);
        transition: transform 0.3s ease;
        z-index: 50;
        background: var(--bg-sidebar);
      }
      #sidebar.open {
        transform: translateX(0);
      }
      #sidebar .sidebar-header {
        padding: 12px 16px;
      }
      #sidebar .sidebar-header .close-sidebar {
        display: block;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 22px;
        cursor: pointer;
      }
      .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 45;
      }
      .sidebar-overlay.show {
        display: block;
      }
      #chatHeader .room-info .toggle-sidebar {
        display: flex;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 20px;
        cursor: pointer;
        padding: 4px;
      }
      #chatHeader .actions button span {
        display: none;
      }
      .msg-wrapper {
        max-width: 92%;
      }
      #emojiPicker {
        grid-template-columns: repeat(6, 1fr);
        max-height: 180px;
        padding: 8px;
      }
      #emojiPicker button {
        font-size: 20px;
      }
      #inputBox .tools button {
        width: 34px;
        height: 34px;
        font-size: 16px;
      }
      #sendBtn {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }
      #msgInput {
        font-size: 14px;
        padding: 8px 14px;
        min-height: 34px;
      }
      .bubble .text {
        font-size: 14px;
      }
      .bubble .header .name {
        font-size: 13px;
      }
    }

    @media (min-width: 701px) {
      .sidebar-overlay {
        display: none !important;
      }
      #sidebar .sidebar-header .close-sidebar {
        display: none !important;
      }
      #chatHeader .room-info .toggle-sidebar {
        display: none !important;
      }
    }

    /* Highlight search */
    .highlight {
      background: rgba(124, 108, 240, 0.3);
      border-radius: 3px;
      padding: 0 4px;
    }

    /* Misc */
    button {
      touch-action: manipulation;
    }
    input,
    textarea {
      touch-action: manipulation;
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="loginScreen">
    <div id="loginContainer">
      <div class="brand">✦ Lumen</div>
      <div class="sub">دردشة ذكية بلمسة احترافية</div>
      <div class="input-group">
        <i class="fas fa-user-astronaut"></i>
        <input id="usernameInput" placeholder="اسمك (حرفين على الأقل)" autocomplete="off" />
      </div>
      <button id="loginBtn" onclick="login()"><i class="fas fa-rocket"></i> دخول</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- ===== CHAT ===== -->
  <div id="chatScreen">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-users"></i> المتصلون</h3>
        <span class="online-badge" id="onlineCount">0</span>
        <button class="close-sidebar" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
      </div>
      <div class="user-list" id="userList">
        <div class="loading-state" style="padding:20px 0;font-size:13px;">جاري التحميل...</div>
      </div>
    </div>

    <!-- Main Chat -->
    <div id="mainChat">
      <!-- Header -->
      <div id="chatHeader">
        <div class="room-info">
          <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <i class="fas fa-comment-dots"></i>
          <span>غرفة العامة</span>
        </div>
        <div class="actions">
          <button onclick="toggleSearch()" title="بحث"><i class="fas fa-search"></i><span>بحث</span></button>
          <button onclick="openAdmin()" title="لوحة التحكم"><i class="fas fa-sliders-h"></i><span>إدارة</span></button>
          <button onclick="logout()" title="خروج"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button>
        </div>
      </div>

      <!-- Search bar -->
      <div id="searchBox" style="display:none;padding:6px 16px;background:var(--bg-input);border-bottom:1px solid var(--border);gap:8px;align-items:center;">
        <i class="fas fa-search" style="color:var(--text-muted)"></i>
        <input id="searchInput" placeholder="ابحث في الرسائل..." oninput="searchMessages(this.value)" style="flex:1;border:none;padding:4px 12px;border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);font-size:13px;" />
        <button onclick="toggleSearch()" style="background:transparent;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;">&times;</button>
      </div>

      <!-- Connection status -->
      <div id="connectionStatus">🔄 جاري إعادة الاتصال...</div>

      <!-- Messages -->
      <div id="messagesContainer">
        <div id="messages">
          <div class="loading-state" id="loadingState">
            <i class="fas fa-spinner"></i> جارٍ تحميل الرسائل...
          </div>
        </div>
        <div id="newMsgIndicator" onclick="scrollToBottom()">
          <i class="fas fa-arrow-down"></i> رسائل جديدة
        </div>
      </div>

      <!-- Typing -->
      <div id="typingStatus"></div>

      <!-- Input -->
      <div id="inputBox">
        <div class="tools">
          <button onclick="toggleEmoji()" id="emojiBtn" title="إيموجي"><i class="fas fa-smile-wink"></i></button>
          <button onclick="document.getElementById('fileInput').click()" title="إرفاق ملف"><i class="fas fa-paperclip"></i></button>
          <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display:none" onchange="handleFile(this)" />
        </div>
        <input id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off" />
        <button id="sendBtn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
      </div>

      <!-- Emoji picker -->
      <div id="emojiPicker"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" />
  </div>

  <script>
    // ============================================================
    //  FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
      databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    //  STATE
    // ============================================================
    let username = "";
    let role = "user";
    let editingKey = null;
    let isScrolledUp = false;
    let hasNew = false;
    let msgListener = null,
      typingListener = null,
      onlineListener = null,
      connListener = null;

    const $ = id => document.getElementById(id);
    const loginScreen = $('loginScreen');
    const chatScreen = $('chatScreen');
    const usernameInput = $('usernameInput');
    const msgInput = $('msgInput');
    const messages = $('messages');
    const userList = $('userList');
    const onlineCount = $('onlineCount');
    const sendBtn = $('sendBtn');
    const connectionStatus = $('connectionStatus');
    const loadingState = $('loadingState');
    const newMsgIndicator = $('newMsgIndicator');
    const emojiPicker = $('emojiPicker');
    const emojiBtn = $('emojiBtn');
    const lightbox = $('lightbox');
    const lightboxImg = $('lightboxImg');
    const searchInput = $('searchInput');
    const searchBox = $('searchBox');
    const typingStatus = $('typingStatus');
    const sidebar = $('sidebar');
    const sidebarOverlay = $('sidebarOverlay');

    // ============================================================
    //  EMOJI LIST
    // ============================================================
    const EMOJIS = ['😀', '😁', '😂', '🤣', '😊', '😍', '🥰', '😘', '😗', '😙', '😚', '🙂', '🤗', '🤩', '🤔', '🤨', '😐', '😑', '😶',
      '🙄', '😏', '😣', '😥', '😮', '😯', '😪', '😫', '😴', '😌', '😛', '😜', '😝', '🤤', '😒', '😓', '😔', '😕', '🙃', '🤑', '😲',
      '☹️', '🙁', '😖', '😞', '😟', '😤', '😢', '😭', '😦', '😧', '😨', '😩', '🤯', '😬', '😰', '😱', '🥵', '🥶', '😳', '🤪', '😵',
      '😡', '😠', '🤬', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝',
      '✨', '🌟', '⭐', '🌙', '☀️', '🔥', '💯', '🎉', '🎊', '🎈', '🌸', '🌺', '🌻', '🌹', '🌷', '🌱', '🌲', '🌳', '🌴', '🌵', '🌾',
      '👍', '👎', '👊', '✊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✌️', '🤟', '🤘', '👌', '🤌', '🤏', '👈', '👉', '👆',
      '👇', '☝️', '✋', '🤚', '🖐️', '🖖', '👋', '🤙', '💪', '🦾', '🦵', '🦶', '👀', '👁️', '👄', '👅', '👂', '🦻', '👃', '🧠'
    ];

    // ============================================================
    //  ROLES
    // ============================================================
    const ROLE_CONFIG = {
      'Mod': { role: 'mod' },
      'Admin': { role: 'admin' },
      'User': { role: 'user' }
    };

    function getRoleClass(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' ? 'admin' : r === 'mod' ? 'mod' : '';
    }

    function getRoleIcon(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' ? '🔱' : r === 'mod' ? '⭐' : '';
    }

    function isAdminOrMod(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' || r === 'mod';
    }

    // ============================================================
    //  UTILITY
    // ============================================================
    function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div');
      d.textContent = s; return d.innerHTML; }

    function formatTime(ts) { return new Date(ts).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit',
        hour12: true }); }

    function extractMedia(text) {
      const yt = text.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (yt) return { type: 'youtube', id: yt[1] };
      const img = text.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg)/i);
      if (img) return { type: 'image', id: img[0] };
      const file = text.match(/https?:\/\/\S+\.(mp4|webm|ogg|mov|avi|pdf|doc|docx|xls)/i);
      if (file) return { type: 'file', id: file[0] };
      return null;
    }

    function parseMessageText(text) {
      let html = escapeHtml(text);
      html = html.replace(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/g,
        (m, id) => `<a href="#" onclick="event.preventDefault();embedYoutube('${id}')">▶️ YouTube</a>`);
      html = html.replace(/(https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg))/gi,
        (m) => `<a href="#" onclick="event.preventDefault();openLightbox('${m}')">🖼️ صورة</a>`);
      html = html.replace(/(https?:\/\/[^\s]+)/g,
        (m) => `<a href="${m}" target="_blank" rel="noopener">${m}</a>`);
      return html;
    }

    // ============================================================
    //  LOGIN
    // ============================================================
    function login() {
      const raw = usernameInput.value.trim();
      if (!raw || raw.length < 2) { $('loginError').textContent = '⚠️ الاسم يجب أن يكون حرفين على الأقل'; return; }
      username = escapeHtml(raw);
      role = ROLE_CONFIG[username]?.role || 'user';

      loginScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      chatScreen.classList.add('active');
      $('loginError').textContent = '';

      loadMessages();
      setupConnection();
      buildEmojiPicker();
      setTimeout(() => msgInput.focus(), 400);
    }

    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    // ============================================================
    //  CONNECTION
    // ============================================================
    function setupConnection() {
      const ref = db.ref('.info/connected');
      if (connListener) ref.off('value', connListener);
      connListener = ref.on('value', snap => {
        if (snap.val()) {
          connectionStatus.style.display = 'none';
          const onlineRef = db.ref('onlineUsers/' + encodeURIComponent(username));
          onlineRef.set({ name: username, status: 'online', lastActive: Date.now() });
          onlineRef.onDisconnect().remove();
          db.ref('typing/' + encodeURIComponent(username)).onDisconnect().remove();
        } else {
          connectionStatus.style.display = 'block';
        }
      });
      setupOnlineUsers();
      setupTyping();
    }

    // ============================================================
    //  MESSAGES
    // ============================================================
    function loadMessages() {
      if (msgListener) {
        db.ref('messages').off('child_added', msgListener);
        db.ref('messages').off('child_removed', msgListener);
        db.ref('messages').off('child_changed', msgListener);
      }
      messages.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ تحميل الرسائل...</div>';

      const chatRef = db.ref('messages');
      let first = true;
      msgListener = chatRef.limitToLast(100).on('child_added', snap => {
        const data = snap.val();
        if (!data) return;
        renderMessage(data, snap.key);
        if (first) { const ls = $('loadingState'); if (ls) ls.remove();
          first = false; }
        if (isScrolledUp && data.user !== username) {
          hasNew = true;
          newMsgIndicator.classList.add('show');
          newMsgIndicator.innerHTML = `<i class="fas fa-arrow-down"></i> رسائل جديدة`;
        }
      });

      chatRef.on('child_removed', snap => { const el = document.querySelector(`[data-key="${snap.key}"]`); if (el) el
          .remove(); });
      chatRef.on('child_changed', snap => {
        const data = snap.val();
        if (!data) return;
        const el = document.querySelector(`[data-key="${snap.key}"]`);
        if (el) {
          const t = el.querySelector('.text');
          if (t) t.innerHTML = parseMessageText(data.text);
          const tm = el.querySelector('.time');
          if (tm) tm.textContent = formatTime(data.time) + (data.edited ? ' (معدل)' : '');
        }
      });

      setTimeout(() => { messages.scrollTop = 0; }, 200);
    }

    function renderMessage(data, key) {
      const ls = $('loadingState');
      if (ls) ls.remove();

      if (data.system) {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.setAttribute('data-key', key);
        div.textContent = data.text;
        messages.insertBefore(div, messages.firstChild);
        return;
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper';
      wrapper.setAttribute('data-key', key);
      if (data.user === username) wrapper.classList.add('self');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const header = document.createElement('div');
      header.className = 'header';
      const name = document.createElement('span');
      name.className = 'name ' + getRoleClass(data.user);
      name.textContent = data.user;
      const icon = getRoleIcon(data.user);
      if (icon) { const sp = document.createElement('span');
        sp.textContent = icon;
        sp.style.fontSize = '13px';
        header.appendChild(sp); }
      header.appendChild(name);
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(data.time) + (data.edited ? ' (معدل)' : '');
      header.appendChild(time);
      bubble.appendChild(header);

      const textDiv = document.createElement('div');
      textDiv.className = 'text';
      textDiv.innerHTML = parseMessageText(data.text);
      bubble.appendChild(textDiv);

      // Media
      if (data.mediaType && data.mediaId) {
        const mediaDiv = document.createElement('div');
        mediaDiv.className = 'media-wrap';
        if (data.mediaType === 'image') {
          const img = document.createElement('img');
          img.src = data.mediaId;
          img.alt = 'صورة';
          img.loading = 'lazy';
          img.onclick = (e) => { e.stopPropagation();
            openLightbox(data.mediaId); };
          img.onerror = () => { mediaDiv.innerHTML =
              '<span style="color:var(--text-muted);font-size:13px;">⚠️ تعذر تحميل الصورة</span>'; };
          mediaDiv.appendChild(img);
        } else if (data.mediaType === 'youtube') {
          const thumb = document.createElement('div');
          thumb.className = 'yt-thumb';
          const img = document.createElement('img');
          img.src = `https://img.youtube.com/vi/${data.mediaId}/hqdefault.jpg`;
          img.alt = 'YouTube';
          img.loading = 'lazy';
          const play = document.createElement('div');
          play.className = 'play';
          play.innerHTML = '<i class="fas fa-play"></i>';
          thumb.appendChild(img);
          thumb.appendChild(play);
          thumb.onclick = () => {
            const wrap = document.createElement('div');
            wrap.className = 'yt-wrap';
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${data.mediaId}?autoplay=1&rel=0`;
            iframe.allow =
              'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            wrap.appendChild(iframe);
            mediaDiv.innerHTML = '';
            mediaDiv.appendChild(wrap);
          };
          mediaDiv.appendChild(thumb);
        } else if (data.mediaType === 'file') {
          const a = document.createElement('a');
          a.href = data.mediaId;
          a.target = '_blank';
          a.rel = 'noopener';
          a.style.cssText = 'color:var(--accent);text-decoration:underline;font-size:14px;';
          a.textContent = '📁 تحميل الملف';
          mediaDiv.appendChild(a);
        }
        bubble.appendChild(mediaDiv);
      }

      // Reactions
      if (data.reactions) {
        const reacDiv = document.createElement('div');
        reacDiv.className = 'reactions';
        for (const [emoji, users] of Object.entries(data.reactions)) {
          const btn = document.createElement('span');
          btn.className = 'reac';
          if (Array.isArray(users) && users.includes(username)) btn.classList.add('reacted');
          btn.textContent = emoji;
          const cnt = document.createElement('span');
          cnt.className = 'cnt';
          cnt.textContent = Array.isArray(users) ? users.length : 0;
          btn.appendChild(cnt);
          btn.onclick = (e) => { e.stopPropagation();
            toggleReaction(key, emoji); };
          reacDiv.appendChild(btn);
        }
        bubble.appendChild(reacDiv);
      }

      // Actions
      const actions = document.createElement('div');
      actions.className = 'msg-actions';

      const reactBtn = document.createElement('button');
      reactBtn.innerHTML = '<i class="fas fa-smile"></i>';
      reactBtn.title = 'تفاعل';
      reactBtn.onclick = (e) => { e.stopPropagation();
        toggleReactionPicker(key, reactBtn); };
      actions.appendChild(reactBtn);

      if (data.user === username) {
        const editBtn = document.createElement('button');
        editBtn.innerHTML = '<i class="fas fa-edit"></i>';
        editBtn.title = 'تعديل';
        editBtn.onclick = (e) => { e.stopPropagation();
          startEdit(key, data.text); };
        actions.appendChild(editBtn);
      }

      if (data.user === username || isAdminOrMod(username)) {
        const delBtn = document.createElement('button');
        delBtn.className = 'danger';
        delBtn.innerHTML = '<i class="fas fa-trash"></i>';
        delBtn.title = 'حذف';
        delBtn.onclick = (e) => { e.stopPropagation();
          deleteMessage(key); };
        actions.appendChild(delBtn);
      }

      bubble.appendChild(actions);
      wrapper.appendChild(bubble);
      messages.insertBefore(wrapper, messages.firstChild);

      if (!isScrolledUp) setTimeout(() => { messages.scrollTop = 0; }, 50);
    }

    // ============================================================
    //  SEND
    // ============================================================
    function send() {
      let text = msgInput.value.trim();
      if (!text && !editingKey) return;

      if (editingKey) {
        db.ref('messages/' + editingKey).update({ text, edited: true, time: Date.now() });
        editingKey = null;
        msgInput.placeholder = 'اكتب رسالتك...';
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        return;
      }

      const media = extractMedia(text);
      db.ref('messages').push({
        user: username,
        text,
        mediaType: media ? media.type : null,
        mediaId: media ? media.id : null,
        time: Date.now(),
        reactions: {}
      });
      msgInput.value = '';
      db.ref('typing/' + encodeURIComponent(username)).remove();
      msgInput.focus();
      closeEmoji();
    }

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
        send(); }
    });

    // ============================================================
    //  EDIT / DELETE / REACTIONS
    // ============================================================
    function startEdit(key, text) {
      editingKey = key;
      msgInput.value = text;
      msgInput.focus();
      msgInput.placeholder = '✏️ تعديل...';
      sendBtn.innerHTML = '<i class="fas fa-check"></i>';
      const esc = (e) => { if (e.key === 'Escape') { cancelEdit();
          document.removeEventListener('keydown', esc); } };
      document.addEventListener('keydown', esc);
      setTimeout(() => {
        const blur = () => { if (editingKey) cancelEdit();
          msgInput.removeEventListener('blur', blur); };
        msgInput.addEventListener('blur', blur);
      }, 100);
    }

    function cancelEdit() {
      editingKey = null;
      msgInput.value = '';
      msgInput.placeholder = 'اكتب رسالتك...';
      sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
    }

    function deleteMessage(key) {
      if (!key) return;
      db.ref('messages/' + key).once('value', snap => {
        const data = snap.val();
        if (!data) return;
        if (data.user === username || isAdminOrMod(username)) {
          if (confirm('حذف هذه الرسالة؟')) db.ref('messages/' + key).remove();
        } else alert('ليس لديك صلاحية');
      });
    }

    function toggleReaction(key, emoji) {
      if (!key || !username) return;
      const ref = db.ref('messages/' + key + '/reactions/' + emoji);
      ref.transaction(current => {
        if (!current || !Array.isArray(current)) return [username];
        const idx = current.indexOf(username);
        if (idx > -1) { current.splice(idx, 1); return current.length ? current : null; } else { current.push(
            username); return current; }
      });
    }

    function toggleReactionPicker(key, btn) {
      let picker = btn.parentElement.querySelector('.reac-picker');
      if (!picker) {
        picker = document.createElement('div');
        picker.className = 'reac-picker';
        ['❤️', '👍', '😂', '😮', '😢', '🙏', '🔥', '🎉', '💯', '⭐'].forEach(e => {
          const b = document.createElement('button');
          b.textContent = e;
          b.onclick = (ev) => { ev.stopPropagation();
            toggleReaction(key, e);
            picker.classList.remove('show'); };
          picker.appendChild(b);
        });
        btn.parentElement.appendChild(picker);
        document.addEventListener('click', function close(ev) {
          if (!picker.contains(ev.target) && ev.target !== btn) { picker.classList.remove('show');
            document.removeEventListener('click', close); }
        });
      }
      picker.classList.toggle('show');
    }

    // ============================================================
    //  TYPING
    // ============================================================
    function setupTyping() {
      const ref = db.ref('typing');
      msgInput.addEventListener('input', () => {
        if (!username) return;
        db.ref('typing/' + encodeURIComponent(username)).set(Date.now());
        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => { db.ref('typing/' + encodeURIComponent(username)).remove(); }, 2000);
      });

      if (typingListener) ref.off('value', typingListener);
      typingListener = ref.on('value', snap => {
        const data = snap.val() || {};
        const now = Date.now();
        const active = Object.keys(data).filter(k =>
          decodeURIComponent(k) !== username && (now - data[k] < 3000)
        );
        if (active.length === 0) { typingStatus.innerHTML = ''; return; }
        const names = active.map(k => escapeHtml(decodeURIComponent(k)));
        const msg = names.length === 1 ? names[0] + ' يكتب...' : names.join('، ') + ' يكتبون...';
        typingStatus.innerHTML =
          `${msg} <span class="typing-dots"><span></span><span></span><span></span></span>`;
      });
    }

    // ============================================================
    //  ONLINE USERS (sidebar)
    // ============================================================
    function setupOnlineUsers() {
      const ref = db.ref('onlineUsers');
      if (onlineListener) ref.off('value', onlineListener);
      onlineListener = ref.on('value', snap => {
        const users = snap.val() || {};
        const names = Object.keys(users);
        onlineCount.textContent = names.length;

        let html = '';
        if (names.length === 0) html = '<div style="padding:16px;text-align:center;color:var(--text-muted);">لا يوجد متصلون</div>';
        else {
          names.forEach(k => {
            const u = users[k];
            const isYou = u.name === username;
            const userRole = ROLE_CONFIG[u.name]?.role || 'user';
            let roleLabel = '';
            if (userRole === 'admin') roleLabel = '<span class="role-badge admin">مدير</span>';
            else if (userRole === 'mod') roleLabel = '<span class="role-badge mod">مشرف</span>';
            html += `<div class="user-item ${isYou?'you':''}">
                        <span class="dot"></span>
                        <span class="name">${escapeHtml(u.name)}${isYou?' (أنت)':''}</span>
                        ${roleLabel}
                    </div>`;
          });
        }
        userList.innerHTML = html;
      });
    }

    // ============================================================
    //  SIDEBAR TOGGLE (mobile)
    // ============================================================
    function toggleSidebar() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('show');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }

    // ============================================================
    //  ADMIN POPUP (بسيط)
    // ============================================================
    function openAdmin() {
      if (!isAdminOrMod(username)) { alert('🔒 هذه اللوحة للمديرين والمشرفين فقط'); return; }
      if (confirm('🗑️ هل تريد مسح جميع الرسائل؟')) {
        db.ref('messages').remove();
      }
    }

    // ============================================================
    //  EMOJI PICKER
    // ============================================================
    function buildEmojiPicker() {
      emojiPicker.innerHTML = '';
      EMOJIS.forEach(e => {
        const btn = document.createElement('button');
        btn.textContent = e;
        btn.type = 'button';
        btn.onclick = () => {
          const input = msgInput;
          const start = input.selectionStart,
            end = input.selectionEnd;
          const val = input.value;
          input.value = val.slice(0, start) + e + val.slice(end);
          input.focus();
          input.selectionStart = input.selectionEnd = start + e.length;
          closeEmoji();
          input.dispatchEvent(new Event('input'));
        };
        emojiPicker.appendChild(btn);
      });
    }

    function toggleEmoji() {
      emojiPicker.classList.toggle('show');
      emojiBtn.classList.toggle('active');
    }

    function closeEmoji() {
      emojiPicker.classList.remove('show');
      emojiBtn.classList.remove('active');
    }

    // ============================================================
    //  FILE ATTACHMENT
    // ============================================================
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      // إرسال الملف كرابط (مثال) – في الواقع يجب رفعه إلى خدمة تخزين، لكننا نكتفي بإرسال اسم الملف كنص
      const reader = new FileReader();
      reader.onload = function(e) {
        // سنرسل النص كرابط للصورة أو الملف (بيانات Base64 – لكنها كبيرة، لذا نرسل الاسم فقط)
        // للتبسيط: نرسل اسم الملف مع أيقونة
        const text = `📎 ${file.name}`;
        db.ref('messages').push({
          user: username,
          text: text,
          mediaType: null,
          mediaId: null,
          time: Date.now(),
          reactions: {}
        });
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // ============================================================
    //  SEARCH
    // ============================================================
    let searchActive = false;

    function toggleSearch() {
      searchActive = !searchActive;
      searchBox.style.display = searchActive ? 'flex' : 'none';
      if (searchActive) { searchInput.value = '';
        clearHighlights();
        searchInput.focus(); } else { searchInput.value = '';
        clearHighlights(); }
    }

    function searchMessages(query) {
      clearHighlights();
      if (!query || query.length < 2) return;
      const items = messages.querySelectorAll('.bubble .text');
      items.forEach(el => {
        const txt = el.textContent || '';
        if (txt.toLowerCase().includes(query.toLowerCase())) {
          el.innerHTML = txt.replace(new RegExp('(' + escapeRegex(query) + ')', 'gi'),
            '<span class="highlight">$1</span>');
        }
      });
    }

    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function clearHighlights() {
      messages.querySelectorAll('.bubble .text').forEach(el => {
        el.innerHTML = el.textContent;
      });
    }

    // ============================================================
    //  LIGHTBOX
    // ============================================================
    function openLightbox(src) { lightbox.style.display = 'flex';
      lightboxImg.src = src; }

    function closeLightbox() { lightbox.style.display = 'none';
      lightboxImg.src = ''; }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); if (editingKey) cancelEdit(); }
    });

    // ============================================================
    //  YOUTUBE EMBED
    // ============================================================
    function embedYoutube(id) {
      const wrapper = document.createElement('div');
      wrapper.className = 'yt-wrap';
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      wrapper.appendChild(iframe);
      const activeEl = document.activeElement;
      const bubble = activeEl?.closest?.('.bubble');
      if (bubble) {
        const mediaWrap = bubble.querySelector('.media-wrap');
        if (mediaWrap) {
          mediaWrap.innerHTML = '';
          mediaWrap.appendChild(wrapper);
        } else {
          const newWrap = document.createElement('div');
          newWrap.className = 'media-wrap';
          newWrap.appendChild(wrapper);
          bubble.appendChild(newWrap);
        }
      }
    }

    // ============================================================
    //  SCROLL
    // ============================================================
    messages.addEventListener('scroll', () => {
      const st = messages.scrollTop,
        sh = messages.scrollHeight,
        ch = messages.clientHeight;
      isScrolledUp = st < sh - ch - 80;
      if (!isScrolledUp) { hasNew = false;
        newMsgIndicator.classList.remove('show'); }
    });

    function scrollToBottom() { messages.scrollTop = 0;
      hasNew = false;
      newMsgIndicator.classList.remove('show'); }

    // ============================================================
    //  LOGOUT
    // ============================================================
    function logout() {
      if (!username) return;
      if (confirm('تسجيل الخروج؟')) {
        db.ref('onlineUsers/' + encodeURIComponent(username)).remove();
        db.ref('typing/' + encodeURIComponent(username)).remove();
        if (msgListener) db.ref('messages').off('child_added', msgListener);
        if (typingListener) db.ref('typing').off('value', typingListener);
        if (onlineListener) db.ref('onlineUsers').off('value', onlineListener);
        if (connListener) db.ref('.info/connected').off('value', connListener);
        username = '';
        role = 'user';
        editingKey = null;
        isScrolledUp = false;
        hasNew = false;
        chatScreen.classList.remove('active');
        chatScreen.style.display = 'none';
        loginScreen.style.display = 'flex';
        messages.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ تحميل الرسائل...</div>';
        usernameInput.value = '';
        msgInput.value = '';
        typingStatus.innerHTML = '';
        newMsgIndicator.classList.remove('show');
        closeEmoji();
        closeLightbox();
        closeSidebar();
      }
    }

    // ============================================================
    //  VISIBILITY
    // ============================================================
    document.addEventListener('visibilitychange', () => {
      if (!username) return;
      if (document.hidden) {
        db.ref('onlineUsers/' + encodeURIComponent(username)).update({ lastActive: Date.now(), status: 'away' });
      } else {
        db.ref('onlineUsers/' + encodeURIComponent(username)).update({ status: 'online', lastActive: Date.now() });
      }
    });

    // ============================================================
    //  PREVENT ZOOM (iOS)
    // ============================================================
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - (document.lastTouch || 0) < 300) e.preventDefault();
      document.lastTouch = now;
    }, { passive: false });

    console.log('✨ Lumen Chat – نسخة احترافية من الصفر');
  </script>
</body>
</html>
