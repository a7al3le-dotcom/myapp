<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شات خاص</title>

<style>
body { margin:0; font-family:Arial; background:#ece5dd; }

#login, #chat { display:none; }

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

#chat {
  display:flex;
  flex-direction:column;
  height:100vh;
}

header {
  background:#075e54;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.status {
  font-size:12px;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  display:flex;
  gap:8px;
  background:#fff;
  padding:6px 10px;
  margin:4px 0;
  border-radius:6px;
  max-width:85%;
}

.me {
  background:#dcf8c6;
  margin-left:auto;
}

.name { font-weight:bold; }
.text { flex:1; }
.time { font-size:11px; color:#666; }

footer {
  display:flex;
  background:#fff;
}

input {
  flex:1;
  padding:10px;
  border:none;
}

button {
  padding:10px;
  border:none;
  background:#128c7e;
  color:#fff;
  cursor:pointer;
}

/* نافذة المتواجدين */
#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

#modal {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  width:300px;
  max-height:400px;
  overflow:auto;
  border-radius:10px;
  padding:15px;
}

.user {
  padding:6px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div id="login">
  <div>
    <h3>ادخل اسمك</h3>
    <input id="name">
    <button onclick="enterChat()">دخول</button>
  </div>
</div>

<div id="chat">
  <header>
    <div>
      الدردشة<br>
      <span class="status" id="status">...</span>
    </div>
    <button onclick="openOnline()">👥 <span id="count">0</span></button>
  </header>

  <div id="messages"></div>

  <footer>
    <input id="msgInput" placeholder="اكتب رسالة...">
    <button onclick="sendMsg()">إرسال</button>
  </footer>
</div>

<div id="overlay" onclick="closeOnline()">
  <div id="modal" onclick="event.stopPropagation()">
    <h4>المتواجدين</h4>
    <div id="onlineList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_Jw",
  authDomain: "mychat-2d881.firebaseapp.com",
  databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let msgCount=0;

document.getElementById("login").style.display="flex";

/* دخول */
function enterChat(){
  username = document.getElementById("name").value.trim();
  if(!username) return alert("اكتب اسم");

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";

  const ref = db.ref("online/"+username);
  ref.set(true);
  ref.onDisconnect().remove();

  listenMessages();
  loadOnline();
}

/* الوقت */
function formatTime(t){
  const d = new Date(t);
  let h = d.getHours();
  let m = d.getMinutes().toString().padStart(2,'0');
  let p = h>=12?"م":"ص";
  h = h%12 || 12;
  return h+":"+m+" "+p;
}

/* إرسال */
function sendMsg(){
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;

  db.ref("messages").push({
    name: username,
    text: text.substring(0,200),
    time: Date.now()
  });

  input.value="";
}

/* Enter */
document.getElementById("msgInput").addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
});

/* الرسائل */
function listenMessages(){
  const box = document.getElementById("messages");

  db.ref("messages").limitToLast(30).on("child_added", snap=>{
    const msg = snap.val();

    const div = document.createElement("div");
    div.className = "msg " + (msg.name===username?"me":"");

    div.innerHTML = `
      <span class="name">${msg.name}:</span>
      <span class="text">${msg.text}</span>
      <span class="time">${formatTime(msg.time)}</span>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;

    msgCount++;
    if(msgCount>30){
      box.removeChild(box.firstChild);
    }
  });
}

/* المتواجدين */
function loadOnline(){
  db.ref("online").on("value", snap=>{
    const list = document.getElementById("onlineList");
    list.innerHTML="";
    let count=0;

    snap.forEach(c=>{
      count++;
      const div = document.createElement("div");
      div.className="user";
      div.textContent=c.key;
      list.appendChild(div);
    });

    document.getElementById("count").textContent=count;
  });
}

/* نافذة */
function openOnline(){
  document.getElementById("overlay").style.display="block";
}
function closeOnline(){
  document.getElementById("overlay").style.display="none";
}

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeOnline();
});

/* إعادة الاتصال (احترافي) */
let retryCount = 0;
let reconnectTimer;

firebase.database().ref(".info/connected").on("value", snap=>{
  const s = document.getElementById("status");

  if(snap.val() === true){
    retryCount = 0;
    clearInterval(reconnectTimer);

    s.textContent = "🟢 متصل";
  } else {
    s.textContent = "🔴 انقطع الاتصال";

    reconnectTimer = setInterval(()=>{
      retryCount++;
      s.textContent = "🔄 إعادة الاتصال (" + retryCount + ")...";
    },2000);
  }
});
</script>

</body>
</html>
