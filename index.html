<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>شات متطور | لوحة تحكم</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== CSS VARIABLES / THEMING ===== */
        :root {
            --bg-primary: #313338;
            --bg-secondary: #2b2d31;
            --bg-tertiary: #1e1f22;
            --bg-input: #383a40;
            --bg-hover: #404249;
            --text-primary: #dbdee1;
            --text-secondary: #949ba4;
            --text-muted: #6d737c;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --accent-glow: rgba(88, 101, 242, 0.3);
            --green: #3ba55c;
            --red: #ed4245;
            --yellow: #faa81a;
            --border: #3f4147;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-full: 9999px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --max-width: 900px;
            --header-height: 56px;
            --input-height: 64px;
            --bubble-radius: 16px;
        }

        /* Light theme */
        [data-theme="light"] {
            --bg-primary: #f2f3f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e3e5e8;
            --bg-input: #e3e5e8;
            --bg-hover: #d5d7db;
            --text-primary: #2b2d31;
            --text-secondary: #5c5e66;
            --text-muted: #8e9297;
            --border: #d5d7db;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --accent: #5865f2;
            --accent-hover: #4752c4;
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            touch-action: pan-y;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-hover);
        }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: var(--bg-primary);
            transition: background var(--transition);
        }

        #loginContainer {
            background: var(--bg-secondary);
            padding: 32px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 380px;
            border: 1px solid var(--border);
            transition: background var(--transition), border var(--transition);
        }

        #loginContainer h2 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #loginContainer .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 20px;
        }

        #loginContainer .input-group {
            position: relative;
            margin-bottom: 14px;
        }

        #loginContainer .input-group i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        #loginContainer input {
            width: 100%;
            padding: 12px 40px 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            transition: border var(--transition), background var(--transition);
            direction: rtl;
        }

        #loginContainer input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        #loginContainer input::placeholder {
            color: var(--text-muted);
        }

        #loginBtn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition), transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #loginBtn:hover {
            background: var(--accent-hover);
        }
        #loginBtn:active {
            transform: scale(0.97);
        }

        #loginError {
            color: var(--red);
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            min-height: 18px;
        }

        /* ===== CHAT SCREEN ===== */
        #chatScreen {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-primary);
            transition: background var(--transition);
        }

        #chatScreen.active {
            display: flex;
        }

        /* ===== HEADER ===== */
        #topBar {
            height: var(--header-height);
            background: var(--bg-secondary);
            padding: 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            transition: background var(--transition), border var(--transition);
            z-index: 10;
            gap: 6px;
        }

        #topBar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 15px;
            color: var(--text-primary);
        }

        #topBar .brand i {
            color: var(--accent);
            font-size: 18px;
        }

        #topBar .brand span {
            display: inline-block;
        }

        #topBar .actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #topBar .actions button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        #topBar .actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        #topBar .actions button .badge {
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            border-radius: 50%;
            padding: 0 5px;
            min-width: 18px;
            text-align: center;
            line-height: 18px;
        }

        #myStatus {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        #myStatus .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ===== CONNECTION STATUS ===== */
        #connectionStatus {
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            background: var(--yellow);
            color: #000;
            text-align: center;
            padding: 6px;
            font-size: 12px;
            font-weight: 600;
            z-index: 20;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }

        /* ===== MESSAGES AREA ===== */
        #messagesContainer {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
            transition: background var(--transition);
        }

        #messages {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 8px 12px 12px;
            display: flex;
            flex-direction: column-reverse;
            scroll-behavior: smooth;
        }

        /* ===== MESSAGE ===== */
        .message-wrapper {
            animation: fadeInUp 0.25s ease;
            margin-bottom: 4px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .message-wrapper.own {
            align-items: flex-end;
        }

        .message-wrapper.own .message-bubble {
            background: var(--accent);
            color: #fff;
            border-radius: var(--bubble-radius) var(--bubble-radius) 4px var(--bubble-radius);
        }

        .message-wrapper:not(.own) .message-bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--bubble-radius) var(--bubble-radius) var(--bubble-radius) 4px;
        }

        .message-bubble {
            max-width: 90%;
            padding: 6px 12px;
            word-wrap: break-word;
            position: relative;
            transition: background var(--transition), border var(--transition);
        }

        .message-bubble .msg-header {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 1px;
            flex-wrap: wrap;
        }

        .message-bubble .msg-name {
            font-weight: 700;
            font-size: 13px;
            color: var(--accent);
        }

        .message-bubble .msg-name.admin {
            color: #fbbf24;
        }
        .message-bubble .msg-name.mod {
            color: #60f0ff;
        }

        .message-bubble .msg-role-icon {
            font-size: 12px;
        }

        .message-bubble .msg-time {
            font-size: 9px;
            color: var(--text-muted);
            direction: ltr;
            unicode-bidi: embed;
        }

        .message-bubble .msg-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-bubble .msg-text a {
            color: var(--accent);
            text-decoration: none;
        }
        .message-bubble .msg-text a:hover {
            text-decoration: underline;
        }

        /* ===== MEDIA ===== */
        .msg-media {
            margin-top: 4px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            max-width: 100%;
            cursor: pointer;
            position: relative;
        }

        .msg-media img {
            max-width: 100%;
            max-height: 260px;
            border-radius: var(--radius-sm);
            display: block;
            transition: transform 0.2s;
        }

        .msg-media img:hover {
            transform: scale(1.01);
        }

        .msg-media .yt-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .msg-media .yt-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .msg-media .yt-thumb {
            position: relative;
            cursor: pointer;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .msg-media .yt-thumb img {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
        }

        .msg-media .yt-thumb .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        .msg-media .yt-thumb .play-btn:hover {
            background: rgba(255, 0, 0, 0.8);
        }

        /* ===== MESSAGE ACTIONS ===== */
        .message-actions {
            display: flex;
            gap: 3px;
            margin-top: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            justify-content: flex-end;
        }

        .message-wrapper:hover .message-actions,
        .message-wrapper .message-actions:focus-within {
            opacity: 1;
        }

        .message-actions button {
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            gap: 3px;
            line-height: 20px;
        }

        .message-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .message-actions button.danger:hover {
            background: var(--red);
            color: #fff;
        }

        /* ===== REACTIONS ===== */
        .msg-reactions {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            margin-top: 3px;
        }

        .msg-reactions .reaction {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            gap: 2px;
            line-height: 20px;
            user-select: none;
        }

        .msg-reactions .reaction:hover {
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        .msg-reactions .reaction .count {
            font-size: 10px;
            color: var(--text-muted);
        }

        .msg-reactions .reaction.reacted {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* ===== REACTION PICKER ===== */
        .reaction-picker {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px 6px;
            box-shadow: var(--shadow);
            z-index: 30;
            gap: 2px;
            flex-wrap: wrap;
            max-width: 180px;
        }

        .reaction-picker.show {
            display: flex;
        }

        .reaction-picker button {
            background: transparent;
            border: none;
            font-size: 18px;
            padding: 2px 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
            line-height: 1.2;
        }

        .reaction-picker button:hover {
            background: var(--bg-hover);
            transform: scale(1.1);
        }

        /* ===== SYSTEM MESSAGES ===== */
        .system-message {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 6px 0;
            margin: 3px 0;
            width: 100%;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--bg-tertiary);
            border-radius: 4px;
            opacity: 0.7;
        }

        /* ===== TYPING ===== */
        #typingStatus {
            position: fixed;
            bottom: calc(var(--input-height) + 6px);
            padding: 2px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            right: 0;
            left: 0;
            pointer-events: none;
            animation: fadeIn 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-start;
        }

        #typingStatus .typing-dots {
            display: inline-flex;
            gap: 2px;
        }

        #typingStatus .typing-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite both;
        }

        #typingStatus .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        #typingStatus .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%,
            80%,
            100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== INPUT ===== */
        #inputBox {
            height: var(--input-height);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 6px 10px;
            flex-shrink: 0;
            transition: background var(--transition), border var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #inputBox .input-actions {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        #inputBox .input-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: background var(--transition), color var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #inputBox .input-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        #inputBox .input-actions button.active {
            color: var(--accent);
        }

        #messageInput {
            flex: 1;
            border: none;
            padding: 8px 14px;
            border-radius: var(--radius-full);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            min-height: 34px;
            transition: background var(--transition), box-shadow var(--transition);
            direction: rtl;
        }

        #messageInput:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        #messageInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            transition: background var(--transition), transform 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sendBtn:hover {
            background: var(--accent-hover);
        }
        #sendBtn:active {
            transform: scale(0.92);
        }

        /* ===== EMOJI PICKER ===== */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: calc(var(--input-height) + 6px);
            left: 10px;
            right: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 10px;
            z-index: 30;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        #emojiPicker.show {
            display: grid;
        }

        #emojiPicker button {
            background: transparent;
            border: none;
            font-size: 22px;
            padding: 3px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            line-height: 1.2;
        }

        #emojiPicker button:hover {
            background: var(--bg-hover);
            transform: scale(1.08);
        }

        /* ===== OVERLAY / POPUPS ===== */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 50;
            animation: fadeIn 0.25s;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
        }

        #overlay.show {
            display: flex;
        }

        .popup {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 92%;
            max-width: 360px;
            max-height: 70vh;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: scaleIn 0.25s ease;
            display: none;
            flex-direction: column;
        }

        .popup.show {
            display: flex;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .popup-header h4 {
            font-size: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .popup-header button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 3px;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }

        .popup-header button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .popup-body {
            padding: 10px 16px;
            overflow-y: auto;
            flex: 1;
        }

        .popup-body .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: var(--radius-sm);
            transition: background 0.2s;
            font-size: 13px;
        }

        .popup-body .user-item:hover {
            background: var(--bg-hover);
        }

        .popup-body .user-item .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .popup-body .user-item .user-name {
            flex: 1;
        }

        .popup-body .user-item .user-role {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-muted);
        }

        .popup-body .user-item .user-role.admin {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.15);
        }
        .popup-body .user-item .user-role.mod {
            color: #60f0ff;
            background: rgba(96, 240, 255, 0.12);
        }

        .popup-body .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 16px 0;
            font-size: 13px;
        }

        .popup-footer {

<body>

    <!-- ===== LOGIN SCREEN ===== -->
    <div id="loginScreen">

            <p class="subtitle">تواصل مع فريقك بكل سهولة</p>

    <script>
        // ============================================================
        //  FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
            databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================================
        //  STATE
        // ============================================================
        let username = "";
        let role = "user";
        let lastMessageKey = null;
        let isScrolledUp = false;
        let hasNewMessages = false;
        let editingKey = null;
        let editingText = "";

        let msgListener = null;
        let typingListener = null;
        let onlineListener = null;
        let connListener = null;

        const $ = id => document.getElementById(id);
        const usernameInput = $('usernameInput');
        const loginScreen = $('loginScreen');
        const chatScreen = $('chatScreen');
        const messageInput = $('messageInput');
        const messages = $('messages');
        const typingStatus = $('typingStatus');
        const onlineCount = $('onlineCount');
        const onlineUsersList = $('onlineUsersList');
        const adminUsersList = $('adminUsersList');
        const overlay = $('overlay');
        const onlinePopup = $('onlinePopup');
        const adminPopup = $('adminPopup');
        const connectionStatus = $('connectionStatus');
        const loginBtn = $('loginBtn');
        const sendBtn = $('sendBtn');
        const loadingState = $('loadingState');
        const newMsgIndicator = $('newMsgIndicator');
        const emojiPicker = $('emojiPicker');
        const emojiBtn = $('emojiBtn');
        const lightbox = $('lightbox');
        const lightboxImg = $('lightboxImg');
        const searchBox = $('searchBox');
        const searchInput = $('searchInput');
        const themeIcon = $('themeIcon');
        const statusLabel = $('statusLabel');

        // ============================================================
        //  EMOJI DATA
        // ============================================================
        const EMOJIS = ['😀', '😁', '😂', '🤣', '😊', '😍', '🥰', '😘', '😗', '😙', '😚', '🙂', '🤗', '🤩', '🤔', '🤨', '😐', '😑', '😶',
            '🙄', '😏', '😣', '😥', '😮', '😯', '😪', '😫', '😴', '😌', '😛', '😜', '😝', '🤤', '😒', '😓', '😔', '😕', '🙃', '🤑', '😲',
            '☹️', '🙁', '😖', '😞', '😟', '😤', '😢', '😭', '😦', '😧', '😨', '😩', '🤯', '😬', '😰', '😱', '🥵', '🥶', '😳', '🤪', '😵',
            '😡', '😠', '🤬', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝',
            '✨', '🌟', '⭐', '🌙', '☀️', '🔥', '💯', '🎉', '🎊', '🎈', '🌸', '🌺', '🌻', '🌹', '🌷', '🌱', '🌲', '🌳', '🌴', '🌵', '🌾',
            '👍', '👎', '👊', '✊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✌️', '🤟', '🤘', '👌', '🤌', '🤏', '👈', '👉', '👆',
            '👇', '☝️', '✋', '🤚', '🖐️', '🖖', '👋', '🤙', '💪', '🦾', '🦵', '🦶', '👀', '👁️', '👄', '👅', '👂', '🦻', '👃', '🧠'
        ];

        // ============================================================
        //  THEME
        // ============================================================
        let darkTheme = true;

        function toggleTheme() {
            darkTheme = !darkTheme;
            document.documentElement.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
            themeIcon.className = darkTheme ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', darkTheme ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            darkTheme = false;
            document.documentElement.setAttribute('data-theme', 'light');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================================
        //  UTILITY
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', hour12: true });
        }

        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function isToday(ts) {
            const d = new Date(ts);
            const t = new Date();
            return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
        }

        function getMessageDate(ts) {
            if (isToday(ts)) return 'اليوم';
            const d = new Date(ts);
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (d.getDate() === yesterday.getDate() && d.getMonth() === yesterday.getMonth() && d.getFullYear() ===
                yesterday.getFullYear()) return 'أمس';
            return formatDate(ts);
        }

        function extractMedia(text) {
            const yt = text.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (yt) return { type: 'youtube', id: yt[1] };
            const mp4 = text.match(/https?:\/\/\S+\.(mp4|webm|ogg|mov|avi)/i);
            if (mp4) return { type: 'file', id: mp4[0] };
            const img = text.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg)/i);
            if (img) return { type: 'image', id: img[0] };
            return null;
        }

        function getRoleIcon(user) {
            const r = ROLE_CONFIG[user]?.role || 'user';
            if (r === 'admin') return '🔱';
            if (r === 'mod') return '⭐';
            return '';
        }

        function getRoleClass(user) {
            const r = ROLE_CONFIG[user]?.role || 'user';
            if (r === 'admin') return 'admin';
            if (r === 'mod') return 'mod';
            return '';
        }

        function isAdmin(user) {
            return ROLE_CONFIG[user]?.role === 'admin';
        }

        function isMod(user) {
            return ROLE_CONFIG[user]?.role === 'mod' || ROLE_CONFIG[user]?.role === 'admin';
        }

        // ============================================================
        //  ROLES CONFIG
        // ============================================================
        const ROLE_CONFIG = {
            'Mod': { role: 'mod' },
            'Admin': { role: 'admin' },
            'User': { role: 'user' }
        };

        // ============================================================
        //  LOGIN
        // ============================================================
        function login() {
            const raw = usernameInput.value.trim();
            if (!raw || raw.length < 2) {
                $('loginError').textContent = '⚠️ الاسم يجب أن يكون حرفين على الأقل';
                return;
            }
            username = escapeHtml(raw);
            role = ROLE_CONFIG[username]?.role || 'user';

            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            chatScreen.classList.add('active');

            $('loginError').textContent = '';
            loadMessages();
            setupConnection();
            buildEmojiPicker();
            setTimeout(() => messageInput.focus(), 400);
        }

        usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        // ============================================================
        //  CONNECTION
        // ============================================================
        function setupConnection() {
            const connectedRef = db.ref('.info/connected');
            if (connListener) connectedRef.off('value', connListener);
            connListener = connectedRef.on('value', snap => {
                if (snap.val()) {
                    connectionStatus.style.display = 'none';
                    statusLabel.textContent = 'متصل';
                    const onlineRef = db.ref('onlineUsers/' + encodeURIComponent(username));
                    onlineRef.set({ name: username, status: 'online', lastActive: Date.now() });
                    onlineRef.onDisconnect().remove();
                    const typingRef = db.ref('typing/' + encodeURIComponent(username));
                    typingRef.onDisconnect().remove();
                } else {
                    connectionStatus.style.display = 'block';
                    statusLabel.textContent = 'غير متصل';
                }
            });
            setupOnlineUsers();
            setupTyping();
        }

        // ============================================================
        //  MESSAGES
        // ============================================================
        function loadMessages() {
            if (msgListener) {
                db.ref('messages').off('child_added', msgListener);
                db.ref('messages').off('child_removed', msgListener);
                db.ref('messages').off('child_changed', msgListener);
            }
            messages.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ تحميل الرسائل...</div>';

            const chatRef = db.ref('messages');
            let firstLoad = true;

            msgListener = chatRef.limitToLast(100).on('child_added', snap => {
                const data = snap.val();
                if (!data) return;
                lastMessageKey = snap.key;
                renderMessage(data, snap.key);
                if (firstLoad) {
                    const ls = $('loadingState');
                    if (ls) ls.remove();
                    firstLoad = false;
                }
                if (isScrolledUp && data.user !== username) {
                    hasNewMessages = true;
                    newMsgIndicator.classList.add('show');
                    newMsgIndicator.innerHTML = `<i class="fas fa-arrow-down"></i> رسائل جديدة`;
                }
            });

            chatRef.on('child_removed', snap => {
                const el = document.querySelector(`[data-key="${snap.key}"]`);
                if (el) el.remove();
            });

            chatRef.on('child_changed', snap => {
                const data = snap.val();
                if (!data) return;
                const el = document.querySelector(`[data-key="${snap.key}"]`);
                if (el) {
                    const textEl = el.querySelector('.msg-text');
                    if (textEl) {
                        textEl.innerHTML = parseMessageText(data.text);
                    }
                    const timeEl = el.querySelector('.msg-time');
                    if (timeEl) {
                        timeEl.textContent = formatTime(data.time) + (data.edited ? ' (معدل)' : '');
                    }
                }
            });

            setTimeout(() => { messages.scrollTop = 0; }, 200);
        }

        function renderMessage(data, key) {
            const ls = $('loadingState');
            if (ls) ls.remove();

            if (data.system) {
                const div = document.createElement('div');
                div.className = 'system-message';
                div.setAttribute('data-key', key);
                div.textContent = data.text;
                messages.insertBefore(div, messages.firstChild);
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper';
            wrapper.setAttribute('data-key', key);
            if (data.user === username) wrapper.classList.add('own');

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            const header = document.createElement('div');
            header.className = 'msg-header';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'msg-name ' + getRoleClass(data.user);
            nameSpan.textContent = data.user;

            const roleIcon = getRoleIcon(data.user);
            if (roleIcon) {
                const iconSpan = document.createElement('span');
                iconSpan.className = 'msg-role-icon';
                iconSpan.textContent = roleIcon;
                header.appendChild(iconSpan);
            }

            header.appendChild(nameSpan);

            const timeSpan = document.createElement('span');
            timeSpan.className = 'msg-time';
            timeSpan.textContent = formatTime(data.time) + (data.edited ? ' (معدل)' : '');
            header.appendChild(timeSpan);

            bubble.appendChild(header);

            const textDiv = document.createElement('div');
            textDiv.className = 'msg-text';
            textDiv.innerHTML = parseMessageText(data.text);
            bubble.appendChild(textDiv);

            if (data.mediaType && data.mediaId) {
                const mediaDiv = document.createElement('div');
                mediaDiv.className = 'msg-media';
                if (data.mediaType === 'image') {
                    const img = document.createElement('img');
                    img.src = data.mediaId;
                    img.alt = 'صورة';
                    img.loading = 'lazy';
                    img.onclick = (e) => { e.stopPropagation();
                        openLightbox(data.mediaId); };
                    img.onerror = () => { mediaDiv.innerHTML =
                            '<span style="color:var(--text-muted);font-size:12px;">⚠️ تعذر تحميل الصورة</span>'; };
                    mediaDiv.appendChild(img);
                } else if (data.mediaType === 'youtube') {
                    const thumb = document.createElement('div');
                    thumb.className = 'yt-thumb';
                    const img = document.createElement('img');
                    img.src = `https://img.youtube.com/vi/${data.mediaId}/hqdefault.jpg`;
                    img.alt = 'YouTube';
                    img.loading = 'lazy';
                    const play = document.createElement('div');
                    play.className = 'play-btn';
                    play.innerHTML = '<i class="fas fa-play"></i>';
                    thumb.appendChild(img);
                    thumb.appendChild(play);
                    thumb.onclick = () => {
                        const wrapper2 = document.createElement('div');
                        wrapper2.className = 'yt-wrapper';
                        const iframe = document.createElement('iframe');
                        iframe.src = `https://www.youtube.com/embed/${data.mediaId}?autoplay=1&rel=0`;
                        iframe.allow =
                            'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                        iframe.allowFullscreen = true;
                        wrapper2.appendChild(iframe);
                        mediaDiv.innerHTML = '';
                        mediaDiv.appendChild(wrapper2);
                    };
                    mediaDiv.appendChild(thumb);
                } else if (data.mediaType === 'file') {
                    const a = document.createElement('a');
                    a.href = data.mediaId;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.style.cssText = 'color:var(--accent);text-decoration:underline;font-size:13px;';
                    a.textContent = '📁 تحميل الملف';
                    mediaDiv.appendChild(a);
                }
                bubble.appendChild(mediaDiv);
            }

            if (data.reactions) {
                const reacDiv = document.createElement('div');
                reacDiv.className = 'msg-reactions';
                const reacMap = data.reactions || {};
                for (const [emoji, users] of Object.entries(reacMap)) {
                    const btn = document.createElement('span');
                    btn.className = 'reaction';
                    if (Array.isArray(users) && users.includes(username)) btn.classList.add('reacted');
                    btn.textContent = emoji;
                    const count = document.createElement('span');
                    count.className = 'count';
                    count.textContent = Array.isArray(users) ? users.length : 0;
                    btn.appendChild(count);
                    btn.onclick = (e) => { e.stopPropagation();
                        toggleReaction(key, emoji); };
                    reacDiv.appendChild(btn);
                }
                bubble.appendChild(reacDiv);
            }

            const actions = document.createElement('div');
            actions.className = 'message-actions';

            const reactBtn = document.createElement('button');
            reactBtn.innerHTML = '<i class="fas fa-smile"></i>';
            reactBtn.title = 'إضافة تفاعل';
            reactBtn.onclick = (e) => { e.stopPropagation();
                toggleReactionPicker(key, reactBtn); };
            actions.appendChild(reactBtn);

            if (data.user === username) {
                const editBtn = document.createElement('button');
                editBtn.innerHTML = '<i class="fas fa-edit"></i>';
                editBtn.title = 'تعديل';
                editBtn.onclick = (e) => { e.stopPropagation();
                    startEdit(key, data.text); };
                actions.appendChild(editBtn);
            }

            if (data.user === username || role === 'admin' || role === 'mod') {
                const delBtn = document.createElement('button');
                delBtn.className = 'danger';
                delBtn.innerHTML = '<i class="fas fa-trash"></i>';
                delBtn.title = 'حذف';
                delBtn.onclick = (e) => { e.stopPropagation();
                    deleteMessage(key); };
                actions.appendChild(delBtn);
            }

            bubble.appendChild(actions);

            wrapper.appendChild(bubble);
            messages.insertBefore(wrapper, messages.firstChild);

            if (!isScrolledUp) {
                setTimeout(() => { messages.scrollTop = 0; }, 50);
            }
        }

        function parseMessageText(text) {
            let html = escapeHtml(text);
            html = html.replace(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/g,
                (match, id) => {
                    return `<a href="#" onclick="event.preventDefault();embedYoutube('${id}')">▶️ YouTube</a>`;
                });
            html = html.replace(/(https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg))/gi,
                (match) => {
                    return `<a href="#" onclick="event.preventDefault();openLightbox('${match}')">🖼️ صورة</a>`;
                });
            html = html.replace(/(https?:\/\/[^\s]+)/g,
                (match) => {
                    return `<a href="${match}" target="_blank" rel="noopener">${match}</a>`;
                });
            return html;
        }

        // ============================================================
        //  SEND MESSAGE
        // ============================================================
        function send() {
            let text = messageInput.value.trim();
            if (!text || !username) return;

            if (editingKey) {
                db.ref('messages/' + editingKey).update({
                    text: text,
                    edited: true,
                    time: Date.now()
                });
                editingKey = null;
                editingText = '';
                messageInput.placeholder = 'اكتب رسالة...';
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                return;
            }

            const media = extractMedia(text);
            const chatRef = db.ref('messages');
            chatRef.push({
                user: username,
                text: text,
                mediaType: media ? media.type : null,
                mediaId: media ? media.id : null,
                time: Date.now(),
                reactions: {}
            });
            messageInput.value = '';
            db.ref('typing/' + encodeURIComponent(username)).remove();
            messageInput.focus();
            closeEmojiPicker();
        }

        messageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        // ============================================================
        //  EDIT MESSAGE
        // ============================================================
        function startEdit(key, text) {
            editingKey = key;
            editingText = text;
            messageInput.value = text;
            messageInput.focus();
            messageInput.placeholder = '✏️ تعديل الرسالة...';
            sendBtn.innerHTML = '<i class="fas fa-check"></i>';
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    cancelEdit();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);
            setTimeout(() => {
                const blurHandler = () => {
                    if (editingKey) cancelEdit();
                    messageInput.removeEventListener('blur', blurHandler);
                };
                messageInput.addEventListener('blur', blurHandler);
            }, 100);
        }

        function cancelEdit() {
            editingKey = null;
            editingText = '';
            messageInput.value = '';
            messageInput.placeholder = 'اكتب رسالة...';
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        }

        // ============================================================
        //  DELETE MESSAGE
        // ============================================================
        function deleteMessage(key) {
            if (!key) return;
            db.ref('messages/' + key).once('value', snap => {
                const data = snap.val();
                if (!data) return;
                if (data.user === username || role === 'admin' || role === 'mod') {
                    if (confirm('هل أنت متأكد من حذف هذه الرسالة؟')) {
                        db.ref('messages/' + key).remove();
                    }
                } else {
                    alert('ليس لديك صلاحية لحذف هذه الرسالة');
                }
            });
        }

        // ============================================================
        //  REACTIONS
        // ============================================================
        function toggleReaction(key, emoji) {
            if (!key || !username) return;
            const ref = db.ref('messages/' + key + '/reactions/' + emoji);
            ref.transaction(current => {
                if (!current) return [username];
                if (!Array.isArray(current)) return [username];
                const idx = current.indexOf(username);
                if (idx > -1) {
                    current.splice(idx, 1);
                    return current.length ? current : null;
                } else {
                    current.push(username);
                    return current;
                }
            });
        }

        function toggleReactionPicker(key, btn) {
            let picker = btn.parentElement.querySelector('.reaction-picker');
            if (!picker) {
                picker = document.createElement('div');
                picker.className = 'reaction-picker';
                const emojis = ['❤️', '👍', '😂', '😮', '😢', '🙏', '🔥', '🎉', '💯', '⭐'];
                emojis.forEach(e => {
                    const b = document.createElement('button');
                    b.textContent = e;
                    b.onclick = (ev) => {
                        ev.stopPropagation();
                        toggleReaction(key, e);
                        picker.classList.remove('show');
                    };
                    picker.appendChild(b);
                });
                btn.parentElement.appendChild(picker);
                document.addEventListener('click', function closePicker(ev) {
                    if (!picker.contains(ev.target) && ev.target !== btn) {
                        picker.classList.remove('show');
                        document.removeEventListener('click', closePicker);
                    }
                });
            }
            picker.classList.toggle('show');
        }

        // ============================================================
        //  TYPING
        // ============================================================
        function setupTyping() {
            const typingRef = db.ref('typing');
            messageInput.addEventListener('input', () => {
                if (!username) return;
                const userRef = db.ref('typing/' + encodeURIComponent(username));
                userRef.set(Date.now());
                clearTimeout(window.typingTimeout);
                window.typingTimeout = setTimeout(() => { userRef.remove(); }, 2000);
            });

            if (typingListener) typingRef.off('value', typingListener);
            typingListener = typingRef.on('value', snap => {
                const data = snap.val() || {};
                const now = Date.now();
                const active = Object.keys(data).filter(k => {
                    return decodeURIComponent(k) !== username && (now - data[k] < 3000);
                });
                if (active.length === 0) {
                    typingStatus.innerHTML = '';
                    return;
                }
                const names = active.map(k => escapeHtml(decodeURIComponent(k)));
                let msg = names.join('، ') + ' يكتب';
                if (names.length === 1) msg = names[0] + ' يكتب...';
                else msg = names.join('، ') + ' يكتبون...';
                typingStatus.innerHTML =
                    `${msg} <span class="typing-dots"><span></span><span></span><span></span></span>`;
            });
        }

        // ============================================================
        //  ONLINE USERS
        // ============================================================
        function setupOnlineUsers() {
            const onlineRef = db.ref('onlineUsers');
            if (onlineListener) onlineRef.off('value', onlineListener);
            onlineListener = onlineRef.on('value', snap => {
                const users = snap.val() || {};
                const names = Object.keys(users);
                onlineCount.textContent = names.length;

                let html = '';
                if (names.length === 0) {
                    html = '<div class="empty-state">لا يوجد متصلون</div>';
                } else {
                    names.forEach(k => {
                        const u = users[k];
                        const isYou = u.name === username;
                        const userRole = ROLE_CONFIG[u.name]?.role || 'user';
                        let roleLabel = '';
                        if (userRole === 'admin') roleLabel =
                            '<span class="user-role admin">مدير</span>';
                        else if (userRole === 'mod') roleLabel =
                            '<span class="user-role mod">مشرف</span>';
                        html += `
                            <div class="user-item">
                                <span class="status-dot"></span>
                                <span class="user-name">${escapeHtml(u.name)} ${isYou ? '(أنت)' : ''}</span>
                                ${roleLabel}
                            </div>
                        `;
                    });
                }
                onlineUsersList.innerHTML = html;

                if (role === 'admin' || role === 'mod') {
                    let adminHtml = '';
                    if (names.length === 0) {
                        adminHtml = '<div class="empty-state">لا يوجد متصلون</div>';
                    } else {
                        names.forEach(k => {
                            const u = users[k];
                            const userRole = ROLE_CONFIG[u.name]?.role || 'user';
                            let roleLabel = '';
                            if (userRole === 'admin') roleLabel =
                                '<span class="user-role admin">🔱 مدير</span>';
                            else if (userRole === 'mod') roleLabel =
                                '<span class="user-role mod">⭐ مشرف</span>';
                            else roleLabel = '<span class="user-role">👤 مستخدم</span>';
                            adminHtml += `
                                <div class="user-item">
                                    <span class="status-dot"></span>
                                    <span class="user-name">${escapeHtml(u.name)}</span>
                                    ${roleLabel}
                                </div>
                            `;
                        });
                    }
                    adminUsersList.innerHTML = adminHtml;
                } else {
                    adminUsersList.innerHTML =
                        '<div class="empty-state">🔒 غير متاح - صلاحيات مدير مطلوبة</div>';
                }
            });
        }

        // ============================================================
        //  POPUPS
        // ============================================================
        function openPopup(type) {
            overlay.classList.add('show');
            onlinePopup.classList.remove('show');
            adminPopup.classList.remove('show');
            if (type === 'online') {
                onlinePopup.classList.add('show');
            } else if (type === 'admin') {
                if (role === 'admin' || role === 'mod') {
                    adminPopup.classList.add('show');
                } else {
                    alert('🔒 هذه اللوحة مخصصة للمديرين فقط');
                    closePopup();
                }
            }
        }

        function closePopup() {
            overlay.classList.remove('show');
            onlinePopup.classList.remove('show');
            adminPopup.classList.remove('show');
        }

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closePopup();
        });

        // ============================================================
        //  CLEAR CHAT
        // ============================================================
        function clearChat() {
            if (role !== 'admin' && role !== 'mod') {
                alert('❌ ليس لديك صلاحية لمسح الشات');
                return;
            }
            if (confirm('⚠️ هل أنت متأكد من مسح جميع الرسائل؟ هذا الإجراء لا يمكن التراجع عنه!')) {
                db.ref('messages').remove();
                closePopup();
            }
        }

        // ============================================================
        //  EMOJI PICKER
        // ============================================================
        function buildEmojiPicker() {
            emojiPicker.innerHTML = '';
            EMOJIS.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.type = 'button';
                btn.onclick = () => {
                    const input = messageInput;
                    const start = input.selectionStart;
                    const end = input.selectionEnd;
                    const val = input.value;
                    input.value = val.slice(0, start) + emoji + val.slice(end);
                    input.focus();
                    input.selectionStart = input.selectionEnd = start + emoji.length;
                    closeEmojiPicker();
                    input.dispatchEvent(new Event('input'));
                };
                emojiPicker.appendChild(btn);
            });
        }

        function toggleEmojiPicker() {
            emojiPicker.classList.toggle('show');
            emojiBtn.classList.toggle('active');
        }

        function closeEmojiPicker() {
            emojiPicker.classList.remove('show');
            emojiBtn.classList.remove('active');
        }

        // ============================================================
        //  LIGHTBOX
        // ============================================================
        function openLightbox(src) {
            lightbox.style.display = 'flex';
            lightboxImg.src = src;
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxImg.src = '';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (lightbox.style.display === 'flex') closeLightbox();
                if (editingKey) cancelEdit();
            }
        });

        // ============================================================
        //  SEARCH
        // ============================================================
        let searchActive = false;

        function toggleSearch() {
            searchActive = !searchActive;
            searchBox.classList.toggle('show', searchActive);
            if (searchActive) {
                searchInput.focus();
                searchInput.value = '';
                clearHighlights();
            } else {
                searchInput.value = '';
                clearHighlights();
            }
        }

        function searchMessages(query) {
            clearHighlights();
            if (!query || query.length < 2) return;
            const items = messages.querySelectorAll('.message-bubble .msg-text');
            let found = 0;
            items.forEach(el => {
                const text = el.textContent || '';
                if (text.toLowerCase().includes(query.toLowerCase())) {
                    el.innerHTML = highlightText(text, query);
                    found++;
                    if (found === 1) {
                        el.closest('.message-wrapper')?.scrollIntoView({ block: 'center', behavior: 'smooth' });
                    }
                }
            });
        }

        function highlightText(text, query) {
            const regex = new RegExp('(' + escapeRegex(query) + ')', 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function clearHighlights() {
            const items = messages.querySelectorAll('.message-bubble .msg-text');
            items.forEach(el => {
                const text = el.textContent || '';
                el.innerHTML = text;
            });
        }

        // ============================================================
        //  SCROLL
        // ============================================================
        messages.addEventListener('scroll', () => {
            const scrollTop = messages.scrollTop;
            const scrollHeight = messages.scrollHeight;
            const clientHeight = messages.clientHeight;
            isScrolledUp = scrollTop < scrollHeight - clientHeight - 80;
            if (!isScrolledUp) {
                hasNewMessages = false;
                newMsgIndicator.classList.remove('show');
            }
        });

        function scrollToBottom() {
            messages.scrollTop = 0;
            hasNewMessages = false;
            newMsgIndicator.classList.remove('show');
        }

        // ============================================================
        //  YOUTUBE EMBED
        // ============================================================
        function embedYoutube(id) {
            const wrapper = document.createElement('div');
            wrapper.className = 'yt-wrapper';
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            iframe.allow =
                'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            wrapper.appendChild(iframe);
            const activeEl = document.activeElement;
            const msgText = activeEl?.closest?.('.message-bubble')?.querySelector?.('.msg-text');
            if (msgText) {
                const links = msgText.querySelectorAll('a');
                links.forEach(a => {
                    if (a.textContent === '▶️ YouTube') {
                        const parent = a.parentElement;
                        if (parent) {
                            const container = document.createElement('div');
                            container.className = 'msg-media';
                            container.appendChild(wrapper);
                            parent.replaceChild(container, a);
                        }
                    }
                });
            }
        }

        // ============================================================
        //  LOGOUT
        // ============================================================
        function logout() {
            if (!username) return;
            if (confirm('هل تريد تسجيل الخروج؟')) {
                db.ref('onlineUsers/' + encodeURIComponent(username)).remove();
                db.ref('typing/' + encodeURIComponent(username)).remove();
                if (msgListener) db.ref('messages').off('child_added', msgListener);
                if (typingListener) db.ref('typing').off('value', typingListener);
                if (onlineListener) db.ref('onlineUsers').off('value', onlineListener);
                if (connListener) db.ref('.info/connected').off('value', connListener);
                username = '';
                role = 'user';
                editingKey = null;
                lastMessageKey = null;
                isScrolledUp = false;
                hasNewMessages = false;
                chatScreen.classList.remove('active');
                chatScreen.style.display = 'none';
                loginScreen.style.display = 'flex';
                messages.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ تحميل الرسائل...</div>';
                usernameInput.value = '';
                messageInput.value = '';
                typingStatus.innerHTML = '';
                newMsgIndicator.classList.remove('show');
                closePopup();
                closeEmojiPicker();
                closeLightbox();
            }
        }

        // ============================================================
        //  VISIBILITY CHANGE
        // ============================================================
        document.addEventListener('visibilitychange', () => {
            if (!username) return;
            if (document.hidden) {
                db.ref('onlineUsers/' + encodeURIComponent(username)).update({ lastActive: Date.now(), status: 'away' });
            } else {
                db.ref('onlineUsers/' + encodeURIComponent(username)).update({ status: 'online', lastActive: Date
                        .now() });
            }
        });

        // ============================================================
        //  PREVENT ZOOM ON DOUBLE TAP (iOS)
        // ============================================================
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - (document.lastTouch || 0) < 300) e.preventDefault();
            document.lastTouch = now;
        }, { passive: false });

        console.log('✅ شات متطور جاهز - تم تحسين حجم العناصر للاندرويد والايفون');
    </script>
</body>
</html>
