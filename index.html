<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>أثير – شات عصري</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* =============================================
       RESET & ROOT – تصميم جديد بالكامل
    ============================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-app: #f5f7fa;
      --bg-header: #ffffff;
      --bg-chat: #eef1f5;
      --bg-input: #ffffff;
      --bg-bubble-self: #dcf8c6;
      --bg-bubble-other: #ffffff;
      --text-primary: #1e2a3a;
      --text-secondary: #5b6c84;
      --text-muted: #8a9bb5;
      --accent: #4a8af4;
      --accent-light: #e6f0ff;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --transition: 0.2s ease;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-app);
      color: var(--text-primary);
      overflow: hidden;
      touch-action: pan-y;
    }

    /* شريط التمرير خفيف */
    ::-webkit-scrollbar {
      width: 3px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    /* =============================================
       شاشة الدخول
    ============================================= */
    #loginScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: linear-gradient(145deg, #f0f4fe, #e6ecf8);
    }
    #loginContainer {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      padding: 36px 28px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    #loginContainer .logo {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    #loginContainer .logo i {
      margin-left: 6px;
      color: #fbbf24;
    }
    #loginContainer .sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
      font-weight: 400;
    }
    #loginContainer .input-group {
      position: relative;
      margin-bottom: 18px;
    }
    #loginContainer .input-group i {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 16px;
    }
    #loginContainer input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      border: 2px solid #dde3ed;
      border-radius: var(--radius-sm);
      background: #ffffff;
      color: var(--text-primary);
      font-size: 16px;
      transition: 0.2s;
      direction: rtl;
    }
    #loginContainer input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(74, 138, 244, 0.15);
    }
    #loginBtn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #loginBtn:active {
      transform: scale(0.96);
    }
    #loginError {
      color: #ef476f;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
    }

    /* =============================================
       شاشة الشات – تخطيط عمودي بالكامل
    ============================================= */
    #chatScreen {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: var(--bg-chat);
    }
    #chatScreen.active {
      display: flex;
    }

    /* ===== رأس الشات ===== */
    #chatHeader {
      background: var(--bg-header);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      flex-shrink: 0;
      min-height: 60px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
    }
    #chatHeader .left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #chatHeader .left .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 700;
      font-size: 18px;
    }
    #chatHeader .left .info {
      line-height: 1.3;
    }
    #chatHeader .left .info .name {
      font-weight: 600;
      font-size: 16px;
    }
    #chatHeader .left .info .status {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #chatHeader .left .info .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ba55c;
      display: inline-block;
    }
    #chatHeader .right {
      display: flex;
      gap: 4px;
    }
    #chatHeader .right button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 6px 10px;
      border-radius: 30px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #chatHeader .right button:active {
      background: rgba(0, 0, 0, 0.04);
    }
    #chatHeader .right button .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      border-radius: 20px;
      padding: 0 8px;
      line-height: 20px;
      font-weight: 600;
    }

    /* ===== منطقة الرسائل ===== */
    #messagesArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 8px 0 0;
    }
    #messagesList {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 12px 16px 20px;
      display: flex;
      flex-direction: column-reverse;
      scroll-behavior: smooth;
    }

    /* ===== فقاعات الرسائل ===== */
    .msg-row {
      animation: fadeSlide 0.25s ease;
      margin-bottom: 6px;
      display: flex;
      flex-direction: column;
      max-width: 85%;
      align-self: flex-end;
    }
    .msg-row.self {
      align-self: flex-end;
    }
    .msg-row.self .bubble {
      background: var(--bg-bubble-self);
      border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
      border: 1px solid rgba(74, 138, 244, 0.08);
    }
    .msg-row:not(.self) {
      align-self: flex-start;
    }
    .msg-row:not(.self) .bubble {
      background: var(--bg-bubble-other);
      border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }
    .bubble {
      padding: 8px 14px;
      word-wrap: break-word;
      position: relative;
      transition: 0.2s;
    }
    .bubble .sender {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1px;
    }
    .bubble .sender.admin {
      color: #fbbf24;
    }
    .bubble .sender.mod {
      color: #60f0ff;
    }
    .bubble .text {
      font-size: 15px;
      line-height: 1.5;
    }
    .bubble .text a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dotted rgba(74, 138, 244, 0.3);
    }
    .bubble .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 2px;
    }
    .bubble .meta .time {
      font-size: 10px;
      color: var(--text-muted);
      direction: ltr;
    }
    .bubble .meta .edited {
      font-size: 9px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ===== وسائط ===== */
    .media-wrap {
      margin-top: 4px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-width: 100%;
      cursor: pointer;
    }
    .media-wrap img {
      max-width: 100%;
      max-height: 220px;
      border-radius: var(--radius-sm);
      display: block;
      transition: 0.2s;
    }
    .media-wrap img:active {
      transform: scale(0.98);
    }
    .yt-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .yt-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .yt-thumb {
      position: relative;
      cursor: pointer;
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .yt-thumb img {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
    }
    .yt-thumb .play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .yt-thumb .play-btn:active {
      background: var(--accent);
    }

    /* ===== ردود الفعل (تحت الرسالة) ===== */
    .reactions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .reactions .reac {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 20px;
      padding: 0 8px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 2px;
      line-height: 22px;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid transparent;
    }
    .reactions .reac:active {
      transform: scale(0.92);
    }
    .reactions .reac.reacted {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .reactions .reac .cnt {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ===== قائمة التفاعل السريع (عند الضغط المطول) ===== */
    .quick-reactions {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #fff;
      border-radius: 30px;
      padding: 4px 6px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
      gap: 2px;
      z-index: 20;
    }
    .quick-reactions.show {
      display: flex;
    }
    .quick-reactions button {
      background: transparent;
      border: none;
      font-size: 24px;
      padding: 2px 6px;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
    }
    .quick-reactions button:active {
      background: rgba(0, 0, 0, 0.04);
      transform: scale(0.9);
    }

    /* ===== رسائل النظام ===== */
    .system-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0;
      margin: 4px 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.02);
      border-radius: 20px;
    }

    /* ===== مؤشر الكتابة ===== */
    #typingIndicator {
      padding: 2px 20px 8px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      pointer-events: none;
    }
    .typing-dots {
      display: inline-flex;
      gap: 3px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ===== شريط الإدخال السفلي ===== */
    #inputBar {
      background: var(--bg-input);
      padding: 6px 12px 12px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      flex-shrink: 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    #inputBar .tools {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    #inputBar .tools button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #inputBar .tools button:active {
      background: rgba(0, 0, 0, 0.04);
      color: var(--accent);
    }
    #inputBar .tools button.active {
      color: var(--accent);
    }
    #msgInput {
      flex: 1;
      border: none;
      padding: 8px 16px;
      border-radius: 24px;
      background: #f0f2f5;
      color: var(--text-primary);
      font-size: 15px;
      min-height: 40px;
      max-height: 100px;
      transition: 0.2s;
      direction: rtl;
      resize: none;
      font-family: var(--font);
      line-height: 1.4;
    }
    #msgInput:focus {
      outline: none;
      background: #e8ecf2;
    }
    #msgInput::placeholder {
      color: var(--text-muted);
    }
    #sendBtn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #sendBtn:active {
      transform: scale(0.92);
    }

    /* ===== منبثق الإيموجي ===== */
    #emojiPanel {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 12px;
      right: 12px;
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
      padding: 12px;
      z-index: 25;
      max-height: 200px;
      overflow-y: auto;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    #emojiPanel.show {
      display: grid;
    }
    #emojiPanel button {
      background: transparent;
      border: none;
      font-size: 26px;
      padding: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.15s;
    }
    #emojiPanel button:active {
      background: rgba(0, 0, 0, 0.04);
      transform: scale(0.9);
    }

    /* ===== حالة الاتصال ===== */
    #connStatus {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #faa81a;
      color: #1e2a3a;
      text-align: center;
      padding: 4px;
      font-size: 13px;
      font-weight: 600;
      z-index: 50;
      display: none;
      transform: translateY(-100%);
      transition: 0.3s;
    }
    #connStatus.show {
      transform: translateY(0);
      display: block;
    }

    /* ===== رسائل جديدة ===== */
    #newMsgBadge {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 4px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 10;
      display: none;
      box-shadow: 0 4px 16px rgba(74, 138, 244, 0.3);
      gap: 6px;
      align-items: center;
    }
    #newMsgBadge.show {
      display: flex;
    }

    /* ===== تحميل ===== */
    .loading-state {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 0;
      font-size: 14px;
    }
    .loading-state i {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      color: var(--accent);
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== الضوء الخفيف (Lightbox) ===== */
    #lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 60;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      padding: 20px;
    }
    #lightbox img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 12px;
      object-fit: contain;
    }

    /* ===== قائمة المستخدمين (منبثقة من الأسفل) ===== */
    #usersSheet {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.08);
      max-height: 60vh;
      padding: 20px 16px 30px;
      z-index: 40;
      transform: translateY(100%);
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
    }
    #usersSheet.open {
      transform: translateY(0);
      display: block;
    }
    #usersSheet .handle {
      width: 40px;
      height: 4px;
      background: #dde3ed;
      border-radius: 4px;
      margin: 0 auto 16px;
    }
    #usersSheet .title {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #usersSheet .title .close-btn {
      background: transparent;
      border: none;
      font-size: 22px;
      color: var(--text-muted);
      cursor: pointer;
    }
    #usersSheet .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 15px;
    }
    #usersSheet .user-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ba55c;
    }
    #usersSheet .user-item .name {
      flex: 1;
    }
    #usersSheet .user-item .badge {
      font-size: 11px;
      padding: 0 8px;
      border-radius: 12px;
      background: #f0f2f5;
      color: var(--text-muted);
    }
    #usersSheet .user-item .badge.admin {
      background: #fbbf24;
      color: #1e2a3a;
    }
    #usersSheet .user-item .badge.mod {
      background: #60f0ff;
      color: #1e2a3a;
    }
    #usersSheet .user-item.you {
      background: var(--accent-light);
      border-radius: 8px;
      padding: 8px 12px;
    }
    #usersSheet .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 20px 0;
    }

    /* ===== خلفية معتمة للـ Sheet ===== */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2);
      z-index: 35;
    }
    #overlay.show {
      display: block;
    }

    /* =============================================
       تحسينات إضافية للجوال
    ============================================= */
    @media (max-width: 480px) {
      :root {
        --radius-lg: 24px;
        --radius-md: 16px;
        --radius-sm: 10px;
      }
      .msg-row {
        max-width: 92%;
      }
      .bubble {
        padding: 6px 12px;
      }
      .bubble .text {
        font-size: 14px;
      }
      #chatHeader .left .avatar {
        width: 36px;
        height: 36px;
        font-size: 16px;
      }
      #chatHeader .left .info .name {
        font-size: 15px;
      }
      #msgInput {
        font-size: 14px;
        padding: 6px 14px;
        min-height: 36px;
      }
      #sendBtn {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }
      #emojiPanel {
        grid-template-columns: repeat(5, 1fr);
        padding: 8px;
        max-height: 160px;
      }
      #emojiPanel button {
        font-size: 22px;
      }
      #usersSheet {
        padding: 16px 12px 24px;
        max-height: 70vh;
      }
      #usersSheet .user-item {
        font-size: 14px;
        padding: 6px 0;
      }
    }

    @media (max-width: 380px) {
      .msg-row {
        max-width: 96%;
      }
      .bubble .text {
        font-size: 13px;
      }
      #chatHeader .right button {
        padding: 4px 6px;
        font-size: 16px;
      }
    }

    /* ===== منع التحديد ===== */
    .no-select {
      user-select: none;
    }
  </style>
</head>
<body>

  <!-- =========================================
       شاشة الدخول
  ========================================= -->
  <div id="loginScreen">
    <div id="loginContainer">
      <div class="logo"><i class="fas fa-feather-alt"></i> أثير</div>
      <div class="sub">دردشة خفيفة وأنيقة</div>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input id="usernameInput" placeholder="اسمك" autocomplete="off" />
      </div>
      <button id="loginBtn" onclick="login()"><i class="fas fa-arrow-left"></i> دخول</button>
      <div id="loginError"></div>
    </div>
  </div>

  <!-- =========================================
       شاشة الشات
  ========================================= -->
  <div id="chatScreen">

    <!-- رأس الشات -->
    <div id="chatHeader">
      <div class="left">
        <div class="avatar" id="avatarLetter">أ</div>
        <div class="info">
          <div class="name">المجموعة</div>
          <div class="status"><span class="dot"></span> <span id="onlineCountText">0 متصل</span></div>
        </div>
      </div>
      <div class="right">
        <button onclick="toggleUsers()"><i class="fas fa-users"></i> <span class="badge" id="onlineBadge">0</span></button>
        <button onclick="toggleSearch()"><i class="fas fa-search"></i></button>
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <!-- شريط البحث (مخفي) -->
    <div id="searchBar" style="display:none;padding:6px 16px;background:#fff;border-bottom:1px solid #f0f2f5;">
      <input id="searchInput" placeholder="ابحث في الرسائل..." oninput="searchMessages(this.value)" style="width:100%;border:none;padding:6px 12px;border-radius:20px;background:#f0f2f5;font-size:14px;color:var(--text-primary);" />
    </div>

    <!-- حالة الاتصال -->
    <div id="connStatus">🔄 جاري إعادة الاتصال...</div>

    <!-- منطقة الرسائل -->
    <div id="messagesArea">
      <div id="messagesList">
        <div class="loading-state" id="loadingState">
          <i class="fas fa-spinner"></i>
          جارٍ التحميل...
        </div>
      </div>
      <div id="newMsgBadge" onclick="scrollToBottom()">
        <i class="fas fa-arrow-down"></i> رسائل جديدة
      </div>
    </div>

    <!-- مؤشر الكتابة -->
    <div id="typingIndicator"></div>

    <!-- شريط الإدخال -->
    <div id="inputBar">
      <div class="tools">
        <button onclick="toggleEmoji()" id="emojiBtn"><i class="fas fa-smile"></i></button>
        <button onclick="document.getElementById('fileInput').click()"><i class="fas fa-paperclip"></i></button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)" />
      </div>
      <input id="msgInput" placeholder="اكتب رسالة..." autocomplete="off" />
      <button id="sendBtn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- لوحة الإيموجي -->
    <div id="emojiPanel"></div>

  </div>

  <!-- =========================================
       شيت المستخدمين
  ========================================= -->
  <div id="overlay" onclick="closeUsers()"></div>
  <div id="usersSheet">
    <div class="handle"></div>
    <div class="title">
      <span><i class="fas fa-users" style="color:var(--accent);"></i> المتصلون</span>
      <button class="close-btn" onclick="closeUsers()">&times;</button>
    </div>
    <div id="usersList">
      <div class="empty">جاري التحميل...</div>
    </div>
  </div>

  <!-- =========================================
       لايت بوكس للصور
  ========================================= -->
  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" />
  </div>

  <script>
    // ============================================================
    //  FIREBASE
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
      databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    //  STATE
    // ============================================================
    let username = "";
    let role = "user";
    let editingKey = null;
    let isScrolledUp = false;
    let hasNew = false;
    let msgListener = null,
      typingListener = null,
      onlineListener = null,
      connListener = null;

    // DOM
    const $ = id => document.getElementById(id);
    const loginScreen = $('loginScreen');
    const chatScreen = $('chatScreen');
    const usernameInput = $('usernameInput');
    const msgInput = $('msgInput');
    const messagesList = $('messagesList');
    const sendBtn = $('sendBtn');
    const connStatus = $('connStatus');
    const loadingState = $('loadingState');
    const newMsgBadge = $('newMsgBadge');
    const emojiPanel = $('emojiPanel');
    const emojiBtn = $('emojiBtn');
    const lightbox = $('lightbox');
    const lightboxImg = $('lightboxImg');
    const usersSheet = $('usersSheet');
    const usersList = $('usersList');
    const overlay = $('overlay');
    const onlineBadge = $('onlineBadge');
    const onlineCountText = $('onlineCountText');
    const searchInput = $('searchInput');
    const searchBar = $('searchBar');
    const typingIndicator = $('typingIndicator');
    const avatarLetter = $('avatarLetter');

    // ============================================================
    //  EMOJI LIST
    // ============================================================
    const EMOJIS = ['😀', '😁', '😂', '🤣', '😊', '😍', '🥰', '😘', '😗', '😙', '😚', '🙂', '🤗', '🤩', '🤔', '🤨', '😐', '😑', '😶',
      '🙄', '😏', '😣', '😥', '😮', '😯', '😪', '😫', '😴', '😌', '😛', '😜', '😝', '🤤', '😒', '😓', '😔', '😕', '🙃', '🤑', '😲',
      '☹️', '🙁', '😖', '😞', '😟', '😤', '😢', '😭', '😦', '😧', '😨', '😩', '🤯', '😬', '😰', '😱', '🥵', '🥶', '😳', '🤪', '😵',
      '😡', '😠', '🤬', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❣️', '💕', '💞', '💓', '💗', '💖', '💘', '💝',
      '✨', '🌟', '⭐', '🌙', '☀️', '🔥', '💯', '🎉', '🎊', '🎈', '🌸', '🌺', '🌻', '🌹', '🌷', '🌱', '🌲', '🌳', '🌴', '🌵', '🌾',
      '👍', '👎', '👊', '✊', '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏', '✌️', '🤟', '🤘', '👌', '🤌', '🤏', '👈', '👉', '👆',
      '👇', '☝️', '✋', '🤚', '🖐️', '🖖', '👋', '🤙', '💪', '🦾', '🦵', '🦶', '👀', '👁️', '👄', '👅', '👂', '🦻', '👃', '🧠'
    ];

    // ============================================================
    //  ROLES
    // ============================================================
    const ROLE_CONFIG = {
      'Mod': { role: 'mod' },
      'Admin': { role: 'admin' },
      'User': { role: 'user' }
    };

    function getRoleClass(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' ? 'admin' : r === 'mod' ? 'mod' : '';
    }

    function getRoleIcon(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' ? '🔱' : r === 'mod' ? '⭐' : '';
    }

    function isAdminOrMod(user) {
      const r = ROLE_CONFIG[user]?.role || 'user';
      return r === 'admin' || r === 'mod';
    }

    // ============================================================
    //  UTILITY
    // ============================================================
    function escapeHtml(s) { if (!s) return ''; const d = document.createElement('div');
      d.textContent = s; return d.innerHTML; }

    function formatTime(ts) { return new Date(ts).toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit',
        hour12: true }); }

    function extractMedia(text) {
      const yt = text.match(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
      if (yt) return { type: 'youtube', id: yt[1] };
      const img = text.match(/https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg)/i);
      if (img) return { type: 'image', id: img[0] };
      const file = text.match(/https?:\/\/\S+\.(mp4|webm|ogg|mov|avi|pdf|doc|docx|xls)/i);
      if (file) return { type: 'file', id: file[0] };
      return null;
    }

    function parseMessageText(text) {
      let html = escapeHtml(text);
      html = html.replace(/(?:youtube\.com\/.*[?&]v=|youtu\.be\/)([A-Za-z0-9_-]{11})/g,
        (m, id) => `<a href="#" onclick="event.preventDefault();embedYoutube('${id}')">▶️ YouTube</a>`);
      html = html.replace(/(https?:\/\/\S+\.(jpg|jpeg|png|gif|webp|bmp|svg))/gi,
        (m) => `<a href="#" onclick="event.preventDefault();openLightbox('${m}')">🖼️ صورة</a>`);
      html = html.replace(/(https?:\/\/[^\s]+)/g,
        (m) => `<a href="${m}" target="_blank" rel="noopener">${m}</a>`);
      return html;
    }

    // ============================================================
    //  LOGIN
    // ============================================================
    function login() {
      const raw = usernameInput.value.trim();
      if (!raw || raw.length < 2) { $('loginError').textContent = '⚠️ اسمك يجب أن يكون حرفين على الأقل'; return; }
      username = escapeHtml(raw);
      role = ROLE_CONFIG[username]?.role || 'user';

      loginScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      chatScreen.classList.add('active');
      $('loginError').textContent = '';
      avatarLetter.textContent = username.charAt(0).toUpperCase();

      loadMessages();
      setupConnection();
      buildEmojiPicker();
      setTimeout(() => msgInput.focus(), 400);
    }

    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    // ============================================================
    //  CONNECTION
    // ============================================================
    function setupConnection() {
      const ref = db.ref('.info/connected');
      if (connListener) ref.off('value', connListener);
      connListener = ref.on('value', snap => {
        if (snap.val()) {
          connStatus.classList.remove('show');
          const onlineRef = db.ref('onlineUsers/' + encodeURIComponent(username));
          onlineRef.set({ name: username, status: 'online', lastActive: Date.now() });
          onlineRef.onDisconnect().remove();
          db.ref('typing/' + encodeURIComponent(username)).onDisconnect().remove();
        } else {
          connStatus.classList.add('show');
        }
      });
      setupOnlineUsers();
      setupTyping();
    }

    // ============================================================
    //  MESSAGES
    // ============================================================
    function loadMessages() {
      if (msgListener) {
        db.ref('messages').off('child_added', msgListener);
        db.ref('messages').off('child_removed', msgListener);
        db.ref('messages').off('child_changed', msgListener);
      }
      messagesList.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ التحميل...</div>';

      const chatRef = db.ref('messages');
      let first = true;
      msgListener = chatRef.limitToLast(100).on('child_added', snap => {
        const data = snap.val();
        if (!data) return;
        renderMessage(data, snap.key);
        if (first) { const ls = $('loadingState'); if (ls) ls.remove();
          first = false; }
        if (isScrolledUp && data.user !== username) {
          hasNew = true;
          newMsgBadge.classList.add('show');
        }
      });

      chatRef.on('child_removed', snap => { const el = document.querySelector(`[data-key="${snap.key}"]`); if (el) el
          .remove(); });
      chatRef.on('child_changed', snap => {
        const data = snap.val();
        if (!data) return;
        const el = document.querySelector(`[data-key="${snap.key}"]`);
        if (el) {
          const t = el.querySelector('.text');
          if (t) t.innerHTML = parseMessageText(data.text);
          const tm = el.querySelector('.meta .time');
          if (tm) tm.textContent = formatTime(data.time);
          if (data.edited) {
            const ed = el.querySelector('.meta .edited');
            if (ed) ed.textContent = ' (معدل)';
          }
        }
      });

      setTimeout(() => { messagesList.scrollTop = 0; }, 200);
    }

    function renderMessage(data, key) {
      const ls = $('loadingState');
      if (ls) ls.remove();

      if (data.system) {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.setAttribute('data-key', key);
        div.textContent = data.text;
        messagesList.insertBefore(div, messagesList.firstChild);
        return;
      }

      const row = document.createElement('div');
      row.className = 'msg-row';
      row.setAttribute('data-key', key);
      if (data.user === username) row.classList.add('self');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const sender = document.createElement('div');
      sender.className = 'sender ' + getRoleClass(data.user);
      const icon = getRoleIcon(data.user);
      sender.textContent = (icon ? icon + ' ' : '') + data.user;
      bubble.appendChild(sender);

      const textDiv = document.createElement('div');
      textDiv.className = 'text';
      textDiv.innerHTML = parseMessageText(data.text);
      bubble.appendChild(textDiv);

      // Media
      if (data.mediaType && data.mediaId) {
        const mediaDiv = document.createElement('div');
        mediaDiv.className = 'media-wrap';
        if (data.mediaType === 'image') {
          const img = document.createElement('img');
          img.src = data.mediaId;
          img.alt = 'صورة';
          img.loading = 'lazy';
          img.onclick = (e) => { e.stopPropagation();
            openLightbox(data.mediaId); };
          img.onerror = () => { mediaDiv.innerHTML =
              '<span style="color:var(--text-muted);font-size:13px;">⚠️ تعذر تحميل الصورة</span>'; };
          mediaDiv.appendChild(img);
        } else if (data.mediaType === 'youtube') {
          const thumb = document.createElement('div');
          thumb.className = 'yt-thumb';
          const img = document.createElement('img');
          img.src = `https://img.youtube.com/vi/${data.mediaId}/hqdefault.jpg`;
          img.alt = 'YouTube';
          img.loading = 'lazy';
          const play = document.createElement('div');
          play.className = 'play-btn';
          play.innerHTML = '<i class="fas fa-play"></i>';
          thumb.appendChild(img);
          thumb.appendChild(play);
          thumb.onclick = () => {
            const wrap = document.createElement('div');
            wrap.className = 'yt-wrap';
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${data.mediaId}?autoplay=1&rel=0`;
            iframe.allow =
              'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            wrap.appendChild(iframe);
            mediaDiv.innerHTML = '';
            mediaDiv.appendChild(wrap);
          };
          mediaDiv.appendChild(thumb);
        } else if (data.mediaType === 'file') {
          const a = document.createElement('a');
          a.href = data.mediaId;
          a.target = '_blank';
          a.rel = 'noopener';
          a.style.cssText = 'color:var(--accent);text-decoration:underline;font-size:14px;';
          a.textContent = '📁 تحميل الملف';
          mediaDiv.appendChild(a);
        }
        bubble.appendChild(mediaDiv);
      }

      // Reactions
      if (data.reactions) {
        const reacDiv = document.createElement('div');
        reacDiv.className = 'reactions';
        for (const [emoji, users] of Object.entries(data.reactions)) {
          const btn = document.createElement('span');
          btn.className = 'reac';
          if (Array.isArray(users) && users.includes(username)) btn.classList.add('reacted');
          btn.textContent = emoji;
          const cnt = document.createElement('span');
          cnt.className = 'cnt';
          cnt.textContent = Array.isArray(users) ? users.length : 0;
          btn.appendChild(cnt);
          btn.onclick = (e) => { e.stopPropagation();
            toggleReaction(key, emoji); };
          reacDiv.appendChild(btn);
        }
        bubble.appendChild(reacDiv);
      }

      // Meta (time, edit)
      const meta = document.createElement('div');
      meta.className = 'meta';
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(data.time);
      meta.appendChild(time);
      if (data.edited) {
        const ed = document.createElement('span');
        ed.className = 'edited';
        ed.textContent = ' (معدل)';
        meta.appendChild(ed);
      }
      bubble.appendChild(meta);

      // Quick reactions on long press (simulate via tap hold)
      // سنضيف تفاعل سريع عند النقر المزدوج أو الضغط المطول لاحقاً (نكتفي بالتفاعلات العادية حالياً)

      row.appendChild(bubble);

      // زر حذف سريع (لنفسه أو مشرف)
      if (data.user === username || isAdminOrMod(username)) {
        const delBtn = document.createElement('button');
        delBtn.style.cssText =
          'background:transparent;border:none;color:var(--text-muted);font-size:14px;padding:2px 6px;margin-top:2px;align-self:flex-end;';
        delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        delBtn.onclick = (e) => { e.stopPropagation();
          deleteMessage(key); };
        row.appendChild(delBtn);
      }

      messagesList.insertBefore(row, messagesList.firstChild);

      if (!isScrolledUp) setTimeout(() => { messagesList.scrollTop = 0; }, 50);
    }

    // ============================================================
    //  SEND
    // ============================================================
    function send() {
      let text = msgInput.value.trim();
      if (!text && !editingKey) return;

      if (editingKey) {
        db.ref('messages/' + editingKey).update({ text, edited: true, time: Date.now() });
        editingKey = null;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
        return;
      }

      const media = extractMedia(text);
      db.ref('messages').push({
        user: username,
        text,
        mediaType: media ? media.type : null,
        mediaId: media ? media.id : null,
        time: Date.now(),
        reactions: {}
      });
      msgInput.value = '';
      db.ref('typing/' + encodeURIComponent(username)).remove();
      msgInput.focus();
      closeEmoji();
    }

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
        send(); }
    });

    // ============================================================
    //  DELETE
    // ============================================================
    function deleteMessage(key) {
      if (!key) return;
      db.ref('messages/' + key).once('value', snap => {
        const data = snap.val();
        if (!data) return;
        if (data.user === username || isAdminOrMod(username)) {
          if (confirm('حذف هذه الرسالة؟')) db.ref('messages/' + key).remove();
        }
      });
    }

    // ============================================================
    //  REACTIONS
    // ============================================================
    function toggleReaction(key, emoji) {
      if (!key || !username) return;
      const ref = db.ref('messages/' + key + '/reactions/' + emoji);
      ref.transaction(current => {
        if (!current || !Array.isArray(current)) return [username];
        const idx = current.indexOf(username);
        if (idx > -1) { current.splice(idx, 1); return current.length ? current : null; } else { current.push(
            username); return current; }
      });
    }

    // ============================================================
    //  TYPING
    // ============================================================
    function setupTyping() {
      const ref = db.ref('typing');
      msgInput.addEventListener('input', () => {
        if (!username) return;
        db.ref('typing/' + encodeURIComponent(username)).set(Date.now());
        clearTimeout(window.typingTimeout);
        window.typingTimeout = setTimeout(() => { db.ref('typing/' + encodeURIComponent(username)).remove(); }, 2000);
      });

      if (typingListener) ref.off('value', typingListener);
      typingListener = ref.on('value', snap => {
        const data = snap.val() || {};
        const now = Date.now();
        const active = Object.keys(data).filter(k =>
          decodeURIComponent(k) !== username && (now - data[k] < 3000)
        );
        if (active.length === 0) { typingIndicator.innerHTML = ''; return; }
        const names = active.map(k => escapeHtml(decodeURIComponent(k)));
        const msg = names.length === 1 ? names[0] + ' يكتب...' : names.join('، ') + ' يكتبون...';
        typingIndicator.innerHTML =
          `${msg} <span class="typing-dots"><span></span><span></span><span></span></span>`;
      });
    }

    // ============================================================
    //  ONLINE USERS
    // ============================================================
    function setupOnlineUsers() {
      const ref = db.ref('onlineUsers');
      if (onlineListener) ref.off('value', onlineListener);
      onlineListener = ref.on('value', snap => {
        const users = snap.val() || {};
        const names = Object.keys(users);
        onlineBadge.textContent = names.length;
        onlineCountText.textContent = names.length + ' متصل';

        let html = '';
        if (names.length === 0) html = '<div class="empty">لا يوجد متصلون</div>';
        else {
          names.forEach(k => {
            const u = users[k];
            const isYou = u.name === username;
            const userRole = ROLE_CONFIG[u.name]?.role || 'user';
            let roleLabel = '';
            if (userRole === 'admin') roleLabel = '<span class="badge admin">مدير</span>';
            else if (userRole === 'mod') roleLabel = '<span class="badge mod">مشرف</span>';
            html += `<div class="user-item ${isYou?'you':''}">
                        <span class="dot"></span>
                        <span class="name">${escapeHtml(u.name)}${isYou?' (أنت)':''}</span>
                        ${roleLabel}
                    </div>`;
          });
        }
        usersList.innerHTML = html;
      });
    }

    // ============================================================
    //  TOGGLE USERS SHEET
    // ============================================================
    function toggleUsers() {
      const isOpen = usersSheet.classList.contains('open');
      if (isOpen) closeUsers();
      else openUsers();
    }

    function openUsers() {
      usersSheet.classList.add('open');
      overlay.classList.add('show');
    }

    function closeUsers() {
      usersSheet.classList.remove('open');
      overlay.classList.remove('show');
    }

    // ============================================================
    //  EMOJI PICKER
    // ============================================================
    function buildEmojiPicker() {
      emojiPanel.innerHTML = '';
      EMOJIS.forEach(e => {
        const btn = document.createElement('button');
        btn.textContent = e;
        btn.type = 'button';
        btn.onclick = () => {
          const input = msgInput;
          const start = input.selectionStart,
            end = input.selectionEnd;
          const val = input.value;
          input.value = val.slice(0, start) + e + val.slice(end);
          input.focus();
          input.selectionStart = input.selectionEnd = start + e.length;
          closeEmoji();
          input.dispatchEvent(new Event('input'));
        };
        emojiPanel.appendChild(btn);
      });
    }

    function toggleEmoji() {
      emojiPanel.classList.toggle('show');
      emojiBtn.classList.toggle('active');
    }

    function closeEmoji() {
      emojiPanel.classList.remove('show');
      emojiBtn.classList.remove('active');
    }

    // ============================================================
    //  FILE
    // ============================================================
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      // نرسل اسم الملف كرسالة
      const text = `📎 ${file.name}`;
      db.ref('messages').push({
        user: username,
        text,
        mediaType: null,
        mediaId: null,
        time: Date.now(),
        reactions: {}
      });
      input.value = '';
    }

    // ============================================================
    //  SEARCH
    // ============================================================
    let searchActive = false;

    function toggleSearch() {
      searchActive = !searchActive;
      searchBar.style.display = searchActive ? 'block' : 'none';
      if (searchActive) { searchInput.value = '';
        clearHighlights();
        searchInput.focus(); } else { searchInput.value = '';
        clearHighlights(); }
    }

    function searchMessages(query) {
      clearHighlights();
      if (!query || query.length < 2) return;
      const items = messagesList.querySelectorAll('.bubble .text');
      items.forEach(el => {
        const txt = el.textContent || '';
        if (txt.toLowerCase().includes(query.toLowerCase())) {
          el.innerHTML = txt.replace(new RegExp('(' + escapeRegex(query) + ')', 'gi'),
            '<span class="highlight">$1</span>');
        }
      });
    }

    function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    function clearHighlights() {
      messagesList.querySelectorAll('.bubble .text').forEach(el => {
        el.innerHTML = el.textContent;
      });
    }

    // ============================================================
    //  LIGHTBOX
    // ============================================================
    function openLightbox(src) { lightbox.style.display = 'flex';
      lightboxImg.src = src; }

    function closeLightbox() { lightbox.style.display = 'none';
      lightboxImg.src = ''; }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); if (editingKey) cancelEdit(); }
    });

    // ============================================================
    //  YOUTUBE EMBED
    // ============================================================
    function embedYoutube(id) {
      const wrapper = document.createElement('div');
      wrapper.className = 'yt-wrap';
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      wrapper.appendChild(iframe);
      const activeEl = document.activeElement;
      const bubble = activeEl?.closest?.('.bubble');
      if (bubble) {
        const mediaWrap = bubble.querySelector('.media-wrap');
        if (mediaWrap) { mediaWrap.innerHTML = '';
          mediaWrap.appendChild(wrapper); } else {
          const newWrap = document.createElement('div');
          newWrap.className = 'media-wrap';
          newWrap.appendChild(wrapper);
          bubble.appendChild(newWrap);
        }
      }
    }

    // ============================================================
    //  SCROLL
    // ============================================================
    messagesList.addEventListener('scroll', () => {
      const st = messagesList.scrollTop,
        sh = messagesList.scrollHeight,
        ch = messagesList.clientHeight;
      isScrolledUp = st < sh - ch - 80;
      if (!isScrolledUp) { hasNew = false;
        newMsgBadge.classList.remove('show'); }
    });

    function scrollToBottom() { messagesList.scrollTop = 0;
      hasNew = false;
      newMsgBadge.classList.remove('show'); }

    // ============================================================
    //  LOGOUT
    // ============================================================
    function logout() {
      if (!username) return;
      if (confirm('تسجيل الخروج؟')) {
        db.ref('onlineUsers/' + encodeURIComponent(username)).remove();
        db.ref('typing/' + encodeURIComponent(username)).remove();
        if (msgListener) db.ref('messages').off('child_added', msgListener);
        if (typingListener) db.ref('typing').off('value', typingListener);
        if (onlineListener) db.ref('onlineUsers').off('value', onlineListener);
        if (connListener) db.ref('.info/connected').off('value', connListener);
        username = '';
        role = 'user';
        editingKey = null;
        isScrolledUp = false;
        hasNew = false;
        chatScreen.classList.remove('active');
        chatScreen.style.display = 'none';
        loginScreen.style.display = 'flex';
        messagesList.innerHTML = '<div class="loading-state" id="loadingState"><i class="fas fa-spinner"></i> جارٍ التحميل...</div>';
        usernameInput.value = '';
        msgInput.value = '';
        typingIndicator.innerHTML = '';
        newMsgBadge.classList.remove('show');
        closeEmoji();
        closeLightbox();
        closeUsers();
      }
    }

    // ============================================================
    //  VISIBILITY
    // ============================================================
    document.addEventListener('visibilitychange', () => {
      if (!username) return;
      if (document.hidden) {
        db.ref('onlineUsers/' + encodeURIComponent(username)).update({ lastActive: Date.now(), status: 'away' });
      } else {
        db.ref('onlineUsers/' + encodeURIComponent(username)).update({ status: 'online', lastActive: Date.now() });
      }
    });

    // ============================================================
    //  PREVENT ZOOM (iOS)
    // ============================================================
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - (document.lastTouch || 0) < 300) e.preventDefault();
      document.lastTouch = now;
    }, { passive: false });

    console.log('✨ أثير – شات جديد بالكامل، مصمم للجوال');
  </script>
</body>
</html>
