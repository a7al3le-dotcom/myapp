<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شات خاص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131c;
            --bg-card: #181825;
            --bg-hover: #1e1e2c;
            --text-primary: #f1f1f5;
            --text-secondary: #a1a1b8;
            --text-muted: #6b6b80;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --accent-glow: #6d28d9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-medium: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(124, 58, 237, 0.25);
            --glass: rgba(19, 19, 28, 0.8);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 30px rgba(124, 58, 237, 0.15);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 30px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            position: fixed; width: 100%;
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        body {
            display: flex; flex-direction: column;
            background-image:
                radial-gradient(ellipse at 15% 30%, rgba(124, 58, 237, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 60%, rgba(59, 130, 246, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.02) 0%, transparent 60%);
        }

        .top-glow {
            position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 10000;
            background: linear-gradient(90deg, transparent, var(--accent), var(--info), var(--success), var(--accent), transparent);
            background-size: 200% 100%;
            animation: glowFlow 5s ease infinite;
        }
        @keyframes glowFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        #chat-container { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }

        /* ============ منطقة الرسائل ============ */
        #messages {
            flex: 1; overflow-y: auto; padding: 65px 16px 16px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            display: flex; flex-direction: column; gap: 2px;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: rgba(124, 58, 237, 0.2); border-radius: 10px; }
        #messages::-webkit-scrollbar-thumb:hover { background: rgba(124, 58, 237, 0.4); }

        /* ============ رسالة ============ */
        .msg-row {
            display: flex; gap: 12px; padding: 10px 14px; border-radius: var(--radius-md);
            transition: background var(--transition); position: relative;
            animation: rowIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .msg-row:hover { background: rgba(124, 58, 237, 0.03); }
        @keyframes rowIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 15px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            position: relative;
        }
        .msg-avatar::after {
            content: ''; position: absolute; bottom: -2px; right: -2px;
            width: 10px; height: 10px; background: var(--success);
            border-radius: 50%; border: 2px solid var(--bg-primary);
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }

        .msg-body { flex: 1; min-width: 0; }
        .msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .msg-name { font-weight: 700; font-size: 13px; color: var(--text-primary); }
        .msg-time {
            font-size: 10px; color: var(--text-muted);
            padding: 1px 8px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
        }
        .msg-text {
            font-size: 14px; line-height: 1.65; word-break: break-word;
            direction: rtl; text-align: right; color: var(--text-primary);
            opacity: 0.9;
        }

        /* رسالة نظام */
        .sys-badge {
            text-align: center; font-size: 11px; margin: 10px auto;
            padding: 6px 18px; border-radius: 20px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(139, 92, 246, 0.04));
            border: 1px solid rgba(124, 58, 237, 0.2);
            color: var(--accent-light); max-width: fit-content;
            backdrop-filter: blur(8px);
            animation: badgeIn 0.4s ease, badgeOut 0.4s ease 5s forwards;
        }
        @keyframes badgeIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes badgeOut { to { opacity: 0; transform: translateY(-8px); } }

        /* ============ شريط الإدخال ============ */
        #inputArea {
            display: flex; gap: 10px; padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: rgba(10, 10, 15, 0.92); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border-subtle); z-index: 10;
        }
        #messageInput {
            flex: 1; font-size: 14px; height: 48px; padding: 0 20px;
            border-radius: 24px; background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--border-medium); color: var(--text-primary);
            font-family: 'Tajawal', sans-serif; transition: all var(--transition);
            outline: none;
        }
        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.06), 0 0 20px rgba(124, 58, 237, 0.08);
        }
        #messageInput::placeholder { color: rgba(255, 255, 255, 0.2); }

        #sendBtn {
            height: 48px; padding: 0 28px; border-radius: 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            color: #fff; font-weight: 700; cursor: pointer; border: none;
            font-family: 'Tajawal', sans-serif; font-size: 14px;
            transition: all var(--transition); white-space: nowrap;
            box-shadow: 0 4px 18px rgba(124, 58, 237, 0.35);
            position: relative; overflow: hidden;
        }
        #sendBtn::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: translateX(-100%); transition: transform 0.5s ease;
        }
        #sendBtn:hover::after { transform: translateX(100%); }
        #sendBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124, 58, 237, 0.5); }
        #sendBtn:active { transform: translateY(0) scale(0.97); }

        /* ============ أزرار علوية ============ */
        #topButtons {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            right: calc(10px + env(safe-area-inset-right));
            display: flex; gap: 8px; z-index: 1000;
        }
        .pill-btn {
            height: 42px; padding: 0 16px;
            background: var(--glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 21px; cursor: pointer;
            border: 1px solid var(--border-medium); color: #fff;
            font-size: 13px; display: flex; align-items: center; gap: 8px;
            transition: all var(--transition);
            font-family: 'Tajawal', sans-serif; font-weight: 500;
        }
        .pill-btn:hover {
            background: rgba(124, 58, 237, 0.1); border-color: var(--border-glow);
            box-shadow: var(--shadow-glow); transform: translateY(-1px);
        }
        .pill-btn .icon { font-size: 16px; }
        .count-badge {
            background: var(--accent); color: #fff;
            font-size: 10px; font-weight: 700;
            min-width: 20px; height: 20px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
        }

        /* ============ مشغل الفيديو المتطور ============ */
        #pinnedVideoPlayer {
            position: fixed;
            top: calc(70px + env(safe-area-inset-top));
            left: 16px;
            width: 420px; max-width: calc(100vw - 32px); min-width: 290px;
            background: #08080f; border-radius: var(--radius-lg);
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.85), 0 0 0 1px rgba(124, 58, 237, 0.12);
            z-index: 998; display: none; flex-direction: column;
            overflow: visible; transition: none;
        }

        .player-topbar {
            background: rgba(8, 8, 15, 0.98); padding: 8px 14px;
            cursor: move; touch-action: none;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none; font-size: 11px; color: #999;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.08);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0; z-index: 5;
        }
        .player-dots { display: flex; gap: 6px; }
        .player-dots i { width: 8px; height: 8px; border-radius: 50%; display: block; transition: transform var(--transition); }
        .player-dots i:nth-child(1) { background: var(--danger); }
        .player-dots i:nth-child(2) { background: var(--warning); }
        .player-dots i:nth-child(3) { background: var(--success); }
        .player-dots i:hover { transform: scale(1.4); }

        .player-actions { display: flex; align-items: center; gap: 6px; }
        .player-tool {
            background: rgba(255, 255, 255, 0.03); border: none; color: #aaa;
            width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
            font-size: 12px; display: flex; align-items: center; justify-content: center;
            transition: all var(--transition);
        }
        .player-tool:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .player-tool.pip:hover { background: rgba(59, 130, 246, 0.2); color: var(--info); }

        .player-close {
            background: rgba(239, 68, 68, 0.1); border: none; color: var(--danger);
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            font-size: 12px; display: flex; align-items: center; justify-content: center;
            transition: all var(--transition); flex-shrink: 0;
        }
        .player-close:hover { background: var(--danger); color: #fff; transform: rotate(90deg); }

        .player-stage {
            position: relative; background: #000;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg); overflow: hidden;
            min-height: 180px;
        }
        .player-grip {
            position: absolute; width: 14px; height: 14px;
            bottom: 4px; right: 4px; cursor: nwse-resize; z-index: 20;
            opacity: 0; transition: opacity 0.2s;
            background: rgba(255, 255, 255, 0.2); border-radius: 3px;
        }
        #pinnedVideoPlayer:hover .player-grip { opacity: 1; }

        .clip-strip {
            display: flex; gap: 3px; padding: 5px; background: rgba(0, 0, 0, 0.9);
            overflow-x: auto;
        }
        .clip-chip {
            padding: 5px 14px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px;
            color: #888; cursor: pointer; font-size: 10px;
            font-family: 'Tajawal', sans-serif; white-space: nowrap;
            transition: all var(--transition);
        }
        .clip-chip.active {
            background: var(--accent); color: #fff; font-weight: 700;
            border-color: var(--accent);
            box-shadow: 0 2px 10px rgba(124, 58, 237, 0.4);
        }

        /* ============ المحرك الداخلي ============ */
        .vp-core { position: relative; width: 100%; background: #000; display: flex; flex-direction: column; }
        .vp-viewport { position: relative; width: 100%; aspect-ratio: 16/9; background: #050508; cursor: pointer; }
        .vp-viewport video { width: 100%; height: 100%; display: block; background: #000; object-fit: contain; }
        .vp-spinner-wrap {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.8); color: #fff; font-size: 12px;
            pointer-events: none; z-index: 2;
        }
        .vp-spinner {
            width: 30px; height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--accent); border-radius: 50%;
            animation: vpSpin 0.7s linear infinite; margin-bottom: 10px;
        }
        @keyframes vpSpin { to { transform: rotate(360deg); } }

        .vp-error-panel {
            position: absolute; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.95); color: #fff; font-size: 12px;
            z-index: 3; text-align: center; padding: 20px;
        }
        .vp-error-panel .err-sym { font-size: 30px; margin-bottom: 8px; }
        .vp-error-panel button {
            margin-top: 12px; padding: 8px 22px; background: var(--accent);
            color: #fff; border: none; border-radius: 18px; font-weight: 700;
            cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all var(--transition);
        }
        .vp-error-panel button:hover { transform: scale(1.04); box-shadow: 0 4px 18px rgba(124, 58, 237, 0.5); }

        /* لوحة التحكم */
        .vp-dashboard {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.2) 70%, transparent 100%);
            padding: 36px 12px 10px; opacity: 0;
            transition: opacity 0.35s ease; pointer-events: none; z-index: 4;
        }
        .vp-dashboard.active { opacity: 1; pointer-events: auto; }

        .vp-track {
            position: relative; width: 100%; height: 5px;
            background: rgba(255, 255, 255, 0.08); border-radius: 3px;
            margin-bottom: 10px; cursor: pointer;
            transition: height 0.2s;
        }
        .vp-track:hover { height: 7px; }
        .vp-track-buf {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(255, 255, 255, 0.14); border-radius: 3px;
        }
        .vp-track-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 3px; z-index: 2; transition: width 0.08s linear;
        }
        .vp-track-fill::after {
            content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
            width: 10px; height: 10px; background: var(--accent-light);
            border-radius: 50%; opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.7);
        }
        .vp-track:hover .vp-track-fill::after { opacity: 1; }
        .vp-track-seek {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 3; margin: 0;
        }

        .vp-ctrl-row {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        }
        .vp-ctrl-row button {
            background: none; border: none; color: #fff; font-size: 16px;
            cursor: pointer; padding: 5px 7px; opacity: 0.82;
            transition: all var(--transition); display: flex;
            align-items: center; justify-content: center;
            min-width: 30px; height: 30px; border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
        }
        .vp-ctrl-row button:hover { opacity: 1; background: rgba(255, 255, 255, 0.07); }
        .vp-timecode {
            font-size: 11px; color: #ccc; min-width: 90px; direction: ltr;
            font-family: 'SF Mono', 'Cascadia Code', monospace;
        }
        .vp-audio-group { display: flex; align-items: center; gap: 4px; }
        .vp-audio-slider {
            width: 48px; height: 3px; -webkit-appearance: none; appearance: none;
            background: rgba(255, 255, 255, 0.16); border-radius: 2px;
            outline: none; cursor: pointer; transition: width 0.2s;
        }
        .vp-audio-group:hover .vp-audio-slider { width: 65px; }
        .vp-audio-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 11px; height: 11px;
            border-radius: 50%; background: var(--accent-light); cursor: pointer;
        }
        .vp-dropdown { position: relative; }
        .vp-dropdown-menu {
            position: absolute; bottom: 36px; right: 0;
            background: rgba(15, 15, 25, 0.98); backdrop-filter: blur(20px);
            border-radius: 10px; padding: 5px 0; min-width: 90px; display: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); z-index: 25;
            animation: dropIn 0.18s ease;
        }
        @keyframes dropIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .vp-dropdown-menu button {
            display: block; background: none; border: none; color: #bbb;
            padding: 7px 18px; width: 100%; text-align: right;
            font-size: 12px; cursor: pointer; font-family: 'Tajawal', sans-serif;
            transition: all var(--transition); white-space: nowrap;
        }
        .vp-dropdown-menu button:hover { background: rgba(255, 255, 255, 0.04); color: #fff; }
        .vp-dropdown-menu button.sel {
            color: var(--accent-light); font-weight: 700;
            background: rgba(124, 58, 237, 0.1);
        }
        .vp-fs-btn { margin-right: auto; font-size: 18px !important; }

        /* ============ نوافذ منبثقة ============ */
        #usersBox, #setVideoModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-card); padding: 24px; border-radius: var(--radius-xl);
            z-index: 1003; display: none; max-height: 80vh; width: 92%; max-width: 420px;
            overflow-y: auto; border: 1px solid var(--border-medium);
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.94); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .modal-title { text-align: center; margin-bottom: 18px; font-size: 18px; font-weight: 700; color: var(--accent-light); }
        .modal-input {
            width: 100%; padding: 12px 16px; border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.02); color: #fff; font-size: 14px;
            margin-bottom: 12px; border: 2px solid var(--border-medium);
            font-family: 'Tajawal', sans-serif; transition: all var(--transition); outline: none;
        }
        .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.06); }
        .modal-btn {
            width: 100%; padding: 12px; border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            font-weight: 700; border: none; cursor: pointer; color: #fff;
            font-family: 'Tajawal', sans-serif; font-size: 15px;
            transition: all var(--transition);
        }
        .modal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4); }

        .user-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: var(--radius-sm);
            transition: all var(--transition);
        }
        .user-row:hover { background: rgba(255, 255, 255, 0.02); }
        .live-dot {
            width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
        }
        .live-dot.on { background: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.6); animation: pulseDot 2s infinite; }
        .live-dot.idle { background: var(--warning); box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
        .live-dot.off { background: #444; }
        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 6px rgba(16, 185, 129, 0.3); }
            50% { box-shadow: 0 0 16px rgba(16, 185, 129, 0.8); }
        }

        #overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
            z-index: 1001; display: none;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }

        /* ============ مؤشر الكتابة ============ */
        #typingWrapper { display: none; padding: 5px 20px; color: var(--text-secondary); font-size: 11px; }
        #typingIndicator { display: flex; align-items: center; gap: 6px; }
        .typing-wave { display: inline-flex; gap: 2px; margin-right: 4px; }
        .typing-wave b {
            width: 4px; height: 4px; background: var(--accent-light); border-radius: 50%;
            animation: waveBounce 1.4s infinite;
        }
        .typing-wave b:nth-child(2) { animation-delay: 0.2s; }
        .typing-wave b:nth-child(3) { animation-delay: 0.4s; }
        @keyframes waveBounce {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-7px); }
        }

        /* ============ Toast ============ */
        .toast-stack {
            position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
            z-index: 10001; display: flex; flex-direction: column; gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: rgba(24, 24, 37, 0.96); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-medium); border-radius: 22px;
            padding: 10px 22px; color: #fff; font-size: 12px;
            pointer-events: auto;
            animation: toastIn 0.4s ease, toastOut 0.4s ease 3.2s forwards;
            box-shadow: var(--shadow-sm); white-space: nowrap; font-weight: 500;
        }
        .toast.ok { border-left: 3px solid var(--success); }
        .toast.err { border-left: 3px solid var(--danger); }
        .toast.warn { border-left: 3px solid var(--warning); }
        .toast.msg { border-left: 3px solid var(--info); }

            function embedTw(stage,tid){stage.innerHTML=`<iframe src="https://platform.twitter.com/embed/Tweet.html?id=${tid}&theme=dark&lang=ar" style="width:100%;height:100%;min-height:320px;border:none;" allowfullscreen></iframe>`;if(!window.twttr){const s=document.createElement('script');s.src='https://platform.twitter.com/widgets.js';s.async=true;document.head.appendChild(s);}}

            function dragElement(el,bar){let sx,sy,sl,st,on=false;const gp=e=>e.touches?.[0]||e;bar.addEventListener('mousedown',e=>{if(e.target.closest('.player-close')||e.target.closest('.player-tool'))return;e.preventDefault();on=true;sx=e.clientX;sy=e.clientY;sl=el.offsetLeft;st=el.offsetTop;el.style.transition='none';el.style.right='auto';el.style.bottom='auto';el.style.left=sl+'px';el.style.top=st+'px';document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});bar.addEventListener('touchstart',e=>{if(e.target.closest('.player-close')||e.target.closest('.player-tool'))return;e.preventDefault();on=true;const p=gp(e);sx=p.clientX;sy=p.clientY;sl=el.offsetLeft;st=el.offsetTop;el.style.transition='none';el.style.right='auto';el.style.bottom='auto';el.style.left=sl+'px';el.style.top=st+'px';document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);},{passive:false});function mv(e){if(!on)return;e.preventDefault();const p=gp(e);let nl=sl+p.clientX-sx,nt=st+p.clientY-sy;nl=Math.max(0,Math.min(nl,window.innerWidth-el.offsetWidth));nt=Math.max(0,Math.min(nt,window.innerHeight-el.offsetHeight));el.style.left=nl+'px';el.style.top=nt+'px';}function up(){on=false;el.style.transition='';document.removeEventListener('mousemove',mv);document.removeEventListener('touchmove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchend',up);}}
            function resizeElement(el,grip){let sw,sh,sx,sy,on=false;const gp=e=>e.touches?.[0]||e;grip.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();on=true;sw=el.offsetWidth;sh=el.offsetHeight;sx=e.clientX;sy=e.clientY;el.style.transition='none';document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);});grip.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();on=true;sw=el.offsetWidth;sh=el.offsetHeight;const p=gp(e);sx=p.clientX;sy=p.clientY;el.style.transition='none';document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);},{passive:false});function mv(e){if(!on)return;e.preventDefault();const p=gp(e);el.style.width=Math.max(290,sw+p.clientX-sx)+'px';el.style.height=Math.max(170,sh+p.clientY-sy)+'px';}function up(){on=false;el.style.transition='';document.removeEventListener('mousemove',mv);document.removeEventListener('touchmove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchend',up);}}

            function dismissModals(){userModal.style.display='none';videoModal.style.display='none';shade.style.display='none';}
            function renderUsers(users){const list=$('usersList');list.innerHTML='';const now=Date.now()+serverTimeOffset;if(!users||!Object.keys(users).length){list.innerHTML='<div style="text-align:center;color:#666;padding:20px;">لا أحد هنا</div>';return;}for(let u in users){const d=now-(users[u].lastActive||0);let s='off';if(d<30000)s='on';else if(d<60000)s='idle';const row=document.createElement('div');row.className='user-row';row.innerHTML=`<span class="live-dot ${s}"></span><span>${esc(u)}</span>${u===username?'<span style="color:var(--accent-light);font-size:10px;">· أنت</span>':''}`;list.appendChild(row);}}

            function launchChat(){
                $('loginScreen').style.display='none';$('chat-container').style.display='flex';
                db.ref('.info/serverTimeOffset').on('value',s=>serverTimeOffset=s.val()||0);
                userRef=db.ref('online/'+username);messagesRef=db.ref('messages');onlineRef=db.ref('online');pinnedVideoRef=db.ref('pinned_video');
                userRef.set({lastActive:firebase.database.ServerValue.TIMESTAMP});userRef.onDisconnect().remove();
                setInterval(()=>userRef.update({lastActive:firebase.database.ServerValue.TIMESTAMP}),30000);
                db.ref('.info/connected').on('value',s=>toast(s.val()?'✓ متصل':'✗ انقطع الاتصال',s.val()?'ok':'err'));
                setInterval(()=>{const now=Date.now()+serverTimeOffset;onlineRef.once('value',s=>s.forEach(c=>{if(now-(c.val().lastActive||0)>120000)c.ref.remove();}));},60000);
                $('inputArea').onsubmit=e=>{e.preventDefault();const txt=clean(msgField.value.trim());if(!txt||!guard.check())return;messagesRef.push({user:username,text:txt,timestamp:firebase.database.ServerValue.TIMESTAMP}).catch(()=>toast('فشل الإرسال','err'));msgField.value='';msgField.focus();if(typingRef)typingRef.child(username).remove();clearTimeout(typingTimer);};
                messagesRef.limitToLast(MSG_CAP).on('child_added',s=>{const v=s.val();if(v?.user&&v?.text)renderMsg(s.key,{user:v.user,text:v.text,timestamp:v.timestamp||Date.now()+serverTimeOffset});});
                messagesRef.on('child_removed',s=>{const el=document.getElementById(`m-${s.key}`);if(el)el.remove();});
                onlineRef.on('value',s=>{$('count').innerText=s.numChildren();renderUsers(s.val()||{});});
                $('onlineListBtn').onclick=()=>{userModal.style.display='block';shade.style.display='block';};
                $('setVideoBtn').onclick=()=>{videoModal.style.display='block';shade.style.display='block';};
                shade.onclick=dismissModals;document.addEventListener('keydown',e=>{if(e.key==='Escape')dismissModals();});
                $('submitVideoUrlBtn').onclick=async()=>{const raw=videoField.value.trim();if(!raw){toast('أدخل رابطاً','warn');return;}try{const u=extractUrl(raw)||raw;const m=classify(u);if(m.kind==='unknown'){toast('رابط غير مدعوم','warn');return;}await pinnedVideoRef.set({...m,setBy:username});videoField.value='';dismissModals();toast('✓ تم التشغيل','ok');}catch(e){toast('فشل','err');}};
                pinnedVideoRef.on('value',async s=>{
                    if(activePlayer){activeListeners.forEach(({el,ev,h})=>el.removeEventListener(ev,h));activeListeners=[];if(activePlayer.hls){activePlayer.hls.destroy();activePlayer.hls=null;}if(activePlayer.video){activePlayer.video.pause();activePlayer.video.src='';}activePlayer=null;}
                    const data=s.val();if(!data){videoDock.style.display='none';videoDock.querySelector('.player-stage').innerHTML='';return;}
                    videoDock.innerHTML=`<div class="player-topbar"><div class="player-dots"><i></i><i></i><i></i></div><span>مشغل · ${esc(data.setBy||'')}</span><div class="player-actions"><button class="player-tool" title="لقطة">📷</button><button class="player-tool pip" title="صورة مصغرة">⿻</button><button class="player-close">✕</button></div></div><div class="player-stage"></div><div class="player-grip"></div>`;
                    videoDock.style.display='flex';
                    videoDock.querySelector('.player-close').onclick=e=>{e.stopPropagation();pinnedVideoRef.remove();videoDock.style.display='none';};
                    const ssBtn=videoDock.querySelector('.player-tool:not(.pip)');
                    const pipBtn=videoDock.querySelector('.player-tool.pip');
                    ssBtn.onclick=e=>{e.stopPropagation();if(activePlayer?.video){try{const c=document.createElement('canvas');c.width=activePlayer.video.videoWidth;c.height=activePlayer.video.videoHeight;c.getContext('2d').drawImage(activePlayer.video,0,0);const a=document.createElement('a');a.download=`frame-${Date.now()}.png`;a.href=c.toDataURL();a.click();toast('📷 تم','ok');}catch(ex){toast('فشل','err');}}};
                    pipBtn.onclick=e=>{e.stopPropagation();if(activePlayer?.video&&document.pictureInPictureEnabled){if(document.pictureInPictureElement){document.exitPictureInPicture();}else{activePlayer.video.requestPictureInPicture().catch(()=>{});}}};
                    dragElement(videoDock,videoDock.querySelector('.player-topbar'));
                    resizeElement(videoDock,videoDock.querySelector('.player-grip'));
                    const stage=videoDock.querySelector('.player-stage');
                    try{if(data.kind==='youtube')stage.innerHTML=`<iframe src="https://www.youtube.com/embed/${data.id}?autoplay=1&rel=0" style="width:100%;aspect-ratio:16/9;border:none;" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen></iframe>`;else if(data.kind==='hls'||data.kind==='direct')buildPlayer(stage,data.url,data.kind==='hls'?'application/x-mpegURL':'video/mp4');else if(data.kind==='twitter'){const vids=await fetchTwMedia(data.id);if(vids.length){buildPlayer(stage,vids[0].url,vids[0].mime);if(vids.length>1){const bar=document.createElement('div');bar.className='clip-strip';vids.forEach((v,i)=>{const btn=document.createElement('button');btn.className='clip-chip'+(i===0?' active':'');btn.textContent=`مقطع ${i+1}`;btn.onclick=()=>{stage.innerHTML='';buildPlayer(stage,v.url,v.mime);bar.querySelectorAll('.clip-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};bar.appendChild(btn);});stage.appendChild(bar);}}else embedTw(stage,data.id);}toast(`🎬 ${esc(data.setBy||'')} شغّل`,'msg');}catch(e){toast('فشل التشغيل','err');}
                });
                initTyping();msgField.focus();
            }

            function tryLogin(){const raw=usernameInput.value.trim();if(!raw)return toast('أدخل اسماً','warn');if(/[.#$[\]/]/.test(raw))return toast('أحرف ممنوعة','warn');if(raw.length<2)return toast('الاسم قصير','warn');if(raw.length>15)return toast('الاسم طويل','warn');username=raw;launchChat();}
            $('loginBtn').onclick=tryLogin;usernameInput.onkeypress=e=>{if(e.key==='Enter')tryLogin();};
            window.addEventListener('beforeunload',()=>{if(activePlayer?.hls)activePlayer.hls.destroy();if(userRef)userRef.remove();if(typingRef&&username)typingRef.child(username).remove();});
        })();
    </script>
</body>
