<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#1e1f22">

<title>شات خاص</title>

<style>
*{box-sizing:border-box;font-family:Arial}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#1e1f22;
  color:#fff;
}

/* login */
#login{
  display:flex;
  height:100%;
  justify-content:center;
  align-items:center;
}

/* app */
#app{
  display:none;
  height:100%;
  flex-direction:column;
}

/* header */
header{
  padding:10px;
  background:#2b2d31;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* messages */
#messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

/* msg */
.msg{
  padding:6px 0;
  border-bottom:1px solid #2a2b2f;
}

.name{color:#5865f2;font-weight:bold}
.text{color:#ddd}

/* footer */
footer{
  display:flex;
  background:#2b2d31;
  padding:8px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  background:#1e1f22;
  color:#fff;
  outline:none;
}

button{
  padding:10px;
  border:none;
  background:#5865f2;
  color:#fff;
}

/* typing */
#typing{
  font-size:12px;
  color:#aaa;
  padding:5px 10px;
  height:20px;
}
</style>
</head>

<body>

<!-- login -->
<div id="login">
  <div>
    <h3>ادخل اسمك</h3>
    <input id="name">
    <button onclick="enter()">دخول</button>
  </div>
</div>

<!-- app -->
<div id="app">

<header>
  💬 Chat
</header>

<div id="messages"></div>
<div id="typing"></div>

<footer>
  <input id="msg" placeholder="اكتب رسالة...">
  <button onclick="send()">إرسال</button>
</footer>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyB1AsEHXP05N8M66jYPusheLaE60q_Jw",
  authDomain:"mychat-2d881.firebaseapp.com",
  databaseURL:"https://mychat-2d881-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let name="";
let typingTimer;

/* دخول */
function enter(){
  name=document.getElementById("name").value.trim();
  if(!name) return;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";

  const ref=db.ref("online/"+name);
  ref.set(true);
  ref.onDisconnect().remove();

  loadMessages();
  typingListener();
  bindTyping();
  bindEnter();
}

/* إرسال */
function send(){
  let msg=document.getElementById("msg").value.trim();
  if(!msg) return;

  db.ref("messages").push({
    name,
    text:msg,
    time:Date.now()
  });

  document.getElementById("msg").value="";

  db.ref("typing/"+name).remove();
}

/* Enter للإرسال */
function bindEnter(){
  document.getElementById("msg").addEventListener("keydown",e=>{
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });
}

/* كتابة */
function bindTyping(){
  const input=document.getElementById("msg");

  input.addEventListener("input",()=>{
    db.ref("typing/"+name).set(Date.now());

    clearTimeout(typingTimer);

    typingTimer=setTimeout(()=>{
      db.ref("typing/"+name).remove();
    },1200);
  });
}

/* رسائل */
function loadMessages(){
  const box=document.getElementById("messages");

  db.ref("messages").limitToLast(50).on("child_added",snap=>{
    const m=snap.val();

    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <span class="name">${m.name}:</span>
      <span class="text">${m.text}</span>
    `;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}

/* typing (الإصلاح الحقيقي) */
function typingListener(){
  db.ref("typing").on("value",snap=>{
    let users=[];
    const now=Date.now();

    snap.forEach(c=>{
      const t=c.val();

      // تجاهل القديم
      if(now - t < 3000 && c.key !== name){
        users.push(c.key);
      }
    });

    document.getElementById("typing").textContent =
      users.length ? "✍️ " + users.join(", ") + " يكتب..." : "";
  });
}
</script>

</body>
</html>
