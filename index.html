<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>شات خاص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-youtube@3.0.1/dist/Youtube.min.js"></script>
    <!-- hls.js لدعم M3U8 على Chrome/Android/Firefox -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>

    <style>
        :root {
            --bg-main: #05060a;
            --bg-grad-1: #151624;
            --bg-grad-2: #020307;
            --bg-section: #0d0f18;
            --bg-elevated: #11121b;
            --text-main: #ffffff;
            --text-muted: #a7aec4;
            --accent: #ffd54a;
            --accent-soft: #ffe788;
            --border-soft: #262839;
            --danger: #e53935;
        }

        html,
        body {
            height: 100%;
            height: -webkit-fill-available;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background:
                radial-gradient(circle at top, var(--bg-grad-1) 0%, rgba(5, 6, 10, 0.95) 50%, var(--bg-grad-2) 100%),
                radial-gradient(circle at 120% 0%, rgba(255, 213, 74, 0.08) 0%, transparent 55%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }

        /* رسائل الشات */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.7) 45%, rgba(0, 0, 0, 0.9) 100%);
            scroll-behavior: smooth;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .msg {
            margin: 8px 0;
            display: flex;
            gap: 10px;
            align-items: center;
            direction: ltr;
            text-align: left;
            font-size: 15px;
            line-height: 1.4;
            color: var(--text-main);
        }

        .sys {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 10px auto;
            font-style: italic;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: opacity 0.5s;
        }

        .user {
            font-weight: bold;
            color: var(--accent);
        }

        .time {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 32px;
            text-align: right;
        }

        /* منطقة الإدخال */
        #inputArea {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.7));
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        #messageInput {
            flex: 1;
            font-size: 16px;
            /* 16px+ يمنع التكبير التلقائي على iOS */
            height: 44px;
            padding: 0 15px;
            border-radius: 999px;
            font-family: 'Tajawal', sans-serif;
            background: rgba(10, 11, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.7),
                0 18px 45px rgba(0, 0, 0, 0.75);
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }

        #messageInput::placeholder {
            color: #6f7487;
        }

        #messageInput:focus {
            outline: none;
            border-color: var(--accent-soft);
            box-shadow:
                0 0 0 1px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 213, 74, 0.35),
                0 20px 50px rgba(0, 0, 0, 0.9);
        }

        /* زر الإرسال - ستايل زر أساسي */
        #sendBtn {
            height: 44px;
            padding: 0 22px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            color: #000;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.6);
            transition:
                transform 0.16s ease,
                box-shadow 0.16s ease,
                filter 0.16s ease;
            white-space: nowrap;
        }

        #sendBtn:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.75);
        }

        #sendBtn:active {
            transform: translateY(0);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.8);
        }

        /* أزرار أعلى الشاشة */
        #topButtons {
            position: fixed;
            top: 10px;
            top: calc(10px + env(safe-area-inset-top));
            right: 10px;
            right: calc(10px + env(safe-area-inset-right));
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .btn {
            padding: 6px 12px;
            background: rgba(10, 11, 20, 0.95);
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            display: flex;
            align-items: center;
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.65);
            transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
        }

        .btn:hover {
            background: rgba(25, 27, 45, 0.98);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
        }

        .btn .count-text {
            font-size: 13px;
            margin-right: 4px;
            color: var(--accent-soft);
            font-weight: 600;
        }

        /* #onlineList - غير مستخدم في HTML حالياً */

        /* مودالات */
        #usersBox,
        #setVideoModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at top, #181a28 0%, #05060b 55%, #020307 100%);
            padding: 20px 22px;
            border-radius: 18px;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.85);
            z-index: 1003;
            display: none;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-main);
        }

        #usersBox h4,
        #setVideoModal h4 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
        }

        #usersList {
            max-height: 240px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: var(--text-main);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .status-green {
            background-color: #2ecc71;
        }

        .status-yellow {
            background-color: #f1c40f;
        }

        .status-gray {
            background-color: #7f8c8d;
        }

        #videoUrlInput {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(5, 6, 12, 0.95);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            font-size: 16px;
            /* 16px+ يمنع التكبير التلقائي على iOS */
            box-sizing: border-box;
            margin-bottom: 10px;
            -webkit-appearance: none;
            appearance: none;
        }

        #videoUrlInput::placeholder {
            color: #747a90;
        }

        #submitVideoUrlBtn {
            padding: 8px 18px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #ffe178);
            color: #000;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
        }

        #submitVideoUrlBtn:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
            box-shadow: 0 14px 38px rgba(0, 0, 0, 0.85);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            display: none;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        .delete-btn {
            display: none;
        }

        /* شاشة تسجيل الدخول */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background:
                radial-gradient(circle at top, #181a28 0%, rgba(5, 6, 10, 0.96) 50%, #020307 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }

        #loginBox {
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.02) 0%, rgba(5, 6, 12, 0.98) 55%, #05060b 100%);
            padding: 26px 26px 22px;
            border-radius: 22px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-main);
        }

        #loginBox h2 {
            margin: 0 0 14px;
            font-size: 20px;
        }

        #usernameInput {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 999px;
            font-size: 16px;
            /* 16px+ يمنع التكبير التلقائي على iOS */
            text-align: center;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(3, 4, 10, 0.96);
            color: var(--text-main);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.85);
            -webkit-appearance: none;
            appearance: none;
        }

        #usernameInput::placeholder {
            color: #868ba0;
        }

        #loginBtn {
            background: linear-gradient(135deg, var(--accent), #ffe178);
            color: #000;
            border: none;
            padding: 10px 26px;
            border-radius: 999px;
            font-size: 15px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            margin-top: 8px;
            font-weight: 600;
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.9);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        #loginBtn:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.95);
        }

        #loginBtn:active {
            transform: translateY(0);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.9);
        }

        /* فيديو مثبت */
        #pinnedVideoPlayer {
            position: fixed;
            top: 60px;
            top: calc(60px + env(safe-area-inset-top));
            left: 10px;
            width: clamp(280px, 92vw, 480px);
            background: #000;
            border-radius: 16px;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.9);
            z-index: 998;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .video-header {
            background: linear-gradient(to right, #151623, #090a11);
            color: #fff;
            padding: 6px 10px;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            touch-action: none;
            font-size: 13px;
        }

        .video-body {
            width: 100%;
            background: #000;
            flex-grow: 1;
            min-height: 320px;
        }

        .video-js .vjs-tech {
            object-fit: contain;
        }

        .close-pinned-video {
            background: var(--danger);
            border: 1px solid #c62828;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            cursor: pointer;
            font-size: 14px;
            line-height: 20px;
            text-align: center;
        }

        .resize-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            bottom: 0;
            right: 0;
            cursor: nwse-resize;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.24), transparent);
        }

        /* ثيم نتفلكس للفيديو */
        .video-js.vjs-netflix-theme {
            background-color: #000;
        }

        .vjs-netflix-theme .vjs-control-bar {
            height: 6em;
            background: none;
            background-image: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0) 100%);
        }

        .vjs-netflix-theme .vjs-big-play-button {
            display: none !important;
        }

        .vjs-netflix-theme .vjs-progress-control {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            top: -3em;
            height: 2.5em;
        }

        .vjs-netflix-theme .vjs-progress-holder {
            height: 0.3em;
            margin: 1.1em 0;
        }

        .vjs-netflix-theme .vjs-play-progress,
        .vjs-netflix-theme .vjs-load-progress {
            height: 100%;
        }

        .vjs-netflix-theme .vjs-play-progress:before {
            display: none;
        }

        .vjs-netflix-theme .vjs-play-progress {
            background-color: #e50914;
        }

        .vjs-netflix-theme .vjs-load-progress {
            background: rgba(255, 255, 255, 0.4);
        }

        .vjs-netflix-theme .vjs-time-control {
            line-height: 5em;
            padding: 0 1em;
        }

        .vjs-netflix-theme .vjs-remaining-time {
            line-height: 5em;
        }

        .vjs-netflix-theme .vjs-button>.vjs-icon-placeholder:before {
            font-size: 2.2em;
            line-height: 2.2;
        }

        .vjs-netflix-theme .vjs-volume-panel,
        .vjs-netflix-theme .vjs-fullscreen-control {
            margin-right: 1em;
        }

        .video-js.vjs-netflix-theme.vjs-has-started.vjs-user-inactive .vjs-control-bar {
            opacity: 0;
            visibility: hidden;
        }

        .video-selector-bar {
            display: flex;
            gap: 6px;
            padding: 8px;
            background: #111;
            overflow-x: auto;
            border-top: 1px solid #333;
            max-height: 60px;
        }

        .video-selector-btn {
            flex-shrink: 0;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.2s;
        }

        .video-selector-btn:hover {
            background: #333;
            border-color: #666;
        }

        .video-selector-btn.active {
            background: #e50914;
            border-color: #c40812;
        }

        @media (max-width: 600px) {
            #loginBox {
                width: 90%;
                padding: 22px 18px 18px;
            }

            #pinnedVideoPlayer {
                top: calc(60px + env(safe-area-inset-top));
                left: 50%;
                transform: translateX(-50%);
                width: 94vw;
                max-width: 94vw;
            }

            #topButtons {
                right: calc(8px + env(safe-area-inset-right));
                top: calc(8px + env(safe-area-inset-top));
            }

            #inputArea {
                padding: 8px 8px;
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }

            #sendBtn {
                padding: 0 14px;
                font-size: 13px;
            }

            #messageInput {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div id="loginScreen">
        <div id="loginBox">
            <h2>👋 أهلاً بك في الدردشة</h2>
            <input type="text" id="usernameInput" placeholder="اكتب اسمك (بدون رموز خاصة)" maxlength="15" autofocus>
            <button id="loginBtn">دخول</button>
        </div>
    </div>

    <div id="chat-container" style="display: none;">
        <div id="topButtons">
            <div class="btn" id="setVideoBtn" title="تثبيت فيديو">📺</div>
            <div class="btn" id="onlineListBtn" title="المتصلين الآن">👥 <span id="count" class="count-text">0</span>
            </div>
        </div>

        <div id="pinnedVideoPlayer"></div>

        <div id="setVideoModal">
            <h4>تثبيت فيديو للجميع</h4>
            <input type="text" id="videoUrlInput" placeholder="ادخل رابط يوتيوب، تويتر، M3U، أو MP4" />
            <button id="submitVideoUrlBtn">تثبيت</button>
        </div>

        <div id="usersBox">
            <h4>المتصلين الآن</h4>
            <div id="usersList"></div>
        </div>

        <div id="overlay"></div>

        <div id="messages" role="list"></div>

        <form id="inputArea">
            <button type="submit" id="sendBtn">إرسال</button>
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." autocomplete="off" />
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const firebaseConfig = {
                apiKey: "AIzaSyB1AsEHXP05nQ8M66jYPusheLaE60q_JwU",
                authDomain: "mychat-2d881.firebaseapp.com",
                databaseURL: "https://mychat-2d881-default-rtdb.firebaseio.com"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            let username = '';
            let userRef, messagesRef, onlineRef, pinnedVideoRef;
            let serverTimeOffset = 0;
            let videoPlayerInstance = null;
            let currentVideoIndex = 0;
            let currentVideosList = [];

            const loginScreen = document.getElementById('loginScreen');
            const usernameInput = document.getElementById('usernameInput');
            const loginBtn = document.getElementById('loginBtn');
            const chatContainer = document.getElementById('chat-container');
            const messagesDiv = document.getElementById("messages");
            const messageInput = document.getElementById("messageInput");
            const onlineListBtn = document.getElementById("onlineListBtn");
            const setVideoBtn = document.getElementById("setVideoBtn");
            const usersBox = document.getElementById("usersBox");
            const setVideoModal = document.getElementById("setVideoModal");
            const videoUrlInput = document.getElementById("videoUrlInput");
            const submitVideoUrlBtn = document.getElementById("submitVideoUrlBtn");
            const pinnedVideoPlayer = document.getElementById("pinnedVideoPlayer");
            const overlay = document.getElementById("overlay");

            function attemptLogin() {
                let inputName = usernameInput.value.trim();
                const invalidChars = /[.#$\\[\\]]/;
                if (invalidChars.test(inputName)) {
                    alert("الاسم لا يجب أن يحتوي على رموز خاصة");
                    return;
                }
                if (inputName.length < 2) {
                    alert("الاسم قصير جداً");
                    return;
                }

                username = inputName;
                userRef = db.ref("online/" + username);
                messagesRef = db.ref("messages");
                onlineRef = db.ref("online");
                pinnedVideoRef = db.ref("pinned_video");

                startChat();
            }

            loginBtn.onclick = attemptLogin;
            usernameInput.onkeypress = (e) => { if (e.key === 'Enter') attemptLogin(); };

            function startChat() {
                loginScreen.style.display = 'none';
                chatContainer.style.display = 'flex';

                db.ref('.info/serverTimeOffset').on('value', snap => serverTimeOffset = snap.val() || 0);

                userRef.set({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                userRef.onDisconnect().remove();

                setInterval(() => {
                    userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                }, 60000);

                setInterval(() => {
                    const now = Date.now() + serverTimeOffset;
                    onlineRef.once('value', snap => {
                        snap.forEach(child => {
                            if (now - child.val().lastActive > 90000) child.ref.remove();
                        });
                    });
                }, 60000);

                onlineListBtn.onclick = (e) => { e.stopPropagation(); usersBox.style.display = 'block'; overlay.style.display = 'block'; };
                setVideoBtn.onclick = (e) => { e.stopPropagation(); setVideoModal.style.display = 'block'; overlay.style.display = 'block'; };
                overlay.onclick = closeAllModals;

                document.getElementById("inputArea").onsubmit = (e) => {
                    e.preventDefault();
                    const text = messageInput.value.trim();
                    if (!text) return;

                    const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                    messagesRef.push({ user: username, text: text, time: time, timestamp: firebase.database.ServerValue.TIMESTAMP });
                    messageInput.value = "";
                    userRef.update({ lastActive: firebase.database.ServerValue.TIMESTAMP });
                    scrollToBottom();
                };

                messagesRef.limitToLast(100).on("child_added", snap => {
                    addMessageToUI(snap.key, snap.val());
                });

                messagesRef.on("child_removed", snap => {
                    const msgElement = document.getElementById(`msg-${snap.key}`);
                    if (msgElement) {
                        msgElement.style.opacity = '0';
                        setTimeout(() => msgElement.remove(), 300);
                    }
                });

                onlineRef.on("value", snap => {
                    document.getElementById("count").textContent = snap.numChildren();
                    renderUsersList(snap.val() || {});
                });

                submitVideoUrlBtn.onclick = () => {
                    const url = videoUrlInput.value.trim();
                    if (!url) return;

                    const youtubeId = getYoutubeVideoId(url);
                    const tweetId = getTweetId(url);

                    if (youtubeId) {
                        pinnedVideoRef.set({ type: 'youtube', id: youtubeId, setBy: username });
                    } else if (tweetId) {
                        pinnedVideoRef.set({ type: 'twitter', id: tweetId, setBy: username });
                    } else if (url.toLowerCase().includes('.m3u')) {
                        pinnedVideoRef.set({ type: 'm3u', url: url, setBy: username });
                    } else if (isDirectVideo(url)) {
                        pinnedVideoRef.set({ type: 'direct', url: url, setBy: username });
                    } else {
                        alert("الرابط غير مدعوم.");
                        return;
                    }

                    videoUrlInput.value = "";
                    closeAllModals();
                };

                pinnedVideoRef.on("value", async (snap) => {
                    const data = snap.val();
                    if (videoPlayerInstance) {
                        videoPlayerInstance.dispose();
                        videoPlayerInstance = null;
                    }
                    pinnedVideoPlayer.innerHTML = '';
                    currentVideosList = [];
                    currentVideoIndex = 0;

                    if (data) {
                        pinnedVideoPlayer.style.display = 'flex';
                        const header = document.createElement('div');
                        header.className = 'video-header';
                        header.innerHTML = `<span>بث مباشر - ${data.setBy}</span>`;
                        const closeBtn = document.createElement('button');
                        closeBtn.className = 'close-pinned-video';
                        closeBtn.innerHTML = '✖';
                        closeBtn.onclick = () => pinnedVideoRef.remove();
                        header.appendChild(closeBtn);
                        const body = document.createElement('div');
                        body.className = 'video-body';

                        const resizeHandle = document.createElement('div');
                        resizeHandle.className = 'resize-handle';

                        pinnedVideoPlayer.appendChild(header);
                        pinnedVideoPlayer.appendChild(body);
                        pinnedVideoPlayer.appendChild(resizeHandle);

                        makeDraggable(pinnedVideoPlayer, header);
                        makeResizable(pinnedVideoPlayer, resizeHandle);

                        if (data.type === 'youtube') {
                            createVideoPlayer(body, `https://www.youtube.com/watch?v=${data.id}`, 'video/youtube', true);
                        } else if (data.type === 'm3u') {
                            createVideoPlayer(body, data.url, 'application/x-mpegURL', false);
                        } else if (data.type === 'direct') {
                            createVideoPlayer(body, data.url, 'video/mp4', false);
                        } else if (data.type === 'twitter') {
                            // ✨ حل جذري: embed فوراً ثم تحديث في الخلفية
                            embedTwitterNative(body, data.id); // يظهر فوراً 100%

                            // حاول جلب الفيديو المباشر في الخلفية
                            const _twId = data.id;
                            fetchTwitterVideos(_twId).then(videos => {
                                if (!videos || !videos.length || !pinnedVideoPlayer.contains(body)) return;
                                currentVideosList = videos;
                                currentVideoIndex = 0;
                                // شغّل الفيديو، ولو فشل ارجع للـ embed
                                const vEl = document.createElement('video-js');
                                vEl.className = 'vjs-netflix-theme';
                                body.innerHTML = '';
                                body.appendChild(vEl);
                                try {
                                    const p = videojs(vEl, {
                                        autoplay: true, muted: true, controls: true,
                                        aspectRatio: '16:9', playsinline: true,
                                        techOrder: ['html5'],
                                        sources: [{ type: 'video/mp4', src: videos[0].url }]
                                    });
                                    videoPlayerInstance = p;
                                    p.on('error', () => {
                                        videoPlayerInstance = null;
                                        embedTwitterNative(body, _twId); // fallback للـ embed
                                    });
                                } catch (e) {
                                    embedTwitterNative(body, _twId);
                                }
                                if (videos.length > 1) createVideoSelector(body, videos);
                            }).catch(() => { }); // فشل صامت - embed موجود
                        }

                        addNotification(`${data.setBy} قام بتشغيل فيديو`);
                    } else {
                        pinnedVideoPlayer.style.display = 'none';
                    }
                });
            }

            // دالة: embed التغريدة عبر iframe رسمي من تويتر (الأضمن دائماً)
            function embedTwitterNative(container, tweetId) {
                container.innerHTML = '';
                container.style.background = '#15202b';
                container.style.overflow = 'hidden';

                const iframe = document.createElement('iframe');
                iframe.src = `https://platform.twitter.com/embed/Tweet.html?id=${tweetId}&theme=dark&lang=ar&dnt=true`;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.minHeight = '320px';
                iframe.style.border = 'none';
                iframe.setAttribute('allowfullscreen', '');
                iframe.setAttribute('allow', 'autoplay; fullscreen');
                iframe.setAttribute('scrolling', 'no')
                container.appendChild(iframe);
            }

            function createVideoPlayer(container, videoSource, videoType, isYoutube) {
                const videoEl = document.createElement('video-js');
                videoEl.className = 'vjs-netflix-theme';
                container.innerHTML = '';
                container.appendChild(videoEl);

                // HLS على المتصفحات غير Safari
                const isHLS = videoType === 'application/x-mpegURL' || videoSource.includes('.m3u');
                if (isHLS && !videoEl.canPlayType('application/vnd.apple.mpegurl') && typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls();
                    const nativeVideo = document.createElement('video');
                    nativeVideo.controls = true;
                    nativeVideo.autoplay = true;
                    nativeVideo.muted = true;
                    nativeVideo.playsInline = true;
                    nativeVideo.style.width = '100%';
                    nativeVideo.style.height = '100%';
                    nativeVideo.style.background = '#000';
                    container.innerHTML = '';
                    container.appendChild(nativeVideo);
                    hls.loadSource(videoSource);
                    hls.attachMedia(nativeVideo);
                    videoPlayerInstance = { dispose: () => { hls.destroy(); nativeVideo.remove(); } };
                    return;
                }

                let playerOptions = {
                    autoplay: true,
                    muted: true,
                    controls: true,
                    aspectRatio: '16:9',
                    playsinline: true,
                    techOrder: isYoutube ? ['youtube'] : ['html5'],
                    sources: [{ type: videoType, src: videoSource }]
                };

                try {
                    videoPlayerInstance = videojs(videoEl, playerOptions);
                    videoPlayerInstance.on('error', () => {
                        container.innerHTML = `<p style="color:#ff6b6b;padding:12px;font-size:13px;">⚠️ تعذّر تشغيل الفيديو. تحقق من الرابط أو جرب صيغة أخرى.</p>`;
                    });
                } catch (e) {
                    container.innerHTML = `<p style="color:#ff6b6b;padding:12px;font-size:13px;">⚠️ خطأ في تحميل المشغّل.</p>`;
                }
            }

            function createVideoSelector(container, videos) {
                const selectorBar = document.createElement('div');
                selectorBar.className = 'video-selector-bar';

                videos.forEach((v, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'video-selector-btn';
                    btn.textContent = `مقطع ${idx + 1}`;
                    if (idx === 0) btn.classList.add('active');

                    btn.onclick = (e) => {
                        e.preventDefault();
                        if (idx !== currentVideoIndex && videoPlayerInstance) {
                            currentVideoIndex = idx;
                            videoPlayerInstance.src({ src: v.url, type: 'video/mp4' });
                            videoPlayerInstance.play();

                            document.querySelectorAll('.video-selector-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        }
                    };
                    selectorBar.appendChild(btn);
                });

                container.appendChild(selectorBar);
            }

            async function fetchTwitterVideos(tweetId) {
                const videos = [];

                // محاولة 1: fxtwitter (أدق API حالياً)
                try {
                    const fxRes = await fetch(`https://api.fxtwitter.com/status/${tweetId}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (fxRes.ok) {
                        const fxData = await fxRes.json();
                        const tweet = fxData.tweet || {};
                        const media = tweet.media || {};

                        // هيكل 1: media.videos[]
                        if (Array.isArray(media.videos)) {
                            media.videos.forEach(v => {
                                const src = v.url || (v.variants && v.variants[0]?.url);
                                if (src) videos.push({ url: src, type: 'video/mp4', provider: 'fxtwitter' });
                            });
                        }
                        // هيكل 2: media.all[]
                        if (!videos.length && Array.isArray(media.all)) {
                            media.all.filter(v => v.type === 'video' || v.type === 'gif').forEach(v => {
                                const src = v.url || (v.variants && v.variants[0]?.url);
                                if (src) videos.push({ url: src, type: 'video/mp4', provider: 'fxtwitter' });
                            });
                        }
                        // هيكل 3: tweet.video
                        if (!videos.length && tweet.video) {
                            const v = tweet.video;
                            const src = v.url || (v.variants && v.variants[0]?.url);
                            if (src) videos.push({ url: src, type: 'video/mp4', provider: 'fxtwitter' });
                        }
                    }
                } catch (e) { console.warn('[fxtwitter]', e.message); }

                if (videos.length) return videos;

                // محاولة 2: vxtwitter (تصحيح endpoint)
                try {
                    const vxRes = await fetch(`https://api.vxtwitter.com/status/${tweetId}`, {
                        headers: { 'Accept': 'application/json' }
                    });
                    if (vxRes.ok) {
                        const vxData = await vxRes.json();
                        (vxData.media_extended || []).forEach(m => {
                            if (m && (m.type === 'video' || m.type === 'gif') && m.url) {
                                videos.push({ url: m.url, type: 'video/mp4', provider: 'vxtwitter' });
                            }
                        });
                    }
                } catch (e) { console.warn('[vxtwitter]', e.message); }

                if (videos.length) return videos;

                // محاولة 3: cobalt.tools v7
                try {
                    const cobaltRes = await fetch('https://api.cobalt.tools/api/json', {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: `https://x.com/i/status/${tweetId}` })
                    });
                    if (cobaltRes.ok) {
                        const cobaltData = await cobaltRes.json();
                        if (cobaltData.url) {
                            videos.push({ url: cobaltData.url, type: 'video/mp4', provider: 'cobalt' });
                        } else if (Array.isArray(cobaltData.picker)) {
                            cobaltData.picker.forEach(p => {
                                if (p.url) videos.push({ url: p.url, type: 'video/mp4', provider: 'cobalt' });
                            });
                        }
                    }
                } catch (e) { console.warn('[cobalt]', e.message); }

                return videos;
            }

            // تحديث الأوقات لكل الرسائل بـ interval واحد مشترك (بدل interval لكل رسالة)
            const messageTimestamps = new Map();
            setInterval(() => {
                messageTimestamps.forEach(({ timestamp, el }, key) => {
                    updateTimeDisplay(key, timestamp, el);
                });
            }, 60000);

            function addMessageToUI(key, { user, text, time, timestamp }) {
                const div = document.createElement("div");
                div.className = "msg";
                div.id = `msg-${key}`;

                const timeElement = document.createElement("span");
                timeElement.className = "time";
                timeElement.id = `time-${key}`;

                updateTimeDisplay(key, timestamp, timeElement);

                div.innerHTML = `
        <span class="user">${escapeHtml(user)}</span>
        <span style="flex:1; word-break: break-word;">${escapeHtml(text)}</span>
      `;

                div.appendChild(timeElement);
                messageTimestamps.set(key, { timestamp, el: timeElement });

                messagesDiv.appendChild(div);
                scrollToBottom();
            }

            function updateTimeDisplay(key, timestamp, timeElement) {
                if (!timestamp) return;

                const now = Date.now() + serverTimeOffset;
                const messageTime = timestamp + serverTimeOffset;
                const diffMs = now - messageTime;
                const diffSec = Math.floor(diffMs / 1000);
                const diffMin = Math.floor(diffSec / 60);
                const diffHours = Math.floor(diffMin / 60);
                const diffDays = Math.floor(diffHours / 24);
                const diffWeeks = Math.floor(diffDays / 7);
                const diffMonths = Math.floor(diffDays / 30);
                const diffYears = Math.floor(diffDays / 365);

                let timeText = "";

                if (diffSec < 5) {
                    timeText = "الآن";
                } else if (diffSec < 60) {
                    timeText = "ثواني";
                } else if (diffMin < 2) {
                    timeText = "د1";
                } else if (diffMin < 60) {
                    timeText = `د${diffMin}`;
                } else if (diffHours < 24) {
                    timeText = `س${diffHours}`;
                } else if (diffDays < 7) {
                    timeText = `ي${diffDays}`;
                } else if (diffWeeks < 4) {
                    timeText = `أ${diffWeeks}`;
                } else if (diffMonths < 12) {
                    timeText = `ش${diffMonths}`;
                } else {
                    timeText = `ع${diffYears}`;
                }

                timeElement.textContent = timeText;
            }

            function addNotification(text) {
                const div = document.createElement("div");
                div.className = "sys";
                div.textContent = text;
                messagesDiv.appendChild(div);
                scrollToBottom();
            }

            function renderUsersList(users) {
                const list = document.getElementById("usersList");
                list.innerHTML = '';
                const now = Date.now() + serverTimeOffset;
                Object.keys(users).forEach(uName => {
                    const uData = users[uName];
                    const div = document.createElement("div");
                    div.className = "user-item";
                    let colorClass = 'status-green';
                    const diff = now - (uData.lastActive || 0);
                    if (diff > 60000) colorClass = 'status-gray';
                    else if (diff > 30000) colorClass = 'status-yellow';
                    div.innerHTML = `<span class="status-indicator ${colorClass}"></span><span>${escapeHtml(uName)}</span>`;
                    list.appendChild(div);
                });
            }

            function closeAllModals() {
                usersBox.style.display = 'none';
                setVideoModal.style.display = 'none';
                overlay.style.display = 'none';
            }

            function makeDraggable(element, handle) {
                let offsetX = 0, offsetY = 0;
                let isDragging = false;

                const getPointerPosition = (e) => e.touches ? e.touches[0] : e;

                const onDragStart = (e) => {
                    isDragging = true;
                    const pointer = getPointerPosition(e);
                    offsetX = pointer.clientX - element.offsetLeft;
                    offsetY = pointer.clientY - element.offsetTop;
                    document.addEventListener('mousemove', onDragMove);
                    document.addEventListener('touchmove', onDragMove, { passive: false });
                    document.addEventListener('mouseup', onDragEnd);
                    document.addEventListener('touchend', onDragEnd);
                };

                const onDragMove = (e) => {
                    if (isDragging) {
                        e.preventDefault();
                        const pointer = getPointerPosition(e);
                        element.style.left = (pointer.clientX - offsetX) + "px";
                        element.style.top = (pointer.clientY - offsetY) + "px";
                    }
                };

                const onDragEnd = () => {
                    isDragging = false;
                    document.removeEventListener('mousemove', onDragMove);
                    document.removeEventListener('touchmove', onDragMove);
                    document.removeEventListener('mouseup', onDragEnd);
                    document.removeEventListener('touchend', onDragEnd);
                };

                handle.addEventListener('mousedown', onDragStart);
                handle.addEventListener('touchstart', onDragStart, { passive: false });
            }

            function makeResizable(element, handle) {
                let initialWidth, initialHeight, initialX, initialY;
                const getPointerPosition = (e) => e.touches ? e.touches[0] : e;

                function onResizeStart(e) {
                    if (e.type === 'touchstart') e.preventDefault();
                    const pointer = getPointerPosition(e);
                    initialWidth = element.offsetWidth;
                    initialHeight = element.offsetHeight;
                    initialX = pointer.clientX;
                    initialY = pointer.clientY;
                    document.addEventListener('mousemove', onResizeMove);
                    document.addEventListener('touchmove', onResizeMove, { passive: false });
                    document.addEventListener('mouseup', onResizeEnd);
                    document.addEventListener('touchend', onResizeEnd);
                }

                function onResizeMove(e) {
                    if (e.type === 'touchmove') e.preventDefault();
                    const pointer = getPointerPosition(e);
                    const newWidth = initialWidth + (pointer.clientX - initialX);
                    const newHeight = initialHeight + (pointer.clientY - initialY);
                    if (newWidth > 300) { element.style.width = newWidth + 'px'; }
                    if (newHeight > 200) { element.style.height = newHeight + 'px'; }
                }

                function onResizeEnd() {
                    document.removeEventListener('mousemove', onResizeMove);
                    document.removeEventListener('touchmove', onResizeMove);
                    document.removeEventListener('mouseup', onResizeEnd);
                    document.removeEventListener('touchend', onResizeEnd);
                }

                handle.addEventListener('mousedown', onResizeStart);
                handle.addEventListener('touchstart', onResizeStart, { passive: false });
            }

            function getYoutubeVideoId(url) {
                if (!url) return null;
                const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                return (url.match(regex) || [])[1] || null;
            }

            function getTweetId(url) {
                if (!url) return null;
                const regex = /(?:https?:\/\/)?(?:www\.)?(?:twitter|x)\.com\/(?:\w+)\/status\/(\d+)/;
                return (url.match(regex) || [])[1] || null;
            }

            function isDirectVideo(url) {
                if (!url) return false;
                // تحقق من الامتداد الصريح
                if (/\.(mp4|webm|ogv|mkv|avi|mov|flv|m4v)(\?.*)?$/i.test(url)) return true;
                // روابط تحتوي على video في المسار وليست يوتيوب أو تويتر
                if (/video/i.test(url) && !/(youtube|youtu\.be|twitter|x\.com)/i.test(url)) return true;
                return false;
            }

            function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
            function escapeHtml(unsafe) { if (!unsafe) return ""; return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        });
    </script>
</body>
